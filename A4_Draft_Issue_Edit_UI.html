<!-- AETERLINK Documentation Module — A4_Draft_Issue_Edit_UI.html -->
<script id="a4-draft-issue-edit-ui-script">
(function(){
  if(window.__AETERLINK_DRAFT_ISSUE_EDIT_UI_V2__) return;
  window.__AETERLINK_DRAFT_ISSUE_EDIT_UI_V2__=true;
  var editState={formRecordId:'',documentNo:'',sourceDocumentNo:'',sourceFormRecordId:'',revisionMode:false,loadedStatus:''};
  function byId(id){return document.getElementById(id);}
  function val(id){var e=byId(id);return e?String(e.value||'').trim():'';}
  function setVal(id,v){var e=byId(id);if(e)e.value=v||'';}
  function text(id,v){var e=byId(id);if(e)e.textContent=v||'';}
  function msg(t){var e=byId('prodStatusMsg')||byId('saveStatus');if(e)e.textContent=t;}
  function trim(v){return String(v==null?'':v).trim();}
  function googleReady(){return typeof google!=='undefined'&&google.script&&google.script.run;}
  function isIssuedStatus(s){s=trim(s).toUpperCase();return s.indexOf('ISSUED')>=0||s.indexOf('PDF')>=0||s.indexOf('APPROVED')>=0;}
  function syncHidden(){
    var map={prodProjectCode:'fProjectCode',prodProjectName:'fProjectName',prodClient:'fClient',prodMainContractor:'fMainContractor',prodRevisionNo:'fRevisionNo',prodStatus:'fStatus'};
    Object.keys(map).forEach(function(s){var a=byId(s),b=byId(map[s]);if(a&&b)b.value=a.value;});
    var dt=byId('prodDocType'),ft=byId('fTemplate');if(dt&&ft)ft.value=dt.value;
  }
  function collectPayload(status){
    syncHidden();
    if(window.AETERLINK_A4_ROW_CONTROLS&&AETERLINK_A4_ROW_CONTROLS.syncRows)AETERLINK_A4_ROW_CONTROLS.syncRows();
    var data=window.collectFormData?window.collectFormData():{};
    status=status||'Draft';
    var issued=String(status).toUpperCase()==='ISSUED';
    data.Status=status;
    data.FormRecordId=editState.formRecordId||data.FormRecordId||'';
    if(editState.revisionMode){
      data.SourceDocumentNo=editState.sourceDocumentNo;
      data.SourceFormRecordId=editState.sourceFormRecordId;
      data.RevisionOf=editState.sourceDocumentNo;
    }
    if(!issued){data.DocumentNo='';}
    return {
      FormRecordId:editState.formRecordId||'',
      ProjectCode:data.ProjectCode||val('fProjectCode')||val('prodProjectCode'),
      TemplateCode:val('fTemplate')||val('prodDocType')||data.TemplateCode||'PJ-WCR-001',
      DocumentNo:issued?(editState.revisionMode?editState.sourceDocumentNo:(editState.documentNo||data.DocumentNo||val('fDocumentNo')||'')):'',
      SourceDocumentNo:editState.sourceDocumentNo||'',
      SourceFormRecordId:editState.sourceFormRecordId||'',
      RevisionNo:data.RevisionNo||val('fRevisionNo')||val('prodRevisionNo')||(editState.revisionMode?'R01':'R00'),
      Status:status,
      DocumentStatus:status,
      Data:data,
      RevisionReason:val('prodRevisionReason'),
      SubmittedAt:issued?new Date().toISOString():'',
      LockedAfterPdf:'FALSE',
      Html:issued&&window.AETERLINK_PROD_NEXT&&AETERLINK_PROD_NEXT.buildPrintReadyHtml?AETERLINK_PROD_NEXT.buildPrintReadyHtml():'',
      Styles:issued&&window.AETERLINK_PROD_NEXT&&AETERLINK_PROD_NEXT.collectPrintCss?AETERLINK_PROD_NEXT.collectPrintCss():''
    };
  }
  function applySavedRecord(r,status,res){
    r=r||{};res=res||{};
    editState.formRecordId=r.FormRecordId||editState.formRecordId||'';
    editState.documentNo=r.DocumentNo||editState.documentNo||'';
    editState.sourceDocumentNo=res.sourceDocumentNo||editState.sourceDocumentNo||'';
    editState.revisionMode=!!(res.revisionMode||editState.sourceDocumentNo);
    if(r.DocumentNo){setVal('fDocumentNo',r.DocumentNo);setVal('prodDocumentNo',r.DocumentNo);}else{setVal('fDocumentNo','');setVal('prodDocumentNo','');}
    setVal('fRevisionNo',r.RevisionNo||r.Revision||val('fRevisionNo')||'R00');
    setVal('prodRevisionNo',r.RevisionNo||r.Revision||val('prodRevisionNo')||'R00');
    setVal('fStatus',r.Status||status||'Draft');
    setVal('prodStatus',r.Status||status||'Draft');
    var box=byId('prodDocNoBox');
    if(box)box.textContent=r.DocumentNo||(editState.revisionMode?'Not issued — revision of '+editState.sourceDocumentNo:'Not issued');
    text('prodRecordIdBox',editState.formRecordId||'Not saved yet');
    text('prodStatusPill',r.Status||status||'Draft');
  }
  function saveStatus(status){
    if(!googleReady()){msg('Cannot save: google.script.run is not available.');return;}
    var payload;
    try{payload=collectPayload(status);}catch(e){msg('Save failed: '+e.message);return;}
    msg(status==='Issued'?(editState.revisionMode?'Issuing revision '+payload.RevisionNo+'...':'Issuing document and generating document number...'):'Saving draft without document number...');
    google.script.run.withSuccessHandler(function(res){
      var rec=res&&res.record?res.record:{};
      applySavedRecord(rec,status,res||{});
      if(status!=='Issued'){
        setVal('fDocumentNo','');setVal('prodDocumentNo','');
        editState.documentNo='';
        var box=byId('prodDocNoBox');if(box)box.textContent=editState.revisionMode?'Not issued — revision of '+editState.sourceDocumentNo:'Not issued';
        msg('Draft saved. Document No. has not been generated. FormRecordId: '+(editState.formRecordId||'-'));
      }else{
        msg((res&&res.revisionMode?'Revision issued: ':'Issued: ')+(rec.DocumentNo||'-')+' / '+(rec.RevisionNo||'R00')+(res&&res.fileUrl?' | PDF saved to Drive':''));
        editState.revisionMode=false;
        editState.sourceDocumentNo='';
        editState.sourceFormRecordId='';
      }
      if(window.refreshData)window.refreshData();
      if(window.previewCurrentForm)setTimeout(window.previewCurrentForm,120);
      setTimeout(addActionButtons,900);
    }).withFailureHandler(function(e){msg('Save failed: '+(e&&e.message?e.message:String(e)));}).apiModularSaveFormRecordV2(payload);
  }
  function loadForEdit(payload){
    if(!googleReady())return;
    msg('Loading record for edit...');
    google.script.run.withSuccessHandler(function(res){
      var r=res.record||{},d=res.data||{};
      var issued=!!res.isIssued||isIssuedStatus(r.Status||r.DocumentStatus||'');
      editState.formRecordId=issued?'':(r.FormRecordId||'');
      editState.documentNo=issued?'':(r.DocumentNo||'');
      editState.sourceDocumentNo=issued?(res.baseDocumentNo||r.DocumentNo||d.DocumentNo||''):(d.SourceDocumentNo||d.RevisionOf||'');
      editState.sourceFormRecordId=issued?(r.FormRecordId||''):(d.SourceFormRecordId||'');
      editState.revisionMode=issued||!!editState.sourceDocumentNo;
      editState.loadedStatus=r.Status||d.Status||'Draft';
      setVal('fTemplate',r.TemplateCode||d.TemplateCode||val('fTemplate'));
      setVal('prodDocType',r.TemplateCode||d.TemplateCode||val('prodDocType'));
      setVal('fProjectCode',d.ProjectCode||r.ProjectCode||'');setVal('prodProjectCode',d.ProjectCode||r.ProjectCode||'');
      setVal('fProjectName',d.ProjectName||'');setVal('prodProjectName',d.ProjectName||'');
      setVal('fClient',d.Client||'');setVal('prodClient',d.Client||'');
      setVal('fMainContractor',d.MainContractor||'');setVal('prodMainContractor',d.MainContractor||'');
      setVal('fDocumentNo',issued?'':(r.DocumentNo||d.DocumentNo||''));setVal('prodDocumentNo',issued?'':(r.DocumentNo||d.DocumentNo||''));
      var rev=issued?(res.nextRevisionNo||'R01'):(r.RevisionNo||d.RevisionNo||'R00');
      setVal('fRevisionNo',rev);setVal('prodRevisionNo',rev);
      setVal('fStatus','Draft');setVal('prodStatus','Draft');
      var rows=d.ChecklistRows||d.ScopeRows||d.Rows||[];setVal('fRows',JSON.stringify(rows,null,2));
      applySavedRecord({FormRecordId:editState.formRecordId,DocumentNo:issued?'':r.DocumentNo,RevisionNo:rev,Status:'Draft'},'Draft',{revisionMode:editState.revisionMode,sourceDocumentNo:editState.sourceDocumentNo});
      if(window.showView)window.showView('documents');
      if(window.previewCurrentForm)setTimeout(window.previewCurrentForm,250);
      msg(issued?'Loaded issued document as revision draft. Source: '+editState.sourceDocumentNo+' / Next revision: '+rev:'Loaded draft for edit: '+(r.FormRecordId||'-'));
    }).withFailureHandler(function(e){msg('Load failed: '+(e&&e.message?e.message:String(e)));}).apiGetFormRecordForEditV2(payload);
  }
  function softDelete(payload){
    if(!googleReady())return;
    if(!confirm('Delete this record? This will soft-delete it from the WebApp list.'))return;
    google.script.run.withSuccessHandler(function(){msg('Record deleted.');if(window.AETERLINK_REGISTER_V2)AETERLINK_REGISTER_V2.refresh();if(window.refreshData)window.refreshData();setTimeout(addActionButtons,900);}).withFailureHandler(function(e){msg('Delete failed: '+(e&&e.message?e.message:String(e)));}).apiSoftDeleteFormRecordV2(payload);
  }
  function patchActions(){
    window.prodSaveDraft=function(){saveStatus('Draft');};
    window.prodIssueSend=function(){saveStatus('Issued');};
    window.saveCurrentForm=function(){saveStatus(val('prodStatus')||val('fStatus')||'Draft');};
    window.prodNewDraft=function(){editState={formRecordId:'',documentNo:'',sourceDocumentNo:'',sourceFormRecordId:'',revisionMode:false,loadedStatus:''};setVal('fDocumentNo','');setVal('prodDocumentNo','');setVal('fRevisionNo','R00');setVal('prodRevisionNo','R00');setVal('fStatus','Draft');setVal('prodStatus','Draft');if(window.loadSampleForTemplate)window.loadSampleForTemplate();text('prodDocNoBox','Not issued');text('prodRecordIdBox','Not saved yet');};
  }
  function patchRegister(){
    if(window.AETERLINK_REGISTER_V2&&!window.AETERLINK_REGISTER_V2.__editPatchV2){
      var oldRefresh=window.AETERLINK_REGISTER_V2.refresh;
      window.AETERLINK_REGISTER_V2.refresh=function(){var ret=oldRefresh.apply(this,arguments);setTimeout(addActionButtons,650);setTimeout(addActionButtons,1400);return ret;};
      window.AETERLINK_REGISTER_V2.__editPatchV2=true;
    }
  }
  function getHeaderMap(table){var map={};var h=table.tHead&&table.tHead.rows[0];if(!h)return map;[].slice.call(h.cells).forEach(function(th,i){map[trim(th.textContent)]=i;});return map;}
  function rowPayload(tr,table){
    var cells=[].slice.call(tr.cells||[]).map(function(td){return trim(td.textContent);});
    var m=getHeaderMap(table);
    function at(name){return m[name]!=null?cells[m[name]]:'';}
    return {FormRecordId:at('FormRecordId')||at('DocumentId')||cells[0]||'',DocumentNo:at('DocumentNo')||at('DocumentId')||at('DocumentCode')||'',DocumentId:at('DocumentId')||'',DocumentCode:at('DocumentCode')||''};
  }
  function addActionButtons(){
    document.querySelectorAll('#recordsTable table.mod-table,#registerTable table.mod-table').forEach(function(table){
      if(!table.tBodies||!table.tBodies[0])return;
      var head=table.tHead&&table.tHead.rows[0];
      if(head&&!head.querySelector('th.a4-edit-action-head')){var th=document.createElement('th');th.className='a4-edit-action-head';th.textContent='Action';head.insertBefore(th,head.firstChild);}
      [].slice.call(table.tBodies[0].rows).forEach(function(tr){
        if(tr.querySelector('td.a4-edit-action-cell'))return;
        var p=rowPayload(tr,table);var td=document.createElement('td');td.className='a4-edit-action-cell';td.innerHTML='<button class="mod-link-btn" type="button">Edit</button> <button class="mod-link-btn" type="button">Delete</button>';
        td.querySelectorAll('button')[0].onclick=function(){loadForEdit(p);};
        td.querySelectorAll('button')[1].onclick=function(){softDelete(p);};
        tr.insertBefore(td,tr.firstChild);
      });
    });
  }
  function patchRenderTable(){
    if(window.renderTable&&!window.renderTable.__draftEditPatch){
      var old=window.renderTable;
      window.renderTable=function(){var html=old.apply(this,arguments);setTimeout(addActionButtons,250);return html;};
      window.renderTable.__draftEditPatch=true;
    }
    if(window.loadTable&&!window.loadTable.__draftEditPatch){
      var oldLoad=window.loadTable;
      window.loadTable=function(){var ret=oldLoad.apply(this,arguments);setTimeout(addActionButtons,500);setTimeout(addActionButtons,1200);return ret;};
      window.loadTable.__draftEditPatch=true;
    }
  }
  function boot(){patchActions();patchRegister();patchRenderTable();addActionButtons();}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,500);setTimeout(boot,1400);setTimeout(boot,3000);});
  var tm=setInterval(boot,1200);setTimeout(function(){clearInterval(tm);boot();},18000);
  window.AETERLINK_DRAFT_ISSUE_EDIT_UI={saveDraft:function(){saveStatus('Draft');},issue:function(){saveStatus('Issued');},loadForEdit:loadForEdit,softDelete:softDelete,state:editState,addActionButtons:addActionButtons};
})();
</script>
