<style>
  .a4-logo-img{width:41mm!important;max-width:41mm!important;height:auto!important;max-height:14mm!important;display:block!important;object-fit:contain!important}
  .a4-section-title{background:#113e63!important;color:#fff!important;border-color:#113e63!important}
  .a4-scope-table{border-collapse:collapse!important;border:1px solid #777!important;width:100%!important;max-width:100%!important}
  .a4-scope-table th,.a4-scope-table td{border:1px solid #777!important}
  .a4-scope-table tr>*:last-child{border-right:1px solid #777!important;box-shadow:inset -1px 0 0 #777!important}
  .a4-scope-table tr:last-child>*{border-bottom:1px solid #777!important;box-shadow:inset 0 -1px 0 #777!important}
  .a4-status-select{width:100%;border:0;background:transparent;font:inherit;font-weight:900;color:#09243f;text-align:center;appearance:auto;padding:0;min-height:5mm}
  .a4-status-print{display:none;font-weight:900;color:#09243f}
  .a4-direct-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 12px;padding:10px;border:1px solid var(--aeterlink-line);border-radius:12px;background:#f7fbfd}
  .a4-direct-toolbar .mod-btn{padding:7px 10px}
  @media print{
    html,body{background:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    .a4-section-title{background:#113e63!important;color:#fff!important;border-color:#113e63!important}
    .a4-status-select{display:none!important}.a4-status-print{display:inline!important}
    .a4-direct-toolbar{display:none!important}
  }
</style>
