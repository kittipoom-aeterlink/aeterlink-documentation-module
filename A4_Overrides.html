<!-- AETERLINK Documentation Module — A4_Overrides.html -->
<style>
  .a4-logo-img{width:40mm!important;max-width:40mm!important;height:auto!important;max-height:14mm!important;display:block!important;object-fit:contain!important}
  .a4-section-title{background:#113e63!important;color:#fff!important;border-color:#113e63!important}
  .a4-scope-table{border-right:1px solid #777!important;border-bottom:1px solid #777!important}
  .a4-scope-table th:last-child,.a4-scope-table td:last-child{border-right:1px solid #777!important}
  .a4-scope-table tr:last-child td{border-bottom:1px solid #777!important}
  .a4-status-select{width:100%;border:0;background:transparent;font:inherit;font-weight:900;color:#09243f;text-align:center;appearance:auto;padding:0;min-height:5mm}
  .a4-status-print{display:none;font-weight:900;color:#09243f}
  .a4-direct-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 12px;padding:10px;border:1px solid var(--aeterlink-line);border-radius:12px;background:#f7fbfd}
  .a4-direct-toolbar .mod-btn{padding:7px 10px}
  @media print{
    html,body{background:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
    .a4-section-title{background:#113e63!important;color:#fff!important;border-color:#113e63!important}
    .a4-status-select{display:none!important}.a4-status-print{display:inline!important}
    .a4-direct-toolbar{display:none!important}
  }
</style>
<script>
(function(){
  function safe(v){return window.AETERLINK_A4_RENDERER.escapeHtml(v==null?'':v);}
  function statusCell(value){var opts=['Not Started','In Progress','Pending','Done','Issue','N/A'];var v=value||'Pending';var html='<select class="a4-status-select">';opts.forEach(function(o){html+='<option value="'+safe(o)+'"'+(o===v?' selected':'')+'>'+safe(o)+'</option>';});html+='</select><span class="a4-status-print">'+safe(v)+'</span>';return html;}
  function syncSelect(sel){var span=sel.parentNode.querySelector('.a4-status-print');if(span)span.textContent=sel.value;}
  var R=window.AETERLINK_A4_RENDERER;

  R.logoSvg=function(){return '<svg class="a4-logo-img" viewBox="0 0 980 155" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="AETERLINK Logo"><g fill="#0b86c6"><path d="M23 128c48-29 72-64 81-127h39c-3 39-24 61-65 80-20 9-31 23-42 50-8 18-31 16-13-3z"/><circle cx="174" cy="116" r="30"/><text x="248" y="112" font-family="Arial Black,Arial,Helvetica,sans-serif" font-weight="900" font-size="88" letter-spacing="13">AETERLINK</text></g></svg>';};

  R.table=function(columns,rows,className){columns=(columns||[]).filter(function(c){return c.key!=='Action';});rows=rows||[];var table='<table class="'+safe(className||'')+'"><thead><tr>'+columns.map(function(col){return '<th style="width:'+safe(col.width||'auto')+';">'+safe(col.label||col.key||'')+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+columns.map(function(col){var val=row[col.key]||'';if(col.key==='Status')return '<td>'+statusCell(val)+'</td>';return '<td class="a4-editable" contenteditable="true" spellcheck="false">'+safe(val)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';return table+'<div class="a4-preview-actions a4-no-print"><button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button></div>';};

  document.addEventListener('change',function(e){if(e.target&&e.target.classList.contains('a4-status-select'))syncSelect(e.target);});

  R.addRow=function(btn){var wrap=btn.closest('.a4-content');var table=wrap?wrap.querySelector('table.a4-scope-table'):null;if(!table||!table.tBodies.length)return;var headers=[].map.call(table.tHead.rows[0].cells,function(th){return th.textContent.trim();});var tr=document.createElement('tr');headers.forEach(function(h){var td=document.createElement('td');if(h==='Status'){td.innerHTML=statusCell('Pending');}else{td.className='a4-editable';td.contentEditable='true';td.spellcheck=false;td.textContent=h==='Package'?'Step 1':'';}tr.appendChild(td);});table.tBodies[0].appendChild(tr);setTimeout(function(){R.paginateScopeFrom(table);},0);};
  R.deleteLastRow=function(btn){var wrap=btn.closest('.a4-content');var table=wrap?wrap.querySelector('table.a4-scope-table'):null;if(!table||!table.tBodies.length)return;var body=table.tBodies[0];if(body.rows.length)body.deleteRow(body.rows.length-1);};
  R.paginateAllScopeTables=function(){[].forEach.call(document.querySelectorAll('.a4-scope-table'),function(table){R.paginateScopeFrom(table);});};
  R.paginateScopeFrom=function(table){var page=table.closest('.a4-page');if(!page||!table.tBodies.length)return;var body=table.tBodies[0];var limit=page.getBoundingClientRect().bottom-58;var guard=0;while(body.rows.length&&body.rows[body.rows.length-1].getBoundingClientRect().bottom>limit&&guard<200){guard++;var row=body.rows[body.rows.length-1];body.removeChild(row);R.appendRowToContinuedPage(page,table,row);}};
  R.appendRowToContinuedPage=function(currentPage,sourceTable,row){var next=currentPage.nextElementSibling;if(!next||!next.classList.contains('a4-scope-continued-page')){next=R.createContinuedScopePage(currentPage,sourceTable);currentPage.parentNode.insertBefore(next,currentPage.nextSibling);}var table=next.querySelector('table.a4-scope-table');table.tBodies[0].insertBefore(row,table.tBodies[0].firstChild);R.paginateScopeFrom(table);};
  R.createContinuedScopePage=function(basePage,sourceTable){var page=document.createElement('div');page.className='a4-page a4-scope-continued-page';var inner=document.createElement('div');inner.className='a4-page-inner';['.a4-header','.a4-project-grid'].forEach(function(sel){var n=basePage.querySelector(sel);if(n)inner.appendChild(n.cloneNode(true));});var content=document.createElement('div');content.className='a4-content';var sec=document.createElement('div');sec.innerHTML=R.section('SCOPE OF WORK — CONTINUED');content.appendChild(sec.firstChild);var table=sourceTable.cloneNode(false);table.appendChild(sourceTable.tHead.cloneNode(true));table.appendChild(document.createElement('tbody'));content.appendChild(table);var actions=document.createElement('div');actions.className='a4-preview-actions a4-no-print';actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button>';content.appendChild(actions);inner.appendChild(content);var f=basePage.querySelector('.a4-footer');if(f)inner.appendChild(f.cloneNode(true));page.appendChild(inner);return page;};

  function patchPreview(){if(window.__aeterlinkPreviewPatched||typeof window.previewCurrentForm!=='function')return;window.__aeterlinkPreviewPatched=true;var original=window.previewCurrentForm;window.previewCurrentForm=function(){original.apply(this,arguments);setTimeout(function(){R.paginateAllScopeTables();},80);};}
  function hideEditorForm(){var view=document.getElementById('view-documents');if(!view)return;var panels=view.querySelectorAll('.mod-panel');if(panels[0])panels[0].style.display='none';var previewPanel=panels[1];if(previewPanel&&!document.getElementById('a4DirectToolbar')){var toolbar=document.createElement('div');toolbar.id='a4DirectToolbar';toolbar.className='a4-direct-toolbar a4-no-print';toolbar.innerHTML='<b style="color:#17395d;">A4 Direct Edit Mode</b><button class="mod-btn" type="button" onclick="previewCurrentForm()">Update Preview</button><button class="mod-btn" type="button" onclick="loadSampleForTemplate()">Reset Sample</button><button class="mod-btn primary" type="button" onclick="AETERLINK_A4_RENDERER.printA4()">Print / Save PDF</button><span class="aeterlink-muted">Edit directly on the A4 preview. Use + Add Row / - Delete Last Row inside the document.</span>';var h=previewPanel.querySelector('h3');if(h)h.insertAdjacentElement('afterend',toolbar);}}

  R.printA4=function(){var selects=document.querySelectorAll('.a4-status-select');selects.forEach(syncSelect);var area=document.querySelector('.a4-print-area');if(!area){window.print();return;}var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent;}).join('\n');var win=window.open('','_blank');if(!win){window.print();return;}win.document.open();win.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>A4 Print</title><style>'+styles+'\n@page{size:A4 portrait;margin:0}html,body{margin:0!important;padding:0!important;background:#fff!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.a4-root{background:#fff!important;padding:0!important;margin:0!important}.a4-page{margin:0!important}.a4-section-title{background:#113e63!important;color:#fff!important}</style></head><body>'+area.outerHTML+'</body></html>');win.document.close();setTimeout(function(){win.focus();win.print();},400);};

  document.addEventListener('DOMContentLoaded',function(){patchPreview();hideEditorForm();setTimeout(function(){R.paginateAllScopeTables();},250);});
})();
</script>
