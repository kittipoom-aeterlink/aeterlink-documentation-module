<!-- AETERLINK Documentation Module — A4_Row_Controls_Restore.html -->
<!--
  PERMANENT REQUIREMENT:
  Keep Add Row / Delete Row controls available for all A4 document tables.
  Do not remove this function unless the user explicitly instructs to remove it.
-->
<style id="a4-row-controls-restore-style">
  #a4Preview .a4-row-control-bar,
  #a4CheckOutput .a4-row-control-bar,
  .a4-print-area .a4-row-control-bar{
    display:flex!important;
    visibility:visible!important;
    gap:6px!important;
    align-items:center!important;
    flex-wrap:wrap!important;
    margin:1.6mm 0 0!important;
  }
  .a4-row-control-bar button{
    border:1px solid #adc3d2!important;
    background:#fff!important;
    color:#07385b!important;
    border-radius:6px!important;
    padding:3px 8px!important;
    font-size:7pt!important;
    font-weight:900!important;
    cursor:pointer!important;
    line-height:1.2!important;
  }
  .a4-row-control-bar button:hover{background:#eaf3f8!important;}
  .a4-row-delete-cell{position:relative!important;padding-left:5mm!important;}
  .a4-row-delete-btn{
    position:absolute!important;
    left:1mm!important;
    top:50%!important;
    transform:translateY(-50%)!important;
    width:3.4mm!important;
    height:3.4mm!important;
    min-width:3.4mm!important;
    line-height:2.8mm!important;
    padding:0!important;
    border:1px solid #d15b5b!important;
    background:#fff!important;
    color:#a91d1d!important;
    border-radius:50%!important;
    font-size:8px!important;
    font-weight:900!important;
    cursor:pointer!important;
    text-align:center!important;
    z-index:5!important;
  }
  .a4-row-delete-btn:hover{background:#fff1f1!important;border-color:#a91d1d!important;}
  @media print{
    .a4-row-control-bar,.a4-row-delete-btn{display:none!important;visibility:hidden!important;}
    .a4-row-delete-cell{padding-left:1mm!important;}
  }
</style>
<script id="a4-row-controls-restore-script">
(function(){
  if(window.__AETERLINK_A4_ROW_CONTROLS_RESTORE__) return;
  window.__AETERLINK_A4_ROW_CONTROLS_RESTORE__ = true;

  function rootList(){
    var roots=[].slice.call(document.querySelectorAll('#a4Preview,#a4CheckOutput,.a4-print-area,#a4PrintArea'));
    return roots.filter(function(r,i,a){return r && a.indexOf(r)===i;});
  }
  function isDataTable(table){
    if(!table || !table.tBodies || !table.tBodies.length) return false;
    if(table.classList.contains('a4-info-table')) return false;
    if(table.classList.contains('a4-project-grid')) return false;
    if(table.closest('.a4-photo-block')) return false;
    if(table.closest('.mod-table-wrap')) return false;
    if(!table.closest('.a4-page')) return false;
    return true;
  }
  function dataTables(root){
    root=root||document;
    return [].slice.call(root.querySelectorAll('.a4-page .a4-content table')).filter(isDataTable);
  }
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function headerLabels(table){
    var row=table.tHead&&table.tHead.rows&&table.tHead.rows[0];
    if(!row) return [];
    return [].slice.call(row.cells).map(function(th){return String(th.textContent||'').trim();});
  }
  function statusCell(value){
    var opts=['','Not Started','In Progress','Pending','Done','Issue','N/A','Open','Closed','Approved','Submitted'];
    var v=String(value==null?'Pending':value).trim();
    var html='<select class="a4-status-select">';
    opts.forEach(function(o){html+='<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+(o?esc(o):'-')+'</option>';});
    html+='</select><span class="a4-status-print">'+esc(v)+'</span>';
    return html;
  }
  function markEditable(td){
    if(!td) return;
    td.classList.add('a4-editable');
    if(!td.querySelector('select,img,button:not(.a4-row-delete-btn),input,textarea')){
      td.contentEditable='true';
      td.spellcheck=false;
    }
  }
  function updateStatusPrint(select){
    var td=select && select.closest ? select.closest('td') : null;
    if(!td) return;
    var sp=td.querySelector('.a4-status-print');
    if(!sp){sp=document.createElement('span');sp.className='a4-status-print';td.appendChild(sp);}
    sp.textContent=select.value || '';
  }
  function ensureRowDeleteButtons(table){
    if(!isDataTable(table)) return;
    [].slice.call(table.tBodies[0].rows).forEach(function(tr){
      var first=tr.cells&&tr.cells[0];
      if(!first) return;
      first.classList.add('a4-row-delete-cell');
      if(!first.querySelector('.a4-row-delete-btn')){
        var btn=document.createElement('button');
        btn.type='button';
        btn.className='a4-row-delete-btn a4-no-print';
        btn.title='Delete this row';
        btn.setAttribute('aria-label','Delete this row');
        btn.setAttribute('contenteditable','false');
        btn.textContent='×';
        btn.addEventListener('click',function(ev){
          ev.preventDefault();
          ev.stopPropagation();
          deleteRow(btn);
        });
        first.insertBefore(btn,first.firstChild);
      }
      [].slice.call(tr.cells).forEach(markEditable);
    });
  }
  function ensureControlBar(table){
    if(!isDataTable(table)) return;
    var next=table.nextElementSibling;
    if(next && next.classList && next.classList.contains('a4-row-control-bar')) return;
    var bar=document.createElement('div');
    bar.className='a4-row-control-bar a4-no-print';
    bar.innerHTML='<button type="button" class="a4-add-row-btn">+ Add Row</button>';
    bar.querySelector('.a4-add-row-btn').addEventListener('click',function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      addRow(table);
    });
    table.parentNode.insertBefore(bar,table.nextSibling);
  }
  function normalizeControls(root){
    dataTables(root||document).forEach(function(table){
      ensureRowDeleteButtons(table);
      ensureControlBar(table);
    });
  }
  function addRow(table){
    if(!table || !isDataTable(table)) return;
    var labels=headerLabels(table);
    var cols=labels.length || (table.tBodies[0].rows[0] ? table.tBodies[0].rows[0].cells.length : 1);
    var tr=table.tBodies[0].insertRow(-1);
    for(var i=0;i<cols;i++){
      var td=tr.insertCell(-1);
      var label=labels[i]||'';
      if(/status/i.test(label)){
        td.innerHTML=statusCell('Pending');
        td.contentEditable='false';
      }else{
        td.textContent='';
        markEditable(td);
      }
    }
    ensureRowDeleteButtons(table);
    syncRowsFromFirstScopeTable();
    if(window.AETERLINK_REPAGINATE_A4) setTimeout(window.AETERLINK_REPAGINATE_A4,80);
    if(window.AETERLINK_UPDATE_A4_FOOTERS) setTimeout(window.AETERLINK_UPDATE_A4_FOOTERS,120);
  }
  function deleteRow(btn){
    var tr=btn && btn.closest ? btn.closest('tr') : null;
    if(!tr || !tr.parentNode) return;
    var table=tr.closest('table');
    tr.parentNode.removeChild(tr);
    syncRowsFromFirstScopeTable();
    normalizeControls(table && table.closest('.a4-page') || document);
    if(window.AETERLINK_REPAGINATE_A4) setTimeout(window.AETERLINK_REPAGINATE_A4,80);
    if(window.AETERLINK_UPDATE_A4_FOOTERS) setTimeout(window.AETERLINK_UPDATE_A4_FOOTERS,120);
  }
  function cleanCellText(td){
    var select=td.querySelector('select');
    if(select) return String(select.value||'').trim();
    var clone=td.cloneNode(true);
    clone.querySelectorAll('.a4-row-delete-btn,.a4-no-print,button,input,select,.a4-status-print').forEach(function(n){n.remove();});
    return String(clone.textContent||'').trim();
  }
  function keyFromHeader(label,index){
    var s=String(label||'').trim();
    if(/work\s*description/i.test(s)) return 'WorkDescription';
    if(/^qty\.?$/i.test(s)) return 'Qty';
    if(/^remarks?$/i.test(s)) return 'Remarks';
    if(/^no\.?$/i.test(s)) return 'No';
    if(!s) return 'Col'+index;
    return s.replace(/[^A-Za-z0-9]+/g,'');
  }
  function syncRowsFromFirstScopeTable(){
    var fRows=document.getElementById('fRows');
    if(!fRows) return;
    var table=document.querySelector('#a4Preview table.a4-scope-table,#a4Preview .a4-page .a4-content table');
    if(!isDataTable(table)) return;
    var headers=headerLabels(table);
    var rows=[].slice.call(table.tBodies[0].rows).map(function(tr){
      var obj={};
      [].slice.call(tr.cells).forEach(function(td,i){obj[keyFromHeader(headers[i],i)]=cleanCellText(td);});
      return obj;
    });
    try{fRows.value=JSON.stringify(rows,null,2);}catch(e){}
  }
  function patchRenderer(){
    if(!window.AETERLINK_A4_RENDERER) return;
    window.AETERLINK_A4_RENDERER.addRow=function(btn){
      var table=btn && btn.closest ? btn.closest('.a4-content').querySelector('table') : null;
      if(!isDataTable(table)) table=document.querySelector('#a4Preview .a4-page .a4-content table');
      addRow(table);
    };
    window.AETERLINK_A4_RENDERER.deleteRow=function(btn){deleteRow(btn);};
    window.AETERLINK_A4_RENDERER.deleteLastRow=function(btn){
      var table=btn && btn.closest ? btn.closest('.a4-content').querySelector('table') : null;
      if(!isDataTable(table)) return;
      var body=table.tBodies[0];
      if(body && body.rows.length) body.deleteRow(body.rows.length-1);
      syncRowsFromFirstScopeTable();
      normalizeControls(table.closest('.a4-page')||document);
    };
  }
  function patchPreview(){
    if(window.previewCurrentForm && !window.previewCurrentForm.__rowControlsRestorePatch){
      var old=window.previewCurrentForm;
      window.previewCurrentForm=function(){
        var ret=old.apply(this,arguments);
        setTimeout(run,80);
        setTimeout(run,250);
        return ret;
      };
      window.previewCurrentForm.__rowControlsRestorePatch=true;
    }
  }
  function run(){
    patchRenderer();
    patchPreview();
    rootList().forEach(normalizeControls);
  }
  document.addEventListener('change',function(ev){
    if(ev.target && ev.target.classList && ev.target.classList.contains('a4-status-select')){
      updateStatusPrint(ev.target);
      syncRowsFromFirstScopeTable();
    }
  },true);
  document.addEventListener('input',function(ev){
    if(ev.target && ev.target.closest && ev.target.closest('#a4Preview')) syncRowsFromFirstScopeTable();
  },true);
  var scheduled=null;
  function schedule(){clearTimeout(scheduled);scheduled=setTimeout(run,120);}
  if(!window.__AETERLINK_ROW_CONTROL_OBSERVER__){
    window.__AETERLINK_ROW_CONTROL_OBSERVER__=new MutationObserver(function(muts){
      for(var i=0;i<muts.length;i++){
        var nodes=[].slice.call(muts[i].addedNodes||[]);
        if(nodes.some(function(n){return n.nodeType===1 && (n.matches&&n.matches('.a4-page,table') || n.querySelector&&n.querySelector('.a4-page,table'));})){
          schedule();return;
        }
      }
    });
    window.__AETERLINK_ROW_CONTROL_OBSERVER__.observe(document.body,{childList:true,subtree:true});
  }
  document.addEventListener('DOMContentLoaded',function(){setTimeout(run,200);setTimeout(run,900);setTimeout(run,2200);});
  var timer=setInterval(run,700);
  setTimeout(function(){clearInterval(timer);run();},18000);
  window.AETERLINK_A4_ROW_CONTROLS={run:run,addRow:addRow,deleteRow:deleteRow,syncRows:syncRowsFromFirstScopeTable};
})();
</script>
