<!--
  AETERLINK Documentation Module — Templates_WCR.html
  Work Completion Report template partial for modular WebApp.
-->
<script>
  window.AETERLINK_TEMPLATES = window.AETERLINK_TEMPLATES || {};

  window.AETERLINK_TEMPLATES.WCR = {
    templateCodes: ['PJ-WCR-001', 'PJ-WORK-COMPLETE-001'],
    title: 'WORK COMPLETION REPORT',
    projectInfoFields: ['Project Code', 'Project Name / Site', 'Client', 'Main-Contractor'],
    sections: {
      documentInformation: 'DOCUMENT INFORMATION',
      scopeStatus: 'SCOPE OF WORK — COMPLETION STATUS',
      scopeContinued: 'SCOPE OF WORK — CONTINUED',
      photoReport: 'PHOTO REPORT',
      approval: 'APPROVAL / ACCEPTANCE'
    },
    rules: {
      photosPerPage: 2,
      hideActionColumnOnPrint: true,
      useMasterA4Layout: true,
      preventFooterOverlap: true,
      paginateScopeRows: true,
      continuedPageTitle: 'SCOPE OF WORK — CONTINUED'
    },
    columns: {
      scope: [
        { key: 'No', label: 'No.', width: '9mm' },
        { key: 'Description', label: 'Description / Scope of Work', width: 'auto' },
        { key: 'Location', label: 'Location', width: '26mm' },
        { key: 'Status', label: 'Status', width: '22mm' },
        { key: 'Remark', label: 'Remark', width: '32mm' }
      ],
      photos: [
        { key: 'PhotoUrl', label: 'Photo' },
        { key: 'Caption', label: 'Caption / Description' }
      ]
    }
  };

  window.AETERLINK_TEMPLATES.WCR.sampleData = function() {
    return {
      ProjectCode: 'TEST-PJ',
      ProjectName: 'Modular A4 Layout Check',
      Client: 'Sample Client',
      MainContractor: 'AETERLINK',
      DocumentNo: 'TEST-WCR-0001',
      RevisionNo: 'R00',
      Status: 'Draft',
      ScopeRows: [
        { No:'1', Description:'Completed installation verification and visual inspection.', Location:'Main Plant Room', Status:'Done', Remark:'Accepted' },
        { No:'2', Description:'Checked control panel wiring termination and label condition.', Location:'Control Panel', Status:'Done', Remark:'No issue' },
        { No:'3', Description:'Verified work area cleanup and handover readiness.', Location:'Site Area', Status:'Done', Remark:'Ready for client review' }
      ],
      Photos: [
        { PhotoUrl:'', Caption:'Photo 1 — work area before completion review' },
        { PhotoUrl:'', Caption:'Photo 2 — work area after completion review' }
      ]
    };
  };

  window.AETERLINK_TEMPLATES.WCR.render = function(data, options) {
    data = Object.assign(window.AETERLINK_TEMPLATES.WCR.sampleData(), data || {});
    options = options || {};
    var tpl = window.AETERLINK_TEMPLATES.WCR;
    var rows = data.ScopeRows || [];
    var html = '';

    html += AETERLINK_A4_RENDERER.page({
      title: tpl.title,
      documentNo: data.DocumentNo || '',
      revisionNo: data.RevisionNo || 'R00',
      status: data.Status || 'Draft',
      content: AETERLINK_A4_RENDERER.documentInfo(data) +
        AETERLINK_A4_RENDERER.section(tpl.sections.scopeStatus) +
        AETERLINK_A4_RENDERER.table(tpl.columns.scope, rows)
    });

    var photos = data.Photos || [];
    for (var i = 0; i < photos.length; i += tpl.rules.photosPerPage) {
      html += AETERLINK_A4_RENDERER.page({
        title: tpl.title,
        documentNo: data.DocumentNo || '',
        revisionNo: data.RevisionNo || 'R00',
        status: data.Status || 'Draft',
        content: AETERLINK_A4_RENDERER.section(tpl.sections.photoReport) +
          AETERLINK_A4_RENDERER.photoGrid(photos.slice(i, i + tpl.rules.photosPerPage))
      });
    }

    return '<div class="a4-root a4-print-area" id="a4PrintArea">' + html + '</div>';
  };
</script>
