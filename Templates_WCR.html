  function patch(){if(!window.AETERLINK_A4_RENDERER||!byId('fTemplate'))return;window.activeTemplate=function(){var c=code();if(c==='PJ-EQUIP-CHK-001')return 'CHECKLIST';if(c==='PJ-WCR-001'||c==='PJ-WORK-COMPLETE-001')return 'WCR';return 'DETAIL';};window.sampleData=function(){var t=window.activeTemplate();if(t==='CHECKLIST')return AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.sampleData();if(t==='WCR')return AETERLINK_TEMPLATES.WCR.sampleData();return DETAIL.sampleData();};window.loadSampleForTemplate=function(){var d=window.sampleData();if(window.activeTemplate()==='CHECKLIST'){applyFormData({ProjectCode:d.ProjectCode,ProjectName:d.ProjectName,Client:d.Client,MainContractor:d.MainContractor,DocumentNo:'',RevisionNo:d.RevisionNo||'R00',Status:d.Status||'Draft',ScopeRows:d.ChecklistRows||[]});}else{applyFormData(d);}if(window.previewCurrentForm)window.previewCurrentForm();};window.previewCurrentForm=function(){try{var data=window.collectFormData?window.collectFormData():window.sampleData();var t=window.activeTemplate();var html=t==='CHECKLIST'?AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.render(data):(t==='WCR'?AETERLINK_TEMPLATES.WCR.render(data):DETAIL.render(data));var target=byId('a4Preview');if(target)target.innerHTML=html;var msg=byId('saveStatus');if(msg)msg.textContent=t==='DETAIL'?'Preview updated with detailed document template.':'Preview updated. A4 layout applied.';var prod=byId('prodStatusMsg');if(prod)prod.textContent=t==='DETAIL'?'Detailed document template applied.':'Preview updated.';if(window.AETERLINK_NORMALIZE_A4_PARITY)window.AETERLINK_NORMALIZE_A4_PARITY();if(window.AETERLINK_REPAGINATE_A4)setTimeout(window.AETERLINK_REPAGINATE_A4,120);if(window.AETERLINK_PHOTO_REPORT)setTimeout(window.AETERLINK_PHOTO_REPORT.ensureDefault,180);}catch(e){var m=byId('saveStatus');if(m)m.textContent=e.message;var p=byId('prodStatusMsg');if(p)p.textContent=e.message;}};}
