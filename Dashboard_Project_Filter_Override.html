<!-- AETERLINK Documentation Module — Dashboard_Project_Filter_Override.html -->
<style id="dashboard-project-filter-override-style">
  .doc-filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;padding:10px 12px;border:1px solid #d7e6ef;border-radius:14px;background:#fbfdfe}.doc-filter-row label{font-size:11px;font-weight:900;color:#496b80;text-transform:uppercase;letter-spacing:.04em}.doc-filter-row select{min-width:320px;border:1px solid #cfe0ea;border-radius:10px;background:#fff;color:#132f45;font-weight:800;padding:8px 10px;font-family:inherit}.doc-filter-note{font-size:12px;color:#61798a;font-weight:700}.doc-dash-label small{display:none!important}@media(max-width:700px){.doc-filter-row select{min-width:100%}}
</style>
<script id="dashboard-project-filter-override-script">
(function(){
  var S={register:[],records:[],projects:[],project:'',loaded:false,loading:false};
  function id(x){return document.getElementById(x)}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function trim(v){return String(v==null?'':v).trim()}
  function get(r,ks){for(var i=0;i<ks.length;i++){if(r&&r[ks[i]]!=null&&trim(r[ks[i]])!=='')return r[ks[i]]}return''}
  function pcode(r){return trim(get(r,['ProjectCode','Project','ProjectID','ProjectId']))}
  function stat(r){var s=trim(get(r,['Status','DocumentStatus','ApprovalStatus','ReviewStatus','PdfStatus'])).toLowerCase();if(!s)return'blank';if(/approved\s*with\s*comment|approve\s*with\s*comment|awc/.test(s))return'approvedComment';if(/revise|revision|required|rework|return|reject/.test(s))return'revise';if(/overdue|late/.test(s))return'overdue';if(/pm\s*review|pm\s*check|pm/.test(s))return'pmReview';if(/submit|submitted/.test(s))return'submitted';if(/pending|waiting|under\s*review|approval|for\s*approval/.test(s))return'pendingApproval';if(/approved|approve|issued|pdf\s*saved/.test(s))return'approved';if(/draft/.test(s))return'draft';return'other'}
  function parseDate(v){v=trim(v);if(!v)return null;var d=new Date(v);return isNaN(d.getTime())?null:d}
  function over(r,k){if(k==='approved'||k==='approvedComment')return false;var d=parseDate(get(r,['DueDate','TargetDate','RequiredDate','ReviewDueDate','ApprovalDueDate','SubmitDueDate','PlannedDate','FinishDate']));if(!d)return false;var n=new Date();n.setHours(0,0,0,0);d.setHours(0,0,0,0);return d<n}
  function docs(){var a=[],seen={};S.register.forEach(function(r){a.push(r);var x=get(r,['DocumentId','DocumentNo','FormRecordId']);if(x)seen[x]=1});S.records.forEach(function(r){var x=get(r,['DocumentId','DocumentNo','FormRecordId']);if(!x||!seen[x])a.push(r)});return S.project?a.filter(function(r){return pcode(r)===S.project}):a}
  function pname(c){for(var i=0;i<S.projects.length;i++){if(trim(S.projects[i].ProjectCode)===c)return trim(S.projects[i].ProjectName)}return''}
  function opts(){var u={};S.register.concat(S.records).forEach(function(r){var c=pcode(r);if(c)u[c]=1});S.projects.forEach(function(p){var c=trim(p.ProjectCode);if(c)u[c]=1});return '<option value="">All Projects</option>'+Object.keys(u).sort().map(function(c){return '<option value="'+esc(c)+'" '+(c===S.project?'selected':'')+'>'+esc(c+(pname(c)?' — '+pname(c):''))+'</option>'}).join('')}
  function counts(rows){var c={all:rows.length,draft:0,submitted:0,approved:0,approvedComment:0,overdue:0,revise:0,pmReview:0,pendingApproval:0};rows.forEach(function(r){var k=stat(r);if(c[k]!=null)c[k]++;if(over(r,k))c.overdue++;if(k==='submitted'||k==='pendingApproval'||k==='pmReview')c.pendingApproval++});return c}
  function card(label,value,cls,note){return '<div class="doc-dash-card '+(cls||'')+'"><div class="doc-dash-label">'+esc(label)+'</div><div class="doc-dash-value">'+esc(value)+'</div><div class="doc-dash-note">'+esc(note||'')+'</div></div>'}
  function slabel(k){return{draft:'Draft',submitted:'Submitted',approved:'Approved',approvedComment:'Approved with Comment',overdue:'Overdue',revise:'Revise Required',pmReview:'PM Review',pendingApproval:'Pending Approval',blank:'No Status',other:'Other'}[k]||k}
  function table(rows){if(!rows.length)return'<div class="doc-dash-empty">No document records found for the selected project.</div>';return'<div class="mod-table-wrap"><table class="doc-dash-table"><thead><tr><th>Document No. / ID</th><th>Document</th><th>Project</th><th>Revision</th><th>Status</th><th>Updated</th></tr></thead><tbody>'+rows.map(function(r){var k=stat(r);if(over(r,k))k='overdue';return'<tr><td><b>'+esc(get(r,['DocumentNo','DocumentId','FormRecordId','DocumentCode'])||'-')+'</b></td><td>'+esc(get(r,['DocumentTitle','TemplateName','DocumentCode','TemplateCode'])||'-')+'</td><td>'+esc(pcode(r)||'-')+'</td><td>'+esc(get(r,['RevisionNo','Revision'])||'-')+'</td><td><span class="doc-dash-pill">'+esc(slabel(k))+'</span></td><td>'+esc(get(r,['UpdatedAt','SubmittedAt','DueDate'])||'-')+'</td></tr>'}).join('')+'</tbody></table></div>'}
  function render(){var host=id('view-dashboard');if(!host)return;var rows=docs(),c=counts(rows),att=rows.filter(function(r){var k=stat(r);return over(r,k)||['revise','pmReview','pendingApproval','submitted','approvedComment'].indexOf(k)>=0}).slice(0,12);var scope=S.project?'Project: '+S.project+(pname(S.project)?' — '+pname(S.project):''):'All Projects';host.innerHTML='<div class="doc-control-dashboard"><div class="aeterlink-card doc-dash-header"><div><h2 class="doc-dash-title">Document Control Dashboard</h2><p class="doc-dash-subtitle">Document status monitoring by project for PM, reviewers and approvers.</p><div class="doc-filter-row"><label>Project</label><select onchange="AETERLINK_DOC_DASHBOARD.setProject(this.value)">'+opts()+'</select><span class="doc-filter-note">'+esc(scope)+' · '+rows.length+' document(s)</span></div></div><div class="doc-dash-actions"><button class="mod-btn primary" onclick="showView(\'documents\')">+ Create Form</button><button class="mod-btn" onclick="showView(\'register\')">Document Register</button><button class="mod-btn" onclick="AETERLINK_DOC_DASHBOARD.refresh()">Refresh</button></div></div><div class="doc-dash-grid">'+card('All Documents',c.all,'neutral','Total document records in selected scope')+card('Draft',c.draft,'neutral','Documents not yet submitted')+card('Submitted',c.submitted,'','Submitted and waiting for next action')+card('Approved',c.approved,'success','Approved / issued documents')+card('Approved with Comment',c.approvedComment,'warning','Approved but comments must be closed')+card('Overdue',c.overdue,'danger','Late document action based on due date or status')+card('Revise Required',c.revise,'danger','Rejected / returned / revision required')+card('PM Review',c.pmReview,'warning','Waiting for PM review')+card('Pending Approval',c.pendingApproval,'warning','Waiting for approval / under review')+'</div><div class="aeterlink-card doc-dash-section"><h3>Documents Requiring Attention</h3>'+table(att)+'</div><div class="aeterlink-card doc-dash-section"><h3>Latest Documents</h3>'+table(rows.slice(0,10))+'</div></div>'}
  function run(name,ok,fail){google.script.run.withSuccessHandler(ok).withFailureHandler(fail||function(){}).apiModularTable(name)}
  function load(){if(S.loading)return;S.loading=true;if(typeof google==='undefined'||!google.script||!google.script.run){S.loading=false;render();return}run('DOCUMENT_REGISTER',function(a){S.register=(a&&a.rows)||[];run('FORM_RECORDS',function(b){S.records=(b&&b.rows)||[];run('PROJECTS',function(c){S.projects=(c&&c.rows)||[];S.loaded=true;S.loading=false;render()},function(){S.loaded=true;S.loading=false;render()})},function(){S.loading=false;render()})},function(){S.loading=false;render()})}
  function patch(){if(window.showView&&!window.showView.__docDashProjectPatch2){var old=window.showView;window.showView=function(n){var r=old.apply(this,arguments);if(n==='dashboard'){setTimeout(render,40);setTimeout(load,250)}return r};window.showView.__docDashProjectPatch2=1}if(window.refreshData&&!window.refreshData.__docDashProjectPatch2){var rr=window.refreshData;window.refreshData=function(){var r=rr.apply(this,arguments);setTimeout(load,450);return r};window.refreshData.__docDashProjectPatch2=1}}
  window.AETERLINK_DOC_DASHBOARD={refresh:load,render:render,state:S,setProject:function(v){S.project=trim(v);render()}};
  function boot(){patch();if(id('view-dashboard')){if(!S.loaded)load();else render()}}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,300);setTimeout(boot,1200);setTimeout(boot,2600)});
  var force=setInterval(function(){patch();var h=id('view-dashboard');if(h&&(!h.querySelector('.doc-filter-row')||/10\.3|สำหรับ/.test(h.textContent||''))){S.loaded?render():load()}},500);
  setTimeout(function(){clearInterval(force);boot()},25000);
})();
</script>
