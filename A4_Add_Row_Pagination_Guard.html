<!-- AETERLINK Documentation Module — A4_Add_Row_Pagination_Guard.html -->
<!-- Dynamic A4 height paginator. Uses real table/button bottom against the A4 content area, not a fixed row count. -->
<script id="a4-add-row-pagination-guard-script">
(function(){
  if(window.__AETERLINK_A4_ADD_ROW_PAGINATION_GUARD_V3__) return;
  window.__AETERLINK_A4_ADD_ROW_PAGINATION_GUARD_V3__ = true;

  var running = false;
  var timer = null;
  var RESERVE_PX = 18; // safety gap above footer/content bottom; reduce/increase here only if needed.

  function root(){ return document.getElementById('a4Preview') || document.getElementById('a4CheckOutput') || document; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>\"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c]; }); }
  function pages(){ return Array.prototype.slice.call(root().querySelectorAll('.a4-page')); }
  function selector(type){ return type === 'eq' ? 'table.a4-equipment-checklist-table' : 'table.a4-work-completion-table'; }
  function tableOn(page,type){ return page && page.querySelector(selector(type)); }
  function isTypePage(page,type){ return !!tableOn(page,type); }
  function typePages(type){ return pages().filter(function(p){ return isTypePage(p,type); }); }
  function sectionHtml(type){ return '<div class="a4-section-title a4-editable a4-section-scope" contenteditable="true" spellcheck="false">' + (type === 'eq' ? 'EQUIPMENT CHECKLIST — CONTINUED' : 'SCOPE OF WORK — CONTINUED') + '</div>'; }
  function barHtml(type){ return '<div class="a4-clean-row-bar a4-no-print"><button type="button" class="a4-clean-add-row" data-a4-type="' + type + '">+ Add Row</button></div>'; }
  function emptyTableFrom(table){
    var clone = table.cloneNode(true);
    clone.querySelectorAll('tbody tr').forEach(function(tr){ tr.remove(); });
    clone.querySelectorAll('.a4-clean-delete-row,.a4-row-delete-btn,.a4-no-print').forEach(function(n){ n.remove(); });
    return clone.outerHTML;
  }
  function createContinuationPage(afterPage,type,sourceTable){
    var page = afterPage.cloneNode(true);
    var content = page.querySelector('.a4-content');
    if(content) content.innerHTML = sectionHtml(type) + emptyTableFrom(sourceTable) + barHtml(type);
    page.querySelectorAll('.a4-clean-delete-row,.a4-row-delete-btn').forEach(function(n){ n.remove(); });
    afterPage.parentNode.insertBefore(page, afterPage.nextSibling);
    decorate(page);
    return page;
  }
  function nextTypePage(page,type,sourceTable){
    var n = page.nextElementSibling;
    if(n && n.classList && n.classList.contains('a4-page') && isTypePage(n,type)) return n;
    return createContinuationPage(page,type,sourceTable);
  }
  function usedBottom(page){
    var content = page && page.querySelector('.a4-content');
    if(!content) return 0;
    var bottom = 0;
    Array.prototype.slice.call(content.children).forEach(function(ch){
      if(ch.offsetParent === null) return;
      var r = ch.getBoundingClientRect();
      if(r.height > 0) bottom = Math.max(bottom, r.bottom);
    });
    return bottom;
  }
  function limitBottom(page){
    var content = page && page.querySelector('.a4-content');
    if(!content) return 0;
    return content.getBoundingClientRect().bottom - RESERVE_PX;
  }
  function tooFull(page){
    var content = page && page.querySelector('.a4-content');
    if(!content) return false;
    var cssOverflow = content.scrollHeight > content.clientHeight + 1;
    var geometryOverflow = usedBottom(page) > limitBottom(page);
    return cssOverflow || geometryOverflow;
  }
  function moveLastForward(page,type){
    var table = tableOn(page,type);
    if(!table || !table.tBodies || !table.tBodies[0]) return false;
    var body = table.tBodies[0];
    if(body.rows.length <= 1 || !tooFull(page)) return false;
    var row = body.rows[body.rows.length - 1];
    var next = nextTypePage(page,type,table);
    var nextTable = tableOn(next,type);
    if(!nextTable || !nextTable.tBodies || !nextTable.tBodies[0]) return false;
    nextTable.tBodies[0].insertBefore(row, nextTable.tBodies[0].firstChild);
    return true;
  }
  function canAcceptRow(page,type,row,nextBody){
    var table = tableOn(page,type);
    if(!table || !table.tBodies || !table.tBodies[0]) return false;
    table.tBodies[0].appendChild(row);
    var ok = !tooFull(page);
    if(!ok) nextBody.insertBefore(row, nextBody.firstChild);
    return ok;
  }
  function pullOneBack(page,nextPage,type){
    var nextTable = tableOn(nextPage,type);
    if(!nextTable || !nextTable.tBodies || !nextTable.tBodies[0]) return false;
    var nextBody = nextTable.tBodies[0];
    if(!nextBody.rows.length) return false;
    return canAcceptRow(page,type,nextBody.rows[0],nextBody);
  }
  function removeEmptyContinuationPages(type){
    typePages(type).forEach(function(page){
      var table = tableOn(page,type);
      if(!table || !table.tBodies || !table.tBodies[0] || table.tBodies[0].rows.length) return;
      var title = String((page.querySelector('.a4-section-title') || {}).textContent || '');
      if(/CONTINUED/i.test(title)) page.remove();
    });
  }
  function decorate(base){
    base = base || root();
    base.querySelectorAll('.a4-row-control-bar:not(.a4-clean-row-bar),.a4-preview-actions:not(.a4-photo-actions),.row-actions,.prod-inline-editor,.prod-row-delete').forEach(function(n){ n.remove(); });
    base.querySelectorAll('button').forEach(function(b){ if(/delete\s*last\s*row/i.test(b.textContent || '')) b.remove(); });
    base.querySelectorAll('.a4-title,.a4-subtitle,.a4-section-title').forEach(function(n){ n.contentEditable = 'true'; n.spellcheck = false; });
    base.querySelectorAll('table.a4-scope-table tbody tr').forEach(function(tr){
      var td = tr.cells && tr.cells[0];
      if(!td) return;
      td.style.position = 'relative';
      td.style.overflow = 'visible';
      td.querySelectorAll('.a4-clean-delete-row,.a4-row-delete-btn').forEach(function(x){ x.remove(); });
      td.insertAdjacentHTML('afterbegin','<button type="button" class="a4-clean-delete-row a4-no-print" title="Delete this row" aria-label="Delete this row">×</button>');
    });
  }
  function updateFooters(){
    var ps = pages();
    var doc = (document.getElementById('fDocumentNo') && document.getElementById('fDocumentNo').value) || 'Not issued';
    ps.forEach(function(p,i){
      var f = p.querySelector('.a4-footer');
      if(f) f.innerHTML = '<span class="a4-footer-center">Document No.: ' + esc(doc) + ' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: ' + (i+1) + ' / ' + ps.length + '</span>';
    });
  }
  function push(type){
    var safety = 0;
    while(safety++ < 900){
      var did = false;
      var list = typePages(type);
      for(var i=0;i<list.length;i++){
        if(moveLastForward(list[i],type)){ did = true; break; }
      }
      if(!did) break;
    }
  }
  function pull(type){
    var safety = 0;
    while(safety++ < 900){
      var did = false;
      var list = typePages(type);
      for(var i=0;i<list.length-1;i++){
        if(pullOneBack(list[i],list[i+1],type)){ did = true; break; }
      }
      if(!did) break;
    }
  }
  function syncRows(type){
    var rows = [];
    root().querySelectorAll(selector(type)).forEach(function(table){
      if(!table.tBodies || !table.tBodies[0]) return;
      Array.prototype.slice.call(table.tBodies[0].rows).forEach(function(tr,idx){
        var c = tr.cells;
        function txt(i){
          var td = c[i]; if(!td) return '';
          var clone = td.cloneNode(true);
          clone.querySelectorAll('button,.a4-no-print').forEach(function(n){ n.remove(); });
          return String(clone.textContent || '').replace(/^[\s×✕✖xX*•-]+/,'').trim();
        }
        if(type === 'eq' && c.length >= 11) rows.push({No:txt(0)||String(idx+1),ItemDescription:txt(1),Brand:txt(2),Model:txt(3),InstalledQuantity:txt(4),Localisation:txt(5),Floor:txt(6),InstallationPosition:txt(7),InstallationCondition:txt(8),ConfirmationPower:txt(9),Remarks:txt(10)});
        if(type === 'wcr' && c.length >= 6) rows.push({Item:txt(0),WorkDescription:txt(1),Qty:txt(2),Unit:txt(3),Status:txt(4)||'Pending',Remarks:txt(5)});
      });
    });
    var f = document.getElementById('fRows');
    if(f && rows.length) try{ f.value = JSON.stringify(rows,null,2); }catch(e){}
  }
  function repaginateType(type){
    push(type);
    pull(type);
    push(type);
    removeEmptyContinuationPages(type);
    syncRows(type);
  }
  function run(){
    if(running) return;
    running = true;
    try{
      decorate(root());
      repaginateType('wcr');
      repaginateType('eq');
      decorate(root());
      updateFooters();
    } finally { running = false; }
  }
  function schedule(delay){ clearTimeout(timer); timer = setTimeout(run, delay == null ? 120 : delay); }
  function patchPreview(){
    if(typeof window.previewCurrentForm === 'function' && !window.previewCurrentForm.__a4PaginationGuardV3){
      var old = window.previewCurrentForm;
      window.previewCurrentForm = function(){ var ret = old.apply(this, arguments); schedule(420); setTimeout(run,900); return ret; };
      window.previewCurrentForm.__a4PaginationGuardV3 = true;
    }
    if(typeof window.prodRefreshA4 === 'function' && !window.prodRefreshA4.__a4PaginationGuardV3){
      var oldR = window.prodRefreshA4;
      window.prodRefreshA4 = function(){ var ret = oldR.apply(this, arguments); schedule(420); setTimeout(run,900); return ret; };
      window.prodRefreshA4.__a4PaginationGuardV3 = true;
    }
  }
  function isAddOrDeleteTarget(e){ return !!(e.target && e.target.closest && e.target.closest('.a4-clean-add-row,.a4-clean-delete-row,.a4-add-row-btn,.a4-row-delete-btn,.a4-fast-add-row-btn,.a4-eqc-fast-add-row-btn,.a4-paged-add-row-btn')); }
  window.addEventListener('click', function(e){ if(isAddOrDeleteTarget(e)){ schedule(450); setTimeout(run,950); } }, true);
  document.addEventListener('click', function(e){ if(isAddOrDeleteTarget(e)){ schedule(450); setTimeout(run,950); } }, true);
  document.addEventListener('input', function(e){ if(e.target && e.target.closest && e.target.closest('#a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table')) schedule(500); }, true);
  function boot(){ patchPreview(); schedule(650); setTimeout(run,1600); setTimeout(run,2600); }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(boot,0); setTimeout(boot,1200); });
  window.addEventListener('load', function(){ setTimeout(boot,0); setTimeout(boot,1200); });
  setTimeout(boot,900);
  window.AETERLINK_A4_ADD_ROW_PAGINATION_GUARD = { run:run, schedule:schedule, reservePx:RESERVE_PX };
})();
</script>
