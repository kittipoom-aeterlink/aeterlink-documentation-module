<!-- AETERLINK Documentation Module — A4_Pagination_Fix.html -->
<style>
  /* Keep the scope table inside the printable content box and prevent the right Remarks border from being clipped. */
  .a4-scope-table{
    width:calc(100% - .2mm)!important;
    max-width:calc(100% - .2mm)!important;
    border-collapse:separate!important;
    border-spacing:0!important;
    border:1px solid #666!important;
    box-shadow:inset -1px 0 0 #666,inset 0 -1px 0 #666!important;
  }
  .a4-scope-table th,
  .a4-scope-table td{
    border:0!important;
    border-right:1px solid #666!important;
    border-bottom:1px solid #666!important;
    box-shadow:none!important;
  }
  .a4-scope-table tr > *:last-child{
    border-right:0!important;
    box-shadow:inset -1px 0 0 #666!important;
  }
  .a4-scope-table tbody tr:last-child > *,
  .a4-scope-table thead tr:last-child > *{
    border-bottom:1px solid #666!important;
  }
  .a4-scope-table td:nth-child(7),
  .a4-scope-table th:nth-child(7){
    box-shadow:inset -1px 0 0 #666!important;
  }
  .a4-footer{
    justify-content:center!important;
    align-items:center!important;
    text-align:center!important;
    gap:0!important;
    color:#555!important;
  }
  .a4-footer > span:not(.a4-footer-center){display:none!important;}
  .a4-footer-center{
    display:block!important;
    width:100%!important;
    text-align:center!important;
    font-size:6.4pt!important;
    line-height:1.15!important;
    font-weight:700!important;
    color:#555!important;
  }
  @media print{
    @page{size:A4 portrait;margin:0!important;}
    html,body{width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}
    body *{visibility:visible!important;}
    .a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}
    .a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;}
    .a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}
    .a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;}
    .a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}
    .a4-scope-table{width:calc(100% - .2mm)!important;max-width:calc(100% - .2mm)!important;border-collapse:separate!important;border-spacing:0!important;border:1px solid #666!important;box-shadow:inset -1px 0 0 #666,inset 0 -1px 0 #666!important;}
    .a4-scope-table th,.a4-scope-table td{border:0!important;border-right:1px solid #666!important;border-bottom:1px solid #666!important;box-shadow:none!important;}
    .a4-scope-table tr > *:last-child{border-right:0!important;box-shadow:inset -1px 0 0 #666!important;}
    .a4-scope-table td:nth-child(7),.a4-scope-table th:nth-child(7){box-shadow:inset -1px 0 0 #666!important;}
    .a4-no-print,.a4-preview-actions,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column{display:none!important;visibility:hidden!important;}
    .a4-status-select{display:none!important;visibility:hidden!important;}
    .a4-status-print{display:inline!important;visibility:visible!important;}
    .a4-footer{justify-content:center!important;text-align:center!important;}
    .a4-footer > span:not(.a4-footer-center){display:none!important;}
    .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;color:#555!important;}
  }
</style>
<script>
(function(){
  function rr(){ return window.AETERLINK_A4_RENDERER; }
  function area(){ return document.querySelector('#a4Preview .a4-print-area') || document.querySelector('.a4-print-area'); }
  function allAreas(){ return [].slice.call(document.querySelectorAll('#a4Preview .a4-print-area,.a4-print-area')).filter(function(root,idx,arr){ return arr.indexOf(root)===idx; }); }
  function pageOf(node){ return node ? node.closest('.a4-page') : null; }
  function bodyOf(table){ return table && table.tBodies && table.tBodies.length ? table.tBodies[0] : null; }
  function isContinued(page){ return !!(page && page.classList && page.classList.contains('a4-scope-continued-page')); }
  function isVisible(node){ if(!node) return false; var r=node.getBoundingClientRect(); return r.width>100 && r.height>100; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function safeLimit(page){ var r=page.getBoundingClientRect(); return r.height<500 ? null : r.height-78; }
  function rowBottomInPage(row,page){ var r=row.getBoundingClientRect(), p=page.getBoundingClientRect(); return r.bottom-p.top; }

  function hardenTableBorders(root){
    root = root || area() || document;
    root.querySelectorAll('table.a4-scope-table').forEach(function(table){
      table.style.width='calc(100% - .2mm)';
      table.style.maxWidth='calc(100% - .2mm)';
      table.style.borderCollapse='separate';
      table.style.borderSpacing='0';
      table.style.border='1px solid #666';
      table.style.boxShadow='inset -1px 0 0 #666, inset 0 -1px 0 #666';
      table.querySelectorAll('th,td').forEach(function(cell){
        cell.style.border='0';
        cell.style.borderRight='1px solid #666';
        cell.style.borderBottom='1px solid #666';
        cell.style.boxShadow='none';
      });
      table.querySelectorAll('tr > *:last-child').forEach(function(cell){
        cell.style.borderRight='0';
        cell.style.boxShadow='inset -1px 0 0 #666';
      });
    });
  }

  function docNoFromRoot(root){
    root = root || area() || document;
    var rows=root.querySelectorAll('.a4-meta-row');
    for(var i=0;i<rows.length;i++){
      var label=(rows[i].querySelector('b')||{}).textContent || '';
      if(label.toLowerCase().indexOf('doc no')>=0){
        var span=rows[i].querySelector('span,.a4-editable');
        var val=(span?span.textContent:rows[i].textContent.replace(label,'')) || '';
        return val.trim() || 'Not issued';
      }
    }
    var input=document.getElementById('fDocumentNo');
    return input && input.value ? input.value.trim() : 'Not issued';
  }
  function updateFooters(root){
    root = root || area();
    if(!root) return;
    var pages=[].slice.call(root.querySelectorAll(':scope > .a4-page'));
    if(!pages.length) pages=[].slice.call(root.querySelectorAll('.a4-page'));
    if(!pages.length) return;
    var docNo=docNoFromRoot(root) || 'Not issued';
    var total=pages.length;
    pages.forEach(function(page,index){
      var footer=page.querySelector('.a4-footer');
      if(!footer) return;
      var desired='Document No.: '+esc(docNo)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(index+1)+' / '+total;
      if(footer.getAttribute('data-a4-page-no')===String(index+1)+'/'+String(total)+'|'+docNo) return;
      footer.innerHTML='<span class="a4-footer-center">'+desired+'</span>';
      footer.setAttribute('data-a4-page-no',String(index+1)+'/'+String(total)+'|'+docNo);
    });
  }
  function updateAllFooters(){ allAreas().forEach(updateFooters); }
  function normalize(root){ hardenTableBorders(root); updateFooters(root); }

  function removeEmptyContinuedPages(){
    document.querySelectorAll('.a4-scope-continued-page').forEach(function(page){
      if(page.querySelectorAll('table.a4-scope-table tbody tr').length===0) page.remove();
    });
  }
  function firstScopePage(){ var a=area(); if(!a||!isVisible(a)) return null; var t=a.querySelector('.a4-page:not(.a4-scope-continued-page) table.a4-scope-table'); return t?pageOf(t):null; }
  function firstScopeTable(){ var p=firstScopePage(); return p?p.querySelector('table.a4-scope-table'):null; }
  function collectRowsAndResetToFirstPage(){
    var a=area(), first=firstScopeTable();
    if(!a||!first||!isVisible(a)||!isVisible(first)) return null;
    var rows=[];
    a.querySelectorAll('table.a4-scope-table tbody tr').forEach(function(row){ rows.push(row); });
    a.querySelectorAll('.a4-scope-continued-page').forEach(function(page){ page.remove(); });
    var body=bodyOf(first); if(!body) return null;
    body.innerHTML=''; rows.forEach(function(row){ body.appendChild(row); });
    return first;
  }
  function createContinuedPage(basePage,sourceTable){
    var R=rr();
    var page=document.createElement('div'); page.className='a4-page a4-scope-continued-page';
    var inner=document.createElement('div'); inner.className='a4-page-inner';
    ['.a4-header','.a4-project-grid'].forEach(function(sel){ var n=basePage.querySelector(sel); if(n) inner.appendChild(n.cloneNode(true)); });
    var content=document.createElement('div'); content.className='a4-content';
    var sec=document.createElement('div'); sec.innerHTML=R&&R.section?R.section('SCOPE OF WORK — CONTINUED'):'<div class="a4-section-title">SCOPE OF WORK — CONTINUED</div>'; content.appendChild(sec.firstChild);
    var table=sourceTable.cloneNode(false); table.appendChild(sourceTable.tHead.cloneNode(true)); table.appendChild(document.createElement('tbody')); content.appendChild(table);
    var actions=document.createElement('div'); actions.className='a4-preview-actions a4-no-print'; actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button>'; content.appendChild(actions);
    inner.appendChild(content); var footer=basePage.querySelector('.a4-footer'); if(footer) inner.appendChild(footer.cloneNode(true)); page.appendChild(inner); return page;
  }
  function ensureNextScopePage(currentPage,sourceTable){
    var next=currentPage.nextElementSibling;
    if(next&&isContinued(next)) return next;
    next=createContinuedPage(currentPage,sourceTable);
    currentPage.parentNode.insertBefore(next,currentPage.nextElementSibling);
    return next;
  }
  function paginateFromTable(table,depth){
    depth=depth||0; if(depth>30) return;
    var page=pageOf(table), body=bodyOf(table); if(!page||!body||!isVisible(page)||!isVisible(table)) return;
    var limit=safeLimit(page); if(limit===null) return;
    var moved=[], guard=0;
    while(body.rows.length>1 && rowBottomInPage(body.rows[body.rows.length-1],page)>limit && guard<120){
      guard++; var row=body.rows[body.rows.length-1]; moved.unshift(row); body.removeChild(row);
    }
    if(!moved.length) return;
    var next=ensureNextScopePage(page,table), nextTable=next.querySelector('table.a4-scope-table'), nextBody=bodyOf(nextTable);
    moved.forEach(function(row){ nextBody.appendChild(row); });
    paginateFromTable(nextTable,depth+1);
  }
  function repaginateAll(){
    var first=collectRowsAndResetToFirstPage();
    if(first) paginateFromTable(first,0);
    removeEmptyContinuedPages(); normalize(area()); updateAllFooters();
  }

  function statusCell(value){
    var R=rr(), e=R&&R.escapeHtml?R.escapeHtml.bind(R):esc;
    var opts=['','Not Started','In Progress','Pending','Done','Issue','N/A'];
    var v=(value==null?'':String(value));
    var html='<select class="a4-status-select">';
    opts.forEach(function(o){ html+='<option value="'+e(o)+'"'+(o===v?' selected':'')+'>'+(o?e(o):'-')+'</option>'; });
    return html+'</select><span class="a4-status-print">'+e(v)+'</span>';
  }

  function exactPrintA4(){
    repaginateAll(); updateAllFooters();
    var src=area(); if(!src){ window.print(); return; }
    var clone=src.cloneNode(true);
    clone.querySelectorAll('.a4-no-print,.a4-preview-actions,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column').forEach(function(n){ n.remove(); });
    normalize(clone);
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent;}).join('\n');
    var exactCss='@page{size:A4 portrait;margin:0!important;}*{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}body *{visibility:visible!important}.a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}.a4-page{display:block!important;position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}.a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}.a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;display:flex!important;flex-direction:column!important;}.a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}.a4-no-print,.a4-preview-actions,.row-actions,.photo-actions{display:none!important;visibility:hidden!important}.a4-status-select{display:none!important;visibility:hidden!important}.a4-status-print{display:inline!important;visibility:visible!important}.a4-scope-table{width:calc(100% - .2mm)!important;max-width:calc(100% - .2mm)!important;border-collapse:separate!important;border-spacing:0!important;border:1px solid #666!important;box-shadow:inset -1px 0 0 #666,inset 0 -1px 0 #666!important}.a4-scope-table th,.a4-scope-table td{border:0!important;border-right:1px solid #666!important;border-bottom:1px solid #666!important}.a4-scope-table tr>*:last-child{border-right:0!important;box-shadow:inset -1px 0 0 #666!important}.a4-footer{justify-content:center!important;text-align:center!important}.a4-footer-center{display:block!important;width:100%!important;text-align:center!important;color:#555!important}';
    var win=window.open('','_blank'); if(!win){ window.print(); return; }
    win.document.open();
    win.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>A4 Print</title><style>'+styles+'\n'+exactCss+'</style></head><body>'+clone.outerHTML+'</body></html>');
    win.document.close();
    setTimeout(function(){ win.focus(); win.print(); },500);
  }

  function install(){
    var R=rr(); if(!R) return false;
    R.paginateScopeFrom=function(){ setTimeout(repaginateAll,0); };
    R.paginateAllScopeTables=function(){ repaginateAll(); };
    R.addRow=function(btn){
      var table=btn&&btn.closest?btn.closest('.a4-content').querySelector('table.a4-scope-table'):firstScopeTable(); if(!table||!bodyOf(table)) return;
      var headers=[]; if(table.tHead&&table.tHead.rows[0]) headers=[].map.call(table.tHead.rows[0].cells,function(th){return th.textContent.trim();});
      var tr=document.createElement('tr');
      headers.forEach(function(h){ var td=document.createElement('td'); if(h==='Status') td.innerHTML=statusCell('Pending'); else{td.className='a4-editable';td.contentEditable='true';td.spellcheck=false;td.textContent=(h==='Package'?'Step 1':'');} tr.appendChild(td); });
      bodyOf(table).appendChild(tr); setTimeout(repaginateAll,80);
    };
    R.deleteLastRow=function(btn){ var table=btn&&btn.closest?btn.closest('.a4-content').querySelector('table.a4-scope-table'):firstScopeTable(); if(!table||!bodyOf(table)) return; var b=bodyOf(table); if(b.rows.length)b.deleteRow(b.rows.length-1); setTimeout(repaginateAll,80); };
    R.printA4=exactPrintA4;
    return true;
  }
  function patchView(){
    if(typeof window.previewCurrentForm==='function'&&!window.__a4PaginationPreviewPatched2){ window.__a4PaginationPreviewPatched2=true; var p=window.previewCurrentForm; window.previewCurrentForm=function(){ p.apply(this,arguments); setTimeout(function(){ if(isVisible(area())) repaginateAll(); else updateAllFooters(); },180); }; }
    if(typeof window.showView==='function'&&!window.__a4PaginationShowViewPatched2){ window.__a4PaginationShowViewPatched2=true; var s=window.showView; window.showView=function(name){ s.apply(this,arguments); if(name==='documents'||name==='a4check') setTimeout(function(){ if(isVisible(area())) repaginateAll(); else updateAllFooters(); },220); }; }
  }
  var footerTimer=null;
  function scheduleFooters(){ clearTimeout(footerTimer); footerTimer=setTimeout(updateAllFooters,90); }
  function installObserver(){
    if(window.__a4FooterObserver) return;
    window.__a4FooterObserver=new MutationObserver(function(mutations){
      for(var i=0;i<mutations.length;i++){
        if(mutations[i].type==='childList'){
          var nodes=[].slice.call(mutations[i].addedNodes).concat([].slice.call(mutations[i].removedNodes));
          if(nodes.some(function(n){ return n.nodeType===1 && ((n.classList&&n.classList.contains('a4-page')) || (n.querySelector&&n.querySelector('.a4-page,.a4-footer'))); })) { scheduleFooters(); return; }
        }
      }
    });
    window.__a4FooterObserver.observe(document.body,{childList:true,subtree:true});
  }
  function boot(){ install(); patchView(); installObserver(); setTimeout(function(){ normalize(area()); updateAllFooters(); },80); }
  document.addEventListener('input',function(e){ if(e.target&&e.target.closest&&e.target.closest('.a4-page')) setTimeout(function(){normalize(area());updateAllFooters();},80); });
  document.addEventListener('change',function(e){ if(e.target&&e.target.closest&&e.target.closest('.a4-page')) setTimeout(function(){normalize(area());updateAllFooters();},80); });
  document.addEventListener('DOMContentLoaded',function(){ boot(); setTimeout(boot,250); setTimeout(function(){ if(isVisible(area())) repaginateAll(); else updateAllFooters(); },500); });
  var timer=setInterval(function(){ boot(); if(window.__a4PaginationPreviewPatched2&&window.__a4PaginationShowViewPatched2) clearInterval(timer); },150);
  window.AETERLINK_REPAGINATE_A4=repaginateAll;
  window.AETERLINK_UPDATE_A4_FOOTERS=function(){updateAllFooters();};
  window.AETERLINK_FIX_A4_TABLE_BORDERS=function(){hardenTableBorders(area());};
})();
</script>
