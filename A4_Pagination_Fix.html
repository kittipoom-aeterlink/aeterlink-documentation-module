<!-- AETERLINK Documentation Module — A4_Pagination_Fix.html -->
<style>
  .a4-scope-table,
  .a4-info-table,
  .a4-project-grid{
    border-collapse:collapse!important;
    border-spacing:0!important;
  }
  .a4-scope-table{
    border:1px solid #666!important;
    outline:1px solid #666!important;
    outline-offset:-1px!important;
  }
  .a4-scope-table th,
  .a4-scope-table td{
    border-top:1px solid #666!important;
    border-right:1px solid #666!important;
    border-bottom:1px solid #666!important;
    border-left:1px solid #666!important;
    box-shadow:none!important;
  }
  .a4-scope-table tr > *:first-child{border-left:1px solid #666!important;}
  .a4-scope-table tr > *:last-child{border-right:1px solid #666!important;}
  .a4-scope-table tbody tr:last-child > *{border-bottom:1px solid #666!important;}
  .a4-scope-table thead tr:first-child > *{border-top:1px solid #666!important;}
  .a4-footer{
    justify-content:center!important;
    align-items:center!important;
    text-align:center!important;
    gap:0!important;
    color:#555!important;
  }
  .a4-footer > span:not(.a4-footer-center){display:none!important;}
  .a4-footer-center{
    display:block!important;
    width:100%!important;
    text-align:center!important;
    font-size:6.4pt!important;
    line-height:1.15!important;
    font-weight:700!important;
    color:#555!important;
  }
  @media print{
    .a4-scope-table{border:1px solid #666!important;outline:1px solid #666!important;outline-offset:-1px!important;}
    .a4-scope-table th,.a4-scope-table td{border:1px solid #666!important;box-shadow:none!important;}
    .a4-footer{justify-content:center!important;text-align:center!important;}
    .a4-footer > span:not(.a4-footer-center){display:none!important;}
    .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;color:#555!important;}
  }
</style>
<script>
(function(){
  function rr(){ return window.AETERLINK_A4_RENDERER; }
  function area(){ return document.querySelector('#a4Preview .a4-print-area') || document.querySelector('.a4-print-area'); }
  function pageOf(node){ return node ? node.closest('.a4-page') : null; }
  function bodyOf(table){ return table && table.tBodies && table.tBodies.length ? table.tBodies[0] : null; }
  function isContinued(page){ return !!(page && page.classList && page.classList.contains('a4-scope-continued-page')); }
  function isVisible(node){
    if(!node) return false;
    var rect=node.getBoundingClientRect();
    return rect.width>100 && rect.height>100;
  }
  function safeLimit(page){
    var rect=page.getBoundingClientRect();
    if(rect.height<500) return null;
    return rect.height-78;
  }
  function rowBottomInPage(row,page){
    var r=row.getBoundingClientRect();
    var p=page.getBoundingClientRect();
    return r.bottom-p.top;
  }
  function escapeText(v){
    return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  }
  function removeEmptyContinuedPages(){
    document.querySelectorAll('.a4-scope-continued-page').forEach(function(page){
      var rows=page.querySelectorAll('table.a4-scope-table tbody tr');
      if(rows.length===0) page.remove();
    });
  }
  function hardenTableBorders(){
    var a=area();
    if(!a) return;
    a.querySelectorAll('table.a4-scope-table').forEach(function(table){
      table.style.borderCollapse='collapse';
      table.style.borderSpacing='0';
      table.style.border='1px solid #666';
      table.style.outline='1px solid #666';
      table.style.outlineOffset='-1px';
      table.querySelectorAll('th,td').forEach(function(cell){
        cell.style.borderTop='1px solid #666';
        cell.style.borderRight='1px solid #666';
        cell.style.borderBottom='1px solid #666';
        cell.style.borderLeft='1px solid #666';
        cell.style.boxShadow='none';
      });
    });
  }
  function docNoFromPage(page){
    if(!page) return '';
    var rows=page.querySelectorAll('.a4-meta-row');
    for(var i=0;i<rows.length;i++){
      var label=(rows[i].querySelector('b')||{}).textContent || '';
      if(label.toLowerCase().indexOf('doc no')>=0){
        var span=rows[i].querySelector('span,.a4-editable');
        var val=(span?span.textContent:rows[i].textContent.replace(label,'')) || '';
        return val.trim();
      }
    }
    var input=document.getElementById('fDocumentNo');
    return input && input.value ? input.value.trim() : '';
  }
  function updateFooters(){
    var a=area();
    if(!a) return;
    var pages=[].slice.call(a.querySelectorAll('.a4-page'));
    if(!pages.length) return;
    var docNo=docNoFromPage(pages[0]) || 'Not issued';
    var total=pages.length;
    pages.forEach(function(page,index){
      var footer=page.querySelector('.a4-footer');
      if(!footer) return;
      footer.innerHTML='<span class="a4-footer-center">Document No.: '+escapeText(docNo)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(index+1)+' / '+total+'</span>';
    });
  }
  function normalizeA4(){
    hardenTableBorders();
    updateFooters();
  }
  function firstScopePage(){
    var a=area();
    if(!a || !isVisible(a)) return null;
    var table=a.querySelector('.a4-page:not(.a4-scope-continued-page) table.a4-scope-table');
    return table ? pageOf(table) : null;
  }
  function firstScopeTable(){
    var p=firstScopePage();
    return p ? p.querySelector('table.a4-scope-table') : null;
  }
  function collectRowsAndResetToFirstPage(){
    var a=area();
    var first=firstScopeTable();
    if(!a || !first || !isVisible(a) || !isVisible(first)) return null;
    var rows=[];
    a.querySelectorAll('table.a4-scope-table tbody tr').forEach(function(row){ rows.push(row); });
    a.querySelectorAll('.a4-scope-continued-page').forEach(function(page){ page.remove(); });
    var body=bodyOf(first);
    if(!body) return null;
    body.innerHTML='';
    rows.forEach(function(row){ body.appendChild(row); });
    return first;
  }
  function createContinuedPage(basePage,sourceTable){
    var R=rr();
    var page=document.createElement('div');
    page.className='a4-page a4-scope-continued-page';
    var inner=document.createElement('div');
    inner.className='a4-page-inner';
    ['.a4-header','.a4-project-grid'].forEach(function(sel){
      var n=basePage.querySelector(sel);
      if(n) inner.appendChild(n.cloneNode(true));
    });
    var content=document.createElement('div');
    content.className='a4-content';
    var sec=document.createElement('div');
    sec.innerHTML=R && R.section ? R.section('SCOPE OF WORK — CONTINUED') : '<div class="a4-section-title">SCOPE OF WORK — CONTINUED</div>';
    content.appendChild(sec.firstChild);
    var table=sourceTable.cloneNode(false);
    table.appendChild(sourceTable.tHead.cloneNode(true));
    table.appendChild(document.createElement('tbody'));
    content.appendChild(table);
    var actions=document.createElement('div');
    actions.className='a4-preview-actions a4-no-print';
    actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button>';
    content.appendChild(actions);
    inner.appendChild(content);
    var footer=basePage.querySelector('.a4-footer');
    if(footer) inner.appendChild(footer.cloneNode(true));
    page.appendChild(inner);
    return page;
  }
  function ensureNextScopePage(currentPage,sourceTable){
    var next=currentPage.nextElementSibling;
    if(next && isContinued(next)) return next;
    next=createContinuedPage(currentPage,sourceTable);
    currentPage.parentNode.insertBefore(next,currentPage.nextElementSibling);
    return next;
  }
  function paginateFromTable(table,depth){
    depth=depth||0;
    if(depth>30) return;
    var page=pageOf(table), body=bodyOf(table);
    if(!page || !body || !isVisible(page) || !isVisible(table)) return;
    var limit=safeLimit(page);
    if(limit===null) return;
    var moved=[];
    var guard=0;
    while(body.rows.length>1 && rowBottomInPage(body.rows[body.rows.length-1],page)>limit && guard<120){
      guard++;
      var row=body.rows[body.rows.length-1];
      moved.unshift(row);
      body.removeChild(row);
    }
    if(!moved.length) return;
    var next=ensureNextScopePage(page,table);
    var nextTable=next.querySelector('table.a4-scope-table');
    var nextBody=bodyOf(nextTable);
    moved.forEach(function(row){ nextBody.appendChild(row); });
    paginateFromTable(nextTable,depth+1);
  }
  function repaginateAll(){
    var first=collectRowsAndResetToFirstPage();
    if(!first){ normalizeA4(); return; }
    paginateFromTable(first,0);
    removeEmptyContinuedPages();
    normalizeA4();
  }
  function statusCell(value){
    var R=rr();
    var esc=R && R.escapeHtml ? R.escapeHtml.bind(R) : escapeText;
    var opts=['','Not Started','In Progress','Pending','Done','Issue','N/A'];
    var v=(value==null?'':String(value));
    var html='<select class="a4-status-select">';
    opts.forEach(function(o){ html+='<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+(o?esc(o):'-')+'</option>'; });
    return html+'</select><span class="a4-status-print">'+esc(v)+'</span>';
  }
  function installRendererOverrides(){
    var R=rr();
    if(!R) return false;
    R.paginateScopeFrom=function(){ setTimeout(repaginateAll,0); };
    R.paginateAllScopeTables=function(){ repaginateAll(); };
    R.addRow=function(btn){
      var table=btn && btn.closest ? btn.closest('.a4-content').querySelector('table.a4-scope-table') : firstScopeTable();
      if(!table || !bodyOf(table)) return;
      var headers=[];
      if(table.tHead && table.tHead.rows[0]) headers=[].map.call(table.tHead.rows[0].cells,function(th){return th.textContent.trim();});
      var tr=document.createElement('tr');
      headers.forEach(function(h){
        var td=document.createElement('td');
        if(h==='Status') td.innerHTML=statusCell('Pending');
        else { td.className='a4-editable'; td.contentEditable='true'; td.spellcheck=false; td.textContent=(h==='Package'?'Step 1':''); }
        tr.appendChild(td);
      });
      bodyOf(table).appendChild(tr);
      setTimeout(repaginateAll,80);
    };
    R.deleteLastRow=function(btn){
      var table=btn && btn.closest ? btn.closest('.a4-content').querySelector('table.a4-scope-table') : firstScopeTable();
      if(!table || !bodyOf(table)) return;
      var body=bodyOf(table);
      if(body.rows.length) body.deleteRow(body.rows.length-1);
      setTimeout(repaginateAll,80);
    };
    if(!R.__printFooterPatched && typeof R.printA4==='function'){
      R.__printFooterPatched=true;
      var originalPrint=R.printA4;
      R.printA4=function(){ normalizeA4(); return originalPrint.apply(R,arguments); };
    }
    return true;
  }
  function patchPreviewAndView(){
    if(typeof window.previewCurrentForm==='function' && !window.__a4PaginationPreviewPatched){
      window.__a4PaginationPreviewPatched=true;
      var originalPreview=window.previewCurrentForm;
      window.previewCurrentForm=function(){
        originalPreview.apply(this,arguments);
        setTimeout(function(){ if(isVisible(area())) repaginateAll(); },180);
      };
    }
    if(typeof window.showView==='function' && !window.__a4PaginationShowViewPatched){
      window.__a4PaginationShowViewPatched=true;
      var originalShow=window.showView;
      window.showView=function(name){
        originalShow.apply(this,arguments);
        if(name==='documents' || name==='a4check'){
          setTimeout(function(){ if(isVisible(area())) repaginateAll(); },220);
        }
      };
    }
  }
  function boot(){
    installRendererOverrides();
    patchPreviewAndView();
    setTimeout(normalizeA4,60);
  }
  document.addEventListener('input',function(e){
    if(e.target && e.target.closest && e.target.closest('.a4-page')) setTimeout(updateFooters,80);
  });
  document.addEventListener('change',function(e){
    if(e.target && e.target.closest && e.target.closest('.a4-page')) setTimeout(updateFooters,80);
  });
  document.addEventListener('DOMContentLoaded',function(){
    boot();
    setTimeout(boot,250);
    setTimeout(function(){ if(isVisible(area())) repaginateAll(); else normalizeA4(); },500);
  });
  var timer=setInterval(function(){
    boot();
    if(window.__a4PaginationPreviewPatched && window.__a4PaginationShowViewPatched) clearInterval(timer);
  },150);
  window.AETERLINK_REPAGINATE_A4=repaginateAll;
  window.AETERLINK_UPDATE_A4_FOOTERS=updateFooters;
  window.AETERLINK_FIX_A4_TABLE_BORDERS=hardenTableBorders;
})();
</script>
