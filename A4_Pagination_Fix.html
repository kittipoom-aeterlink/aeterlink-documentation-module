<!-- AETERLINK Documentation Module — A4_Pagination_Fix.html -->
<!-- Safe A4 layout/print helper. Automatic DOM observers were removed to prevent Add Row infinite loops. -->
<style id="a4-pagination-fix-style">
  :root{--a4-page-w:210mm;--a4-page-h:297mm;--a4-pad-x:10.5mm;--a4-pad-top:10.5mm;--a4-pad-bottom:11mm;--a4-grid-line:.18mm;--a4-grid-color:#666;}
  #a4Preview,#a4CheckOutput{box-sizing:border-box!important;}
  #a4Preview .a4-root,#a4CheckOutput .a4-root,#a4Preview .a4-print-area,#a4CheckOutput .a4-print-area,.prod-paper-stage #a4Preview .a4-root,.prod-paper-stage #a4Preview .a4-print-area{width:var(--a4-page-w)!important;max-width:var(--a4-page-w)!important;min-width:var(--a4-page-w)!important;margin:0 auto!important;padding:0!important;background:transparent!important;box-sizing:border-box!important;overflow:visible!important;}
  #a4Preview .a4-page,#a4CheckOutput .a4-page,.a4-print-area .a4-page{width:var(--a4-page-w)!important;height:var(--a4-page-h)!important;min-height:var(--a4-page-h)!important;max-height:var(--a4-page-h)!important;margin:0 auto 12px!important;padding:0!important;overflow:hidden!important;box-sizing:border-box!important;transform:none!important;}
  #a4Preview .a4-page-inner,#a4CheckOutput .a4-page-inner,.a4-print-area .a4-page-inner{width:100%!important;height:100%!important;min-height:100%!important;max-height:100%!important;padding:var(--a4-pad-top) var(--a4-pad-x) var(--a4-pad-bottom)!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;}
  #a4Preview .a4-content,#a4CheckOutput .a4-content,.a4-print-area .a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}
  .a4-page table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:separate!important;border-spacing:0!important;border:0!important;outline:0!important;box-shadow:none!important;overflow:visible!important;}
  .a4-page table.a4-scope-table th,.a4-page table.a4-scope-table td{border:0!important;border-right:var(--a4-grid-line) solid var(--a4-grid-color)!important;border-bottom:var(--a4-grid-line) solid var(--a4-grid-color)!important;box-shadow:none!important;background-clip:padding-box!important;}
  .a4-page table.a4-scope-table thead tr:first-child > *{border-top:var(--a4-grid-line) solid var(--a4-grid-color)!important;}
  .a4-page table.a4-scope-table tr > *:first-child{border-left:var(--a4-grid-line) solid var(--a4-grid-color)!important;}
  .a4-page table.a4-scope-table tr > *:last-child{border-right:var(--a4-grid-line) solid var(--a4-grid-color)!important;}
  .a4-page table.a4-scope-table tbody tr:last-child > *{border-bottom:var(--a4-grid-line) solid var(--a4-grid-color)!important;}
  .a4-footer{justify-content:center!important;align-items:center!important;text-align:center!important;gap:0!important;color:#555!important;}
  .a4-footer > span:not(.a4-footer-center){display:none!important;}
  .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;font-size:6.4pt!important;line-height:1.15!important;font-weight:700!important;color:#555!important;}
  @media print{
    @page{size:210mm 297mm;margin:0!important;}
    html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}
    .a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}
    .a4-page{position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}
    .a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}
    .a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;}
    .a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}
    .a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-row-delete-btn,.prod-row-delete,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column{display:none!important;visibility:hidden!important;}
    .a4-status-select{display:none!important;visibility:hidden!important;}
    .a4-status-print{display:inline!important;visibility:visible!important;}
  }
</style>
<script id="a4-pagination-fix-script">
(function(){
  if(window.__AETERLINK_A4_PAGINATION_SAFE_V7__) return;
  window.__AETERLINK_A4_PAGINATION_SAFE_V7__=true;

  var scheduled=null;
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function areas(){var list=[].slice.call(document.querySelectorAll('#a4Preview .a4-print-area,#a4Preview #a4PrintArea,#a4CheckOutput .a4-print-area,#a4CheckOutput #a4PrintArea,.a4-print-area,#a4PrintArea'));return list.filter(function(r,i,a){return r&&a.indexOf(r)===i;});}
  function primaryArea(){return document.querySelector('#a4Preview .a4-print-area')||document.querySelector('#a4Preview #a4PrintArea')||document.querySelector('.a4-print-area')||document.querySelector('#a4PrintArea');}
  function directPages(root){var pages=[].slice.call(root&&root.children||[]).filter(function(n){return n.classList&&n.classList.contains('a4-page');});return pages.length?pages:[].slice.call((root||document).querySelectorAll('.a4-page'));}
  function normalizeTableBorders(root){
    root=root||primaryArea()||document;
    root.querySelectorAll('table.a4-scope-table').forEach(function(table){
      table.style.width='100%';table.style.maxWidth='100%';table.style.tableLayout='fixed';table.style.borderCollapse='separate';table.style.borderSpacing='0';table.style.border='0';table.style.outline='0';table.style.boxShadow='none';
      table.querySelectorAll('th,td').forEach(function(cell){cell.style.border='0';cell.style.borderRight='.18mm solid #666';cell.style.borderBottom='.18mm solid #666';cell.style.borderTop='0';cell.style.borderLeft='0';cell.style.boxShadow='none';});
      table.querySelectorAll('thead tr:first-child > *').forEach(function(cell){cell.style.borderTop='.18mm solid #666';});
      table.querySelectorAll('tr > *:first-child').forEach(function(cell){cell.style.borderLeft='.18mm solid #666';});
      table.querySelectorAll('tr > *:last-child').forEach(function(cell){cell.style.borderRight='.18mm solid #666';});
      table.querySelectorAll('tbody tr:last-child > *').forEach(function(cell){cell.style.borderBottom='.18mm solid #666';});
    });
  }
  function docNoFromRoot(root){
    root=root||primaryArea()||document;
    var rows=root.querySelectorAll('.a4-meta-row');
    for(var i=0;i<rows.length;i++){
      var label=(rows[i].querySelector('b')||{}).textContent||'';
      if(/doc\s*no/i.test(label)){var span=rows[i].querySelector('span,.a4-editable');var val=(span?span.textContent:rows[i].textContent.replace(label,''))||'';return val.trim()||'Not issued';}
    }
    var input=document.getElementById('fDocumentNo');
    return input&&input.value?input.value.trim():'Not issued';
  }
  function updateFooters(root){
    root=root||primaryArea();if(!root)return;
    var pages=directPages(root);if(!pages.length)return;
    var docNo=docNoFromRoot(root)||'Not issued';
    var total=pages.length;
    pages.forEach(function(page,index){
      var footer=page.querySelector('.a4-footer');if(!footer)return;
      footer.innerHTML='<span class="a4-footer-center">Document No.: '+esc(docNo)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(index+1)+' / '+total+'</span>';
    });
  }
  function normalize(root){normalizeTableBorders(root);updateFooters(root);}
  function repaginateAll(){areas().forEach(normalize);}
  function scheduleNormalize(delay){clearTimeout(scheduled);scheduled=setTimeout(repaginateAll,delay==null?100:delay);}
  function cleanPrintClone(clone){
    clone.querySelectorAll('.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-row-delete-btn,.prod-row-delete,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column,.prod-photo-report-toolbar').forEach(function(n){n.remove();});
    clone.querySelectorAll('td').forEach(function(td){var sel=td.querySelector('select.a4-status-select,select');if(sel){td.textContent=sel.value||'';}});
    clone.querySelectorAll('.a4-status-select,.a4-status-print').forEach(function(n){n.remove();});
    clone.querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');n.removeAttribute('spellcheck');});
  }
  function printExactPreview(){
    repaginateAll();
    var source=primaryArea();if(!source){window.print();return;}
    var clone=source.cloneNode(true);cleanPrintClone(clone);normalize(clone);
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent;}).join('\n');
    var exactCss='@page{size:210mm 297mm;margin:0!important;}*{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-page{position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}.a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}.a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;}.a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-row-delete-btn,.prod-row-delete,.row-actions,.photo-actions{display:none!important;visibility:hidden!important;}';
    var win=window.open('','_blank');if(!win){window.print();return;}
    win.document.open();win.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>A4 Print</title><style>'+styles+'\n'+exactCss+'</style></head><body>'+clone.outerHTML+'</body></html>');win.document.close();setTimeout(function(){win.focus();win.print();},500);
  }
  function patch(){
    var renderer=window.AETERLINK_A4_RENDERER;if(renderer)renderer.printA4=printExactPreview;
    if(typeof window.previewCurrentForm==='function'&&!window.previewCurrentForm.__a4PaginationSafeV7){var old=window.previewCurrentForm;window.previewCurrentForm=function(){var ret=old.apply(this,arguments);scheduleNormalize(220);return ret;};window.previewCurrentForm.__a4PaginationSafeV7=true;}
    if(typeof window.showView==='function'&&!window.showView.__a4PaginationSafeV7){var show=window.showView;window.showView=function(name){var ret=show.apply(this,arguments);if(name==='documents'||name==='a4check')scheduleNormalize(250);return ret;};window.showView.__a4PaginationSafeV7=true;}
  }
  function boot(){patch();scheduleNormalize(200);}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);setTimeout(boot,700);});
  window.addEventListener('load',function(){setTimeout(boot,0);});
  setTimeout(boot,300);
  window.AETERLINK_REPAGINATE_A4=repaginateAll;
  window.AETERLINK_UPDATE_A4_FOOTERS=function(){areas().forEach(updateFooters);};
  window.AETERLINK_FIX_A4_TABLE_BORDERS=function(){areas().forEach(normalizeTableBorders);};
})();
</script>
