<!-- AETERLINK Documentation Module — A4_Logo_Display_Fix.html -->
<!-- Logo-only permanent fix: use the official supplied logo image already embedded in A4_Print_Logo_EQC_Final, render it as CSS background to avoid broken img icons. -->
<style id="a4-logo-display-fix-style">
  .a4-logo-cell{display:flex!important;align-items:center!important;justify-content:center!important;overflow:hidden!important;}
  .a4-logo-cell img{display:none!important;visibility:hidden!important;}
  .a4-logo-official-final{width:41mm!important;max-width:41mm!important;height:5.05mm!important;max-height:5.05mm!important;display:block!important;background-repeat:no-repeat!important;background-position:center center!important;background-size:contain!important;}
  .a4-logo-svg-fallback{width:41mm!important;max-width:41mm!important;height:auto!important;max-height:15mm!important;display:block!important;}
  @media print{.a4-logo-cell img{display:none!important;visibility:hidden!important}.a4-logo-official-final{width:41mm!important;max-width:41mm!important;height:5.05mm!important;max-height:5.05mm!important;display:block!important;background-repeat:no-repeat!important;background-position:center center!important;background-size:contain!important;}}
</style>
<script id="a4-logo-display-fix-script">
(function(){
  if(window.__AETERLINK_A4_LOGO_DISPLAY_FIX_V3__) return;
  window.__AETERLINK_A4_LOGO_DISPLAY_FIX_V3__ = true;

  function extractOfficialLogoData(){
    var s = document.getElementById('a4-print-logo-eqc-final-script');
    var text = s ? String(s.textContent || '') : '';
    var m = text.match(/var\s+LOGO_SRC\s*=\s*'([^']+)'/);
    if(m && /^data:image\//.test(m[1])) return m[1];
    return '';
  }

  function fallbackSvg(){
    return '<svg class="a4-logo-svg-fallback" viewBox="0 0 1200 165" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AETERLINK Logo"><g fill="#0782c6"><path d="M25 135c52-32 78-68 88-134h42c-3 42-26 66-70 86-21 10-34 25-45 54-9 20-34 18-15-6z"/><circle cx="190" cy="123" r="38"/><text x="285" y="122" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="112" letter-spacing="18">AETERLINK</text></g></svg>';
  }

  function officialLogoHtml(){
    var src = extractOfficialLogoData();
    if(src) return '<span class="a4-logo-official-final" role="img" aria-label="AETERLINK Logo" style="background-image:url(' + src + ');"></span>';
    return fallbackSvg();
  }

  function isLogoCell(node){return !!(node && node.classList && node.classList.contains('a4-logo-cell'));}

  function applyLogo(root){
    root = root || document;
    var cells = [];
    if(isLogoCell(root)) cells.push(root);
    if(root.querySelectorAll) root.querySelectorAll('.a4-logo-cell').forEach(function(cell){cells.push(cell);});
    cells.forEach(function(cell){
      var html = officialLogoHtml();
      if(cell.getAttribute('data-aeterlink-logo-fixed') === 'official-v3' && cell.innerHTML === html) return;
      cell.innerHTML = html;
      cell.setAttribute('data-aeterlink-logo-fixed','official-v3');
    });
  }

  function patchRenderer(){
    if(window.AETERLINK_A4_RENDERER){
      window.AETERLINK_A4_RENDERER.logoSvg = officialLogoHtml;
      window.AETERLINK_A4_RENDERER.__aeterlinkLogoDisplayFixed = 'official-v3';
    }
  }

  function patchPrintObject(){
    if(window.AETERLINK_PRINT_LOGO_EQC_FINAL && typeof window.AETERLINK_PRINT_LOGO_EQC_FINAL.patchLogo === 'function' && !window.AETERLINK_PRINT_LOGO_EQC_FINAL.__logoDisplayFixV3){
      window.AETERLINK_PRINT_LOGO_EQC_FINAL.patchLogo = function(){
        patchRenderer();
        applyLogo(document);
      };
      window.AETERLINK_PRINT_LOGO_EQC_FINAL.__logoDisplayFixV3 = true;
    }
  }

  function boot(){
    patchRenderer();
    patchPrintObject();
    applyLogo(document);
  }

  var obs = null;
  function observe(){
    if(obs || !document.body) return;
    obs = new MutationObserver(function(muts){
      var need = false;
      muts.forEach(function(m){
        if(isLogoCell(m.target)) need = true;
        Array.prototype.slice.call(m.addedNodes || []).forEach(function(n){
          if(isLogoCell(n) || (n.querySelector && n.querySelector('.a4-logo-cell'))) need = true;
        });
      });
      if(need) setTimeout(boot,0);
    });
    obs.observe(document.body,{childList:true,subtree:true});
  }

  document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){boot();observe();},0);setTimeout(boot,700);setTimeout(boot,1800);});
  window.addEventListener('load',function(){setTimeout(function(){boot();observe();},200);setTimeout(boot,1200);});
  document.addEventListener('click',function(e){
    if(e.target && e.target.closest && e.target.closest('#prodDocType,#fTemplate,.a4-clean-add-row,.a4-clean-delete-row,.mod-btn,.a4-print-btn')) setTimeout(boot,250);
  },true);
  setTimeout(function(){boot();observe();},600);
  setTimeout(boot,2200);
  setInterval(boot,1200);

  window.AETERLINK_A4_LOGO_DISPLAY_FIX = {apply:boot, html:officialLogoHtml};
})();
</script>
