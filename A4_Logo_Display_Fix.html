<!-- AETERLINK Documentation Module — A4_Logo_Display_Fix.html -->
<!-- Logo-only permanent fix: no external file, no base64 PNG, no broken img. Inline SVG is the single source of truth for A4 header logos. -->
<style id="a4-logo-display-fix-style">
  .a4-logo-cell{display:flex!important;align-items:center!important;justify-content:center!important;overflow:hidden!important;}
  .a4-logo-cell img{display:none!important;visibility:hidden!important;}
  .a4-logo-svg-final{width:41mm!important;max-width:41mm!important;height:auto!important;max-height:15mm!important;display:block!important;}
  @media print{.a4-logo-cell img{display:none!important;visibility:hidden!important}.a4-logo-svg-final{width:41mm!important;max-width:41mm!important;height:auto!important;max-height:15mm!important;display:block!important;}}
</style>
<script id="a4-logo-display-fix-script">
(function(){
  if(window.__AETERLINK_A4_LOGO_DISPLAY_FIX_V2__) return;
  window.__AETERLINK_A4_LOGO_DISPLAY_FIX_V2__ = true;

  function officialLogoSvg(){
    return '<svg class="a4-logo-svg-final" viewBox="0 0 1200 165" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AETERLINK Logo">'
      + '<g fill="#0782c6">'
      + '<path d="M14 137c34-18 54-39 67-75C90 35 101 8 126 1c20-5 38 9 38 30 0 20-13 35-33 47-31 18-49 41-59 75-5 17-20 28-38 25-24-4-37-28-20-41z"/>'
      + '<circle cx="194" cy="127" r="37"/>'
      + '<text x="288" y="122" font-family="Arial,Helvetica,sans-serif" font-size="112" font-weight="900" letter-spacing="17">AETERLINK</text>'
      + '</g>'
      + '</svg>';
  }

  function isLogoCell(node){return !!(node && node.classList && node.classList.contains('a4-logo-cell'));}
  function applyLogo(root){
    root = root || document;
    var cells = [];
    if(isLogoCell(root)) cells.push(root);
    root.querySelectorAll && root.querySelectorAll('.a4-logo-cell').forEach(function(cell){cells.push(cell);});
    cells.forEach(function(cell){
      if(cell.getAttribute('data-aeterlink-logo-fixed') === '1' && cell.querySelector('.a4-logo-svg-final')) return;
      cell.innerHTML = officialLogoSvg();
      cell.setAttribute('data-aeterlink-logo-fixed','1');
    });
  }

  function patchRenderer(){
    if(window.AETERLINK_A4_RENDERER){
      window.AETERLINK_A4_RENDERER.logoSvg = officialLogoSvg;
      window.AETERLINK_A4_RENDERER.__aeterlinkLogoDisplayFixed = true;
    }
  }

  function patchPrintObject(){
    if(window.AETERLINK_PRINT_LOGO_EQC_FINAL && typeof window.AETERLINK_PRINT_LOGO_EQC_FINAL.patchLogo === 'function' && !window.AETERLINK_PRINT_LOGO_EQC_FINAL.__logoDisplayFixV2){
      window.AETERLINK_PRINT_LOGO_EQC_FINAL.patchLogo = function(){
        patchRenderer();
        applyLogo(document);
      };
      window.AETERLINK_PRINT_LOGO_EQC_FINAL.__logoDisplayFixV2 = true;
    }
  }

  function boot(){
    patchRenderer();
    patchPrintObject();
    applyLogo(document);
  }

  var obs = null;
  function observe(){
    if(obs || !document.body) return;
    obs = new MutationObserver(function(muts){
      var need = false;
      muts.forEach(function(m){
        if(isLogoCell(m.target)) need = true;
        Array.prototype.slice.call(m.addedNodes || []).forEach(function(n){
          if(isLogoCell(n) || (n.querySelector && n.querySelector('.a4-logo-cell'))) need = true;
        });
      });
      if(need) setTimeout(boot,0);
    });
    obs.observe(document.body,{childList:true,subtree:true});
  }

  document.addEventListener('DOMContentLoaded',function(){setTimeout(function(){boot();observe();},0);setTimeout(boot,700);setTimeout(boot,1800);});
  window.addEventListener('load',function(){setTimeout(function(){boot();observe();},200);setTimeout(boot,1200);});
  document.addEventListener('click',function(e){
    if(e.target && e.target.closest && e.target.closest('#prodDocType,#fTemplate,.a4-clean-add-row,.a4-clean-delete-row,.mod-btn,.a4-print-btn')) setTimeout(boot,250);
  },true);
  setTimeout(function(){boot();observe();},600);
  setTimeout(boot,2200);
  setInterval(boot,1200);

  window.AETERLINK_A4_LOGO_DISPLAY_FIX = {apply:boot, svg:officialLogoSvg};
})();
</script>
