<!-- AETERLINK Documentation Module — A4_Row_Controls_Clean_Final.html -->
<!-- Final cleanup loaded after A4_Row_Controls_Restore: uses clean button classes so legacy Add Row listeners cannot fire. -->
<style id="a4-row-controls-clean-final-style">
  #a4Preview .a4-row-clean-delete,#a4CheckOutput .a4-row-clean-delete{display:block!important;visibility:visible!important;position:absolute!important;left:1mm!important;top:50%!important;transform:translateY(-50%)!important;width:3.4mm!important;height:3.4mm!important;min-width:3.4mm!important;line-height:2.8mm!important;padding:0!important;border:1px solid #d15b5b!important;background:#fff!important;color:#a91d1d!important;border-radius:50%!important;font-size:8px!important;font-weight:900!important;cursor:pointer!important;text-align:center!important;z-index:100!important;pointer-events:auto!important;}
</style>
<script id="a4-row-controls-clean-final-script">
(function(){
  if(window.__AETERLINK_A4_ROW_CONTROLS_CLEAN_FINAL_V1__) return;
  window.__AETERLINK_A4_ROW_CONTROLS_CLEAN_FINAL_V1__ = true;
  var syncTimer=null;
  var STATUS=['','-','Not Started','In Progress','Pending','Done','Issue','N/A','Open','Closed','Approved','Submitted'];
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function root(){return document.getElementById('a4Preview')||document.getElementById('a4CheckOutput')||document;}
  function tables(base){base=base||root();return [].slice.call(base.querySelectorAll('.a4-page .a4-content table.a4-scope-table,.a4-page .a4-content table')).filter(function(t){return t&&t.tBodies&&t.tBodies.length&&!t.classList.contains('a4-info-table')&&!t.classList.contains('a4-project-grid')&&!t.closest('.a4-photo-block')&&!t.closest('.a4-photo-grid')&&!t.closest('.mod-table-wrap');});}
  function labels(t){var r=t&&t.tHead&&t.tHead.rows&&t.tHead.rows[0];return r?[].slice.call(r.cells).map(function(th){return String(th.textContent||'').trim();}):[];}
  function isStatus(label,index){var s=String(label||'').trim();return s?/^status$/i.test(s):index===4;}
  function key(label,index){var s=String(label||'').trim();if(/^item$/i.test(s))return'Item';if(/^no\.?$/i.test(s))return'No';if(/equipment\s*tag/i.test(s))return'EquipmentTag';if(/work\s*description/i.test(s))return'WorkDescription';if(/^description$/i.test(s))return'Description';if(/^location$/i.test(s))return'Location';if(/check\s*item/i.test(s))return'CheckItem';if(/^qty\.?$/i.test(s))return'Qty';if(/^unit$/i.test(s))return'Unit';if(/^status$/i.test(s))return'Status';if(/^remarks$/i.test(s))return'Remarks';if(/^remark$/i.test(s))return'Remark';return s?s.replace(/[^A-Za-z0-9]+/g,''):'Col'+index;}
  function strip(v){return String(v==null?'':v).replace(/^[\s*xX-]+/,'').trim();}
  function cleanStatus(v){v=String(v==null?'':v).trim();var c=v.replace(/\s+/g,'').toLowerCase();for(var i=0;i<STATUS.length;i++){var n=STATUS[i];if(!n)continue;var nc=n.replace(/\s+/g,'').toLowerCase();if(c===nc||c===nc+nc)return n;}return v;}
  function statusHtml(v){v=cleanStatus(v||'Pending')||'Pending';return '<select class="a4-status-select" contenteditable="false">'+STATUS.map(function(o){return '<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+(o?esc(o):'-')+'</option>';}).join('')+'</select><span class="a4-status-print">'+esc(v)+'</span>';}
  function value(td,index){var sel=td.querySelector('select.a4-status-select,select');if(sel)return cleanStatus(sel.value||'');var sp=td.querySelector('.a4-row-item-value,.a4-row-item-text');if(sp)return index===0?strip(sp.textContent):String(sp.textContent||'').trim();var c=td.cloneNode(true);c.querySelectorAll('button,.a4-no-print,.a4-status-print,select,input,textarea').forEach(function(n){n.remove();});return index===0?strip(c.textContent):String(c.textContent||'').trim();}
  function prepCell(td,i,heads){td.classList.add('a4-editable');if(i===0){var v=strip(value(td,0));td.classList.add('a4-row-delete-cell');td.contentEditable='false';td.innerHTML='<button type="button" class="a4-row-clean-delete a4-no-print" title="Delete this row" contenteditable="false">x</button><span class="a4-row-item-value" contenteditable="true" spellcheck="false">'+esc(v)+'</span>';return;}if(isStatus(heads[i],i)){td.contentEditable='false';td.innerHTML=statusHtml(value(td,i)||'Pending');return;}if(td.querySelector('select')){var printed=(td.querySelector('.a4-status-print')||{}).textContent||'';td.textContent=(printed==='Pending'?'':printed);}td.contentEditable='true';td.spellcheck=false;}
  function prep(base){base=base||root();base.querySelectorAll('.a4-row-control-bar').forEach(function(n){n.remove();});tables(base).forEach(function(t){t.classList.add('a4-scope-table');var h=labels(t);[].slice.call(t.tBodies[0].rows).forEach(function(tr){[].slice.call(tr.cells).forEach(function(td,i){prepCell(td,i,h);});});var bar=document.createElement('div');bar.className='a4-row-control-bar a4-no-print';bar.innerHTML='<button type="button" class="a4-clean-add-row-btn">+ Add Row</button>';t.parentNode.insertBefore(bar,t.nextSibling);});syncRows();}
  function tableFrom(btn){var bar=btn&&btn.closest&&btn.closest('.a4-row-control-bar');if(bar&&bar.previousElementSibling&&bar.previousElementSibling.tBodies)return bar.previousElementSibling;var list=tables(root());return list.length?list[list.length-1]:null;}
  function add(btn){var t=tableFrom(btn);if(!t)return false;var h=labels(t),cols=h.length||(t.rows[0]?t.rows[0].cells.length:6)||6,tr=t.tBodies[0].insertRow(-1);for(var i=0;i<cols;i++){var td=tr.insertCell(-1);td.textContent=isStatus(h[i],i)?'Pending':'';prepCell(td,i,h);}syncRows();setTimeout(function(){var fc=tr.cells[1]||tr.cells[0];if(fc&&fc.focus)fc.focus();},0);return false;}
  function del(btn){var tr=btn&&btn.closest&&btn.closest('tr');if(tr)tr.remove();syncRows();return false;}
  function syncRows(){var f=document.getElementById('fRows');if(!f)return;var out=[];tables(document.getElementById('a4Preview')||root()).forEach(function(t){var h=labels(t);[].slice.call(t.tBodies[0].rows).forEach(function(tr){var o={};[].slice.call(tr.cells).forEach(function(td,i){o[key(h[i],i)]=value(td,i);});out.push(o);});});try{f.value=JSON.stringify(out,null,2);}catch(e){}}
  function syncSoon(){clearTimeout(syncTimer);syncTimer=setTimeout(syncRows,80);}
  function patchRenderer(){var r=window.AETERLINK_A4_RENDERER;if(!r)return;r.addRow=function(btn){return add(btn);};r.deleteRow=function(btn){return del(btn);};r.table=function(columns,rows,cls){columns=(columns||[]).filter(function(c){return c.key!=='Action';});rows=rows||[];var html='<table class="'+esc(cls||'a4-scope-table')+'"><thead><tr>'+columns.map(function(c){return '<th style="width:'+esc(c.width||'auto')+';">'+esc(c.label||c.key||'')+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+columns.map(function(c){var v=row&&row[c.key]!=null?row[c.key]:'';if(/^status$/i.test(String(c.key||c.label||'')))return '<td>'+statusHtml(v||'Pending')+'</td>';return '<td class="a4-editable" contenteditable="true" spellcheck="false">'+esc(v)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table><div class="a4-row-control-bar a4-no-print"><button type="button" class="a4-clean-add-row-btn">+ Add Row</button></div>';return html;};}
  document.addEventListener('click',function(e){var a=e.target&&e.target.closest?e.target.closest('.a4-clean-add-row-btn'):null;if(a){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();add(a);return false;}var d=e.target&&e.target.closest?e.target.closest('.a4-row-clean-delete'):null;if(d){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();del(d);return false;}},true);
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table'))syncSoon();},true);
  document.addEventListener('change',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table')){var sp=e.target.parentNode&&e.target.parentNode.querySelector('.a4-status-print');if(sp)sp.textContent=e.target.value||'';syncSoon();}},true);
  function boot(){patchRenderer();prep(document.getElementById('a4Preview')||root());prep(document.getElementById('a4CheckOutput')||root());}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,120);setTimeout(boot,900);});
  window.addEventListener('load',function(){setTimeout(boot,120);setTimeout(boot,900);});
  setTimeout(boot,400);setTimeout(boot,1200);
  window.AETERLINK_A4_ROW_CONTROLS_CLEAN={run:prep,addRow:add,deleteRow:del,syncRows:syncRows};
})();
</script>
