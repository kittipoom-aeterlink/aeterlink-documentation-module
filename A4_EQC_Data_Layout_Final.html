<script id="a4-eqc-data-layout-final-script">
(function(){
  if(window.__AETERLINK_EQC_DATA_LAYOUT_FINAL_V2__) return;
  window.__AETERLINK_EQC_DATA_LAYOUT_FINAL_V2__ = true;

  var EQC_ROWS = [
    ['1','Energy Meter','Acrel','ADL400','10','MDB Room','+1','OK','OK','OK'],
    ['2','Energy Meter','Acrel','ADL400','6','EE Room','+1','OK','OK','OK'],
    ['3','Split core current transformer','YHDC','SCT045B\n800A/5A','6','MDB Room','+1','OK','OK','OK'],
    ['4','Split core current transformer','YHDC','SCT024TS 150A/5A','12','MDB Room','+1','OK','OK','OK'],
    ['5','Split core current transformer','YHDC','SCT016S 50A/1A','12','MDB Room','+1','OK','OK','OK'],
    ['6','Split core current transformer','YHDC','SCT016S 50A/1A','18','EE Room','+1','OK','OK','OK'],
    ['7','Pulse Sensor','Efento','SKU: 5906660327721','4','MDB Room','+1','','',''],
    ['8','Pulse Sensor','Efento','SKU: 5906660327721','2','EE Room','+1','','',''],
    ['9','Flow Meter','EMS','US S','1','Chiller Room','+1','OK','OK','OK'],
    ['10','Temperature sensor','Efento','EAN: 5905309601710','3','Chiller Room','+1','OK','OK','OK'],
    ['11','Temperature & Humidity sensor','Efento','EAN: 5905309601338','18','Sale Area','+1','OK','OK','OK'],
    ['12','Temperature & Humidity sensor','Efento','EAN: 5905309601338','4','Mall Area','+1','OK','OK','OK'],
    ['13','Temperature & Humidity sensor','Efento','EAN: 5905309601314','1','Outdoor','+1','OK','OK','OK'],
    ['14','Efento Gateway','Efento','EAN: 5906660327066','1','MDB Room','+1','OK','OK','OK'],
    ['15','Efento Gateway','Efento','EAN: 5906660327066','1','Chiller Room','+1','OK','OK','OK'],
    ['16','Efento Gateway','Efento','EAN: 5906660327066','1','EE Room','+1','OK','OK','OK'],
    ['17','Efento Gateway','Efento','EAN: 5906660327066','7','Sale area','+1','OK','OK','OK'],
    ['18','Efento Gateway','Efento','EAN: 5906660327066','4','Mall Area','+1','OK','OK','OK'],
    ['19','Router','TP-link','MR200','1','MDB Room','+1','OK','OK','OK'],
    ['20','Router','TP-link','MR200','1','Chiller Room','+1','OK','OK','OK'],
    ['21','Router','TP-link','MR200','1','EE Room','+1','OK','OK','OK'],
    ['22','Router','TP-link','MR200','1','Sale area','+1','OK','OK','OK'],
    ['23','Router','TP-link','MR200','1','Male Area','+1','OK','OK','OK'],
    ['24','Router','TP-link','TL-R605','1','Tech room','+1','OK','OK','OK'],
    ['25','Pressure Transmitter','Huba Control','Type 528','2','Chiller Room','+1','OK','OK','OK'],
    ['26','Energy Meter','Schneider Electric','Easy Logic PM2200','8','MDB Room','+1','OK','OK','OK'],
    ['27','Split core current transformer','Dako CT','DP-23 250/5','24','MDB Room','+1','OK','OK','N/A'],
    ['28','Flow Meter','Ketwells','KWF 2000B Series','1','Chiller Room','+1','OK','OK','OK'],
    ['29','Temperature sensors','Siemens','QFA2890/WI','4','Mall Area','+1','OK','OK','OK'],
    ['30','Gateway Siemens','Siemens','OCT200 KNBA','1','Sales Area','+1','OK','OK','OK'],
    ['31','Digital Direct controler (DDC)','Honeywell','PEC8445-PB1-SO','1','HVAC Panel','+1','OK','OK','OK'],
    ['32','Controller','Niagara','Jace 9000','2','Chiller Rm','+1','OK','OK','OK'],
    ['33','Controller','Aeterlink','AirPlug Sumit','1','Sales Area','+1','OK','OK','OK'],
    ['34','Receiver','Aeterlink','AirPlug Power TX','18','Sales Area','+1','OK','OK','OK'],
    ['35','Temperature sensor','Aeterlink','AirPlug Sense-T','36','Sales Area','+1','OK','OK','OK']
  ];
  var KEYS = ['No','ItemDescription','Brand','Model','InstalledQuantity','Localisation','Floor','InstallationPosition','InstallationCondition','ConfirmationPower'];
  var HEADERS = [
    'No.',
    'Item description',
    'brand',
    'Product name',
    'Installed<br>Quantity',
    'Localisation',
    'Floor',
    'Installation<br>Position<br><span class="a4-eqc-header-note">(matches as-built<br>drawings?)</span>',
    'Installation<br>Condition<br><span class="a4-eqc-header-note">(no risk of falling<br>or detachment?)</span>',
    'Confirmation<br>of power-on<br><span class="a4-eqc-header-note">(operate after<br>power-on?)</span>'
  ];
  var WIDTHS = ['4%','17%','7%','16%','7%','9.5%','4.5%','11.66%','11.67%','11.67%','0%'];
  var STATUS_OPTIONS = ['', 'OK', 'NG', 'N/A'];

  function byId(id){return document.getElementById(id);}
  function isEqcSelected(){var c=(byId('fTemplate')&&byId('fTemplate').value)||(byId('prodDocType')&&byId('prodDocType').value)||'';return /EQC|EQCH|EQUIP/i.test(c);}
  function rows(){return EQC_ROWS.map(function(a){var o={};KEYS.forEach(function(k,i){o[k]=a[i]||'';});o.Remarks='';return o;});}
  function patchTemplate(){
    window.AETERLINK_TEMPLATES = window.AETERLINK_TEMPLATES || {};
    var tpl = window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST;
    if(!tpl || tpl.__eqcDataLayoutFinalPatchedV2) return false;
    tpl.__eqcDataLayoutFinalPatchedV2 = true;
    tpl.columns = KEYS.map(function(k,i){return {key:k,label:HEADERS[i].replace(/<br>/g,' ').replace(/<[^>]+>/g,''),width:WIDTHS[i]};});
    tpl.sampleData = function(){return {ProjectCode:'TEST-PJ',ProjectName:'Modular A4 Layout Check',Client:'Sample Client',MainContractor:'AETERLINK',DocumentNo:'',RevisionNo:'R00',Status:'Draft',ContractNo:'-',PurchaseOrderNo:'-',WorkType:'Equipment Installation / Inspection / Verification',CompletionDate:'',ReferenceDocuments:'PJ-EQC-001',Remarks:'',ChecklistRows:rows()};};
    return true;
  }
  function forceSampleRowsIfNeeded(){
    if(!isEqcSelected()) return;
    var f = byId('fRows');
    if(!f) return;
    var arr=[];
    try{arr=JSON.parse(f.value||'[]');}catch(e){arr=[];}
    if(!Array.isArray(arr) || arr.length < 35 || arr[0] && !('ItemDescription' in arr[0])){
      f.value = JSON.stringify(rows(),null,2);
    }
  }
  function cleanText(td){
    if(!td) return '';
    var sel = td.querySelector && td.querySelector('select.a4-eqc-status-select');
    if(sel) return sel.value || '';
    var clone = td.cloneNode(true);
    clone.querySelectorAll('button,.a4-no-print').forEach(function(n){n.remove();});
    return String(clone.textContent||'').replace(/^[\s×✕✖xX*•-]+/,'').trim();
  }
  function statusSelectHtml(value){
    value = String(value||'').trim();
    if(value === 'NA') value = 'N/A';
    var html = '<select class="a4-eqc-status-select" aria-label="EQC status">';
    STATUS_OPTIONS.forEach(function(o){html += '<option value="'+o+'" '+(o===value?'selected':'')+'>'+o+'</option>';});
    return html + '</select>';
  }
  function normalizeStatusDropdowns(table){
    if(!table || !table.tBodies || !table.tBodies[0]) return;
    Array.prototype.slice.call(table.tBodies[0].rows).forEach(function(tr){
      [7,8,9].forEach(function(idx){
        var td = tr.cells[idx];
        if(!td) return;
        var value = cleanText(td);
        td.removeAttribute('contenteditable');
        td.removeAttribute('spellcheck');
        td.setAttribute('data-eqc-status-value', value);
        var sel = td.querySelector('select.a4-eqc-status-select');
        if(!sel){
          td.innerHTML = statusSelectHtml(value);
        }else if(sel.value !== value){
          sel.value = value;
        }
      });
    });
  }
  function syncRowsFromTables(){
    if(!isEqcSelected()) return;
    var out=[];
    rootTables().forEach(function(table){
      if(!table.tBodies || !table.tBodies[0]) return;
      Array.prototype.slice.call(table.tBodies[0].rows).forEach(function(tr){
        var c=tr.cells;
        if(c.length < 10) return;
        out.push({
          No: cleanText(c[0]),
          ItemDescription: cleanText(c[1]),
          Brand: cleanText(c[2]),
          Model: cleanText(c[3]),
          InstalledQuantity: cleanText(c[4]),
          Localisation: cleanText(c[5]),
          Floor: cleanText(c[6]),
          InstallationPosition: cleanText(c[7]),
          InstallationCondition: cleanText(c[8]),
          ConfirmationPower: cleanText(c[9]),
          Remarks:''
        });
      });
    });
    var f = byId('fRows');
    if(f && out.length) try{f.value = JSON.stringify(out,null,2);}catch(e){}
  }
  function normalizeTable(table){
    if(!table) return;
    var cols = table.querySelectorAll('colgroup col');
    if(cols.length){WIDTHS.forEach(function(w,i){if(cols[i])cols[i].style.width=w;});}
    var ths = table.querySelectorAll('thead th');
    HEADERS.forEach(function(h,i){if(ths[i])ths[i].innerHTML=h;});
    table.querySelectorAll('thead th:nth-child(11),tbody td:nth-child(11)').forEach(function(cell){cell.style.display='none';cell.style.visibility='hidden';cell.style.width='0';cell.style.maxWidth='0';cell.style.padding='0';cell.style.border='0';});
    normalizeStatusDropdowns(table);
  }
  function normalizeAll(){
    rootTables().forEach(normalizeTable);
    syncRowsFromTables();
    if(window.AETERLINK_A4_ADD_ROW_PAGINATION_GUARD && AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.schedule) AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.schedule(260);
  }
  function rootTables(){return Array.prototype.slice.call(document.querySelectorAll('#a4Preview table.a4-equipment-checklist-table,#a4CheckOutput table.a4-equipment-checklist-table'));}
  function patchPreview(){
    if(typeof window.loadSampleForTemplate==='function' && !window.loadSampleForTemplate.__eqcDataLayoutFinalV2){
      var oldLoad=window.loadSampleForTemplate;
      window.loadSampleForTemplate=function(){patchTemplate();var ret=oldLoad.apply(this,arguments);forceSampleRowsIfNeeded();setTimeout(normalizeAll,260);return ret;};
      window.loadSampleForTemplate.__eqcDataLayoutFinalV2=true;
    }
    if(typeof window.previewCurrentForm==='function' && !window.previewCurrentForm.__eqcDataLayoutFinalV2){
      var oldPreview=window.previewCurrentForm;
      window.previewCurrentForm=function(){patchTemplate();forceSampleRowsIfNeeded();var ret=oldPreview.apply(this,arguments);setTimeout(normalizeAll,320);return ret;};
      window.previewCurrentForm.__eqcDataLayoutFinalV2=true;
    }
  }
  function boot(){patchTemplate();patchPreview();forceSampleRowsIfNeeded();setTimeout(normalizeAll,500);}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);setTimeout(boot,1200);});
  window.addEventListener('load',function(){setTimeout(boot,300);});
  document.addEventListener('click',function(e){if(e.target&&e.target.closest&&e.target.closest('.a4-clean-add-row,.a4-clean-delete-row'))setTimeout(normalizeAll,480);},true);
  document.addEventListener('change',function(e){if(e.target&&e.target.matches&&e.target.matches('.a4-eqc-status-select')){var td=e.target.closest('td');if(td)td.setAttribute('data-eqc-status-value',e.target.value||'');syncRowsFromTables();}},true);
  setTimeout(boot,900);setTimeout(boot,2200);
  window.AETERLINK_EQC_DATA_LAYOUT_FINAL={rows:rows,apply:boot,normalize:normalizeAll};
})();
</script>
