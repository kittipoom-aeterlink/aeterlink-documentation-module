<style>

  }
</style>

ws.length-1);};rr.paginateAllScopeTables=function(){[].forEach.call(document.querySelectorAll('.a4-scope-table'),function(table){rr.paginateScopeFrom(table);});};rr.paginateScopeFrom=function(table){var page=table.closest('.a4-page');if(!page||!table.tBodies.length)return;var body=table.tBodies[0];var limit=page.getBoundingClientRect().bottom-58;var guard=0;while(body.rows.length&&body.rows[body.rows.length-1].getBoundingClientRect().bottom>limit&&guard<200){guard++;var row=body.rows[body.rows.length-1];body.removeChild(row);rr.appendRowToContinuedPage(page,table,row);}};rr.appendRowToContinuedPage=function(currentPage,sourceTable,row){var next=currentPage.nextElementSibling;if(!next||!next.classList.contains('a4-scope-continued-page')){next=rr.createContinuedScopePage(currentPage,sourceTable);currentPage.parentNode.insertBefore(next,currentPage.nextSibling);}var table=next.querySelector('table.a4-scope-table');table.tBodies[0].appendChild(row);rr.paginateScopeFrom(table);};rr.createContinuedScopePage=function(basePage,sourceTable){var page=document.createElement('div');page.className='a4-page a4-scope-continued-page';var inner=document.createElement('div');inner.className='a4-page-inner';['.a4-header','.a4-project-grid'].forEach(function(sel){var n=basePage.querySelector(sel);if(n)inner.appendChild(n.cloneNode(true));});var content=document.createElement('div');content.className='a4-content';var sec=document.createElement('div');sec.innerHTML=rr.section('SCOPE OF WORK — CONTINUED');content.appendChild(sec.firstChild);var table=sourceTable.cloneNode(false);table.appendChild(sourceTable.tHead.cloneNode(true));table.appendChild(document.createElement('tbody'));content.appendChild(table);var actions=document.createElement('div');actions.className='a4-preview-actions a4-no-print';actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button>';content.appendChild(actions);inner.appendChild(content);var f=basePage.querySelector('.a4-footer');if(f)inner.appendChild(f.cloneNode(true));page.appendChild(inner);return page;};}
  function patchPreview(){if(window.__aeterlinkPreviewPatched||typeof window.previewCurrentForm!=='function')return;window.__aeterlinkPreviewPatched=true;var original=window.previewCurrentForm;window.previewCurrentForm=function(){original.apply(this,arguments);setTimeout(function(){var rr=R();if(rr&&rr.paginateAllScopeTables)rr.paginateAllScopeTables();ensureToolbar();},80);};}
