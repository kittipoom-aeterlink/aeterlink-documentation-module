<!-- AETERLINK Documentation Module — A4_Print_Pdf_Table_Parity_Final.html -->
<!-- Final table width/print helper. No setInterval, no input/change listener, no live DOM normalize during Add/Edit. -->
<style id="a4-print-pdf-table-parity-final-style">
  #a4Preview table.a4-scope-table,
  #a4CheckOutput table.a4-scope-table,
  .a4-print-area table.a4-scope-table{
    width:100%!important;
    max-width:100%!important;

  }
  #a4Preview table.a4-scope-table th,
  #a4Preview table.a4-scope-table td,
  #a4CheckOutput table.a4-scope-table th,
  #a4CheckOutput table.a4-scope-table td,
  .a4-print-area table.a4-scope-table th,
  .a4-print-area table.a4-scope-table td{
    border:0.22mm solid #555!important;

    background-clip:padding-box!important;
    overflow:hidden!important;
    white-space:normal!important;
    overflow-wrap:anywhere!important;
    word-break:break-word!important;
  }
  #a4Preview table.a4-scope-table th,#a4CheckOutput table.a4-scope-table th,.a4-print-area table.a4-scope-table th{text-align:center!important;vertical-align:middle!important;}
  #a4Preview .a4-project-grid th,#a4CheckOutput .a4-project-grid th,.a4-print-area .a4-project-grid th,
  #a4Preview .a4-info-table th,#a4CheckOutput .a4-info-table th,.a4-print-area .a4-info-table th,
  #a4Preview .a4-info-table tr > :first-child,#a4CheckOutput .a4-info-table tr > :first-child,.a4-print-area .a4-info-table tr > :first-child{
    text-align:left!important;vertical-align:middle!important;padding-left:2.2mm!important;padding-right:1.2mm!important;padding-top:1.05mm!important;padding-bottom:1.05mm!important;
  }
  @media print{
    table th{text-align:center!important;vertical-align:middle!important;}
    table.a4-project-grid th,table.a4-info-table th,table.a4-info-table tr > :first-child{text-align:left!important;vertical-align:middle!important;padding-left:2.2mm!important;}
    table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:collapse!important;border:0.22mm solid #555!important;}
    table.a4-scope-table th,table.a4-scope-table td{border:0.22mm solid #555!important;box-shadow:none!important;background-clip:padding-box!important;}
    .a4-row-delete-btn,.prod-row-delete,.a4-row-control-bar,.a4-preview-actions,.a4-no-print,.prod-inline-editor,.prod-photo-report-toolbar{display:none!important;visibility:hidden!important}

  }
</style>
<script id="a4-print-pdf-table-parity-final-script">
(function(){
  if(window.__AETERLINK_A4_PRINT_PDF_TABLE_PARITY_PRINT_ONLY_V5__) return;
  window.__AETERLINK_A4_PRINT_PDF_TABLE_PARITY_PRINT_ONLY_V5__=true;
  var WIDTHS=['16mm','74mm','13mm','13mm','20mm','43mm'];
  function normalizeStatus(v){
    v=String(v==null?'':v).trim();
    ['Done','Pending','Not Started','In Progress','Issue','N/A','Open','Closed','Issued','Draft','Approved','Submitted'].some(function(s){
      if(v===s+s || v.replace(/\s+/g,'')===(s+s).replace(/\s+/g,'')){v=s;return true;}return false;
    });
    return v;
  }
  function cleanPrintControls(root){
    (root||document).querySelectorAll('.a4-row-delete-btn,.prod-row-delete,.a4-row-control-bar,.a4-preview-actions,.a4-no-print,.prod-inline-editor,.prod-photo-report-toolbar').forEach(function(n){n.remove();});
    (root||document).querySelectorAll('td').forEach(function(td){var select=td.querySelector('select');if(select){td.textContent=normalizeStatus(select.value||'');}});
    (root||document).querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');n.removeAttribute('spellcheck');});
  }
  function alignHeaders(root){
    (root||document).querySelectorAll('.a4-page table th').forEach(function(th){th.style.textAlign='center';th.style.verticalAlign='middle';});
    (root||document).querySelectorAll('.a4-page table.a4-info-table th,.a4-page table.a4-project-grid th').forEach(function(th){th.style.textAlign='left';th.style.verticalAlign='middle';});
    (root||document).querySelectorAll('.a4-page table.a4-info-table tr > :first-child').forEach(function(cell){cell.style.textAlign='left';cell.style.verticalAlign='middle';cell.style.paddingLeft='2.2mm';cell.style.paddingRight='1.2mm';});
  }
  function applyTableWidths(root){
    alignHeaders(root||document);
    (root||document).querySelectorAll('table.a4-scope-table').forEach(function(t){
      t.style.width='100%';t.style.maxWidth='100%';t.style.tableLayout='fixed';t.style.borderCollapse='collapse';t.style.borderSpacing='0';t.style.border='0.22mm solid #555';
      var cg=t.querySelector('colgroup'); if(!cg){cg=document.createElement('colgroup');t.insertBefore(cg,t.firstChild);} cg.innerHTML='';
      WIDTHS.slice(0,t.rows[0]?t.rows[0].cells.length:WIDTHS.length).forEach(function(w){var c=document.createElement('col');c.style.width=w;cg.appendChild(c);});
      t.querySelectorAll('th,td').forEach(function(c){c.style.border='0.22mm solid #555';c.style.boxShadow='none';c.style.backgroundClip='padding-box';c.style.overflow='hidden';c.style.whiteSpace='normal';c.style.overflowWrap='anywhere';c.style.wordBreak='break-word';});
      t.querySelectorAll('th').forEach(function(c){c.style.textAlign='center';c.style.verticalAlign='middle';});
      t.querySelectorAll('tr').forEach(function(tr){[].slice.call(tr.children).forEach(function(c,i){if(WIDTHS[i]){c.style.width=WIDTHS[i];c.style.minWidth=WIDTHS[i];c.style.maxWidth=WIDTHS[i];} if(i===5 && c.tagName!=='TH')c.style.textAlign='left';});});
    });
  }
  function patchProdNext(){
    if(!window.AETERLINK_PROD_NEXT || window.AETERLINK_PROD_NEXT.__printParityFinalPatchV5) return;
    var oldBuild=window.AETERLINK_PROD_NEXT.buildPrintReadyHtml;
    window.AETERLINK_PROD_NEXT.buildPrintReadyHtml=function(){var html=oldBuild?oldBuild.apply(this,arguments):'';var temp=document.createElement('div');temp.innerHTML=html;cleanPrintControls(temp);applyTableWidths(temp);return temp.innerHTML;};
    var oldCss=window.AETERLINK_PROD_NEXT.collectPrintCss;
    window.AETERLINK_PROD_NEXT.collectPrintCss=function(){var styleNode=document.getElementById('a4-print-pdf-table-parity-final-style');return (oldCss?oldCss.apply(this,arguments):'')+'\n'+(styleNode?styleNode.textContent:'')+'\n.a4-row-delete-btn,.prod-row-delete,.a4-row-control-bar,.a4-preview-actions,.a4-no-print,.prod-inline-editor,.prod-photo-report-toolbar{display:none!important;visibility:hidden!important}.a4-status-select{display:none!important;visibility:hidden!important}.a4-status-print{display:inline!important;visibility:visible!important}';};
    window.AETERLINK_PROD_NEXT.__printParityFinalPatchV5=true;
  }
  function install(){patchProdNext();}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(install,0);setTimeout(install,800);});
  window.addEventListener('load',function(){setTimeout(install,0);});
  setTimeout(install,300);
  window.AETERLINK_A4_PRINT_PDF_PARITY_FINAL={normalize:applyTableWidths,cleanPrintControls:cleanPrintControls,applyTableWidths:applyTableWidths,alignHeaders:alignHeaders};
})();
</script>
