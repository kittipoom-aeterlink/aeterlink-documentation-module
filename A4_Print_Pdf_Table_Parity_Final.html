<script id="a4-print-pdf-table-parity-final-script">
(function(){
  if(window.__AETERLINK_A4_PRINT_PDF_TABLE_PARITY_FINAL__) return;
  window.__AETERLINK_A4_PRINT_PDF_TABLE_PARITY_FINAL__=true;
  var WIDTHS=['16mm','74mm','13mm','13mm','20mm','43mm'];
  function normalizeStatus(v){
    v=String(v==null?'':v).trim();
    ['Done','Pending','Not Started','In Progress','Issue','N/A','Open','Closed','Issued','Draft','Approved','Submitted'].some(function(s){
      if(v===s+s || v.replace(/\s+/g,'')===(s+s).replace(/\s+/g,'')){v=s;return true;}return false;
    });
    return v;
  }
  function cleanPrintControls(root){
    (root||document).querySelectorAll('.a4-row-delete-btn,.prod-row-delete,.a4-row-control-bar,.a4-preview-actions,.a4-no-print,.prod-inline-editor,.prod-photo-report-toolbar').forEach(function(n){n.remove();});
    (root||document).querySelectorAll('td').forEach(function(td){
      var select=td.querySelector('select');
      if(select){td.textContent=normalizeStatus(select.value||'');}
      td.querySelectorAll('.a4-status-print').forEach(function(sp){sp.textContent=normalizeStatus(sp.textContent||'');});
    });
    (root||document).querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');n.removeAttribute('spellcheck');});
  }
  function applyTableWidths(root){
    (root||document).querySelectorAll('table.a4-scope-table').forEach(function(t){
      t.style.width='100%';t.style.maxWidth='100%';t.style.tableLayout='fixed';t.style.borderCollapse='collapse';t.style.borderSpacing='0';t.style.border='0.22mm solid #555';
      var cg=t.querySelector('colgroup'); if(!cg){cg=document.createElement('colgroup');t.insertBefore(cg,t.firstChild);} cg.innerHTML='';
      WIDTHS.forEach(function(w){var c=document.createElement('col');c.style.width=w;cg.appendChild(c);});
      t.querySelectorAll('th,td').forEach(function(c){c.style.border='0.22mm solid #555';c.style.boxShadow='none';c.style.backgroundClip='padding-box';c.style.overflow='hidden';c.style.whiteSpace='normal';c.style.overflowWrap='anywhere';c.style.wordBreak='break-word';});
      t.querySelectorAll('tr').forEach(function(tr){[].slice.call(tr.children).forEach(function(c,i){if(WIDTHS[i]){c.style.width=WIDTHS[i];c.style.minWidth=WIDTHS[i];c.style.maxWidth=WIDTHS[i];} if(i===5)c.style.textAlign='left';});});
    });
  }
  function normalize(root){applyTableWidths(root||document);}
  function patchProdNext(){
    if(!window.AETERLINK_PROD_NEXT || window.AETERLINK_PROD_NEXT.__printParityFinalPatch) return;
    var oldBuild=window.AETERLINK_PROD_NEXT.buildPrintReadyHtml;
    window.AETERLINK_PROD_NEXT.buildPrintReadyHtml=function(){
      var html=oldBuild?oldBuild.apply(this,arguments):'';
      var temp=document.createElement('div');temp.innerHTML=html;cleanPrintControls(temp);applyTableWidths(temp);return temp.innerHTML;
    };
    var oldCss=window.AETERLINK_PROD_NEXT.collectPrintCss;
    window.AETERLINK_PROD_NEXT.collectPrintCss=function(){
      return (oldCss?oldCss.apply(this,arguments):'')+'\n'+document.getElementById('a4-print-pdf-table-parity-final-style').textContent+'\n.a4-row-delete-btn,.prod-row-delete,.a4-row-control-bar,.a4-preview-actions,.a4-no-print,.prod-inline-editor,.prod-photo-report-toolbar{display:none!important;visibility:hidden!important}table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:collapse!important;border:0.22mm solid #555!important}table.a4-scope-table th,table.a4-scope-table td{border:0.22mm solid #555!important;box-shadow:none!important;background-clip:padding-box!important}';
    };
    window.AETERLINK_PROD_NEXT.__printParityFinalPatch=true;
  }
  function boot(){patchProdNext();normalize(document.getElementById('a4Preview')||document);}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,300);setTimeout(boot,1200);setTimeout(boot,2600);});
  var timer=setInterval(boot,1200);setTimeout(function(){clearInterval(timer);boot();},20000);
  window.AETERLINK_A4_PRINT_PDF_PARITY_FINAL={normalize:normalize,cleanPrintControls:cleanPrintControls,applyTableWidths:applyTableWidths};
})();
</script>
