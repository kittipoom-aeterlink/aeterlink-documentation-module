name: Deploy Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - "Code.gs"
      - "Index.html"
      - "appsscript.json"
      - ".clasp.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Push and Deploy to Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Apply V22 English UI runner patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          pairs = {
            '<title>AETERLINK Documentation Control V10</title>':'<title>AETERLINK Documentation Control V22</title>',
            'V19 Smart Engine · Loading...':'V22 English UI · Loading...',
            'V16 — offline (server not connected)':'V22 — offline (server not connected)',
            "All: 'เอกสารทั้งหมด'":"All: 'All documents'",
            "'01_INITIATION': '1. เริ่มโครงการ / รับมอบจากฝ่ายขาย'":"'01_INITIATION': '1. Project Start / Sales Handover'",
            "'02_PLANNING': '2. วางแผนโครงการ / ควบคุมโครงการ'":"'02_PLANNING': '2. Project Planning / Control'",
            "'03_DESIGN': '3. Design & Engineering / เอกสารขออนุมัติ'":"'03_DESIGN': '3. Design & Engineering / Approval Documents'",
            "'07_HANDOVER': '7. Handover / Closeout / ส่งมอบงาน'":"'07_HANDOVER': '7. Handover / Closeout'",
            "'08_WARRANTY': '8. Warranty / DLP / หลังส่งมอบ'":"'08_WARRANTY': '8. Warranty / DLP / Post-handover'",
            'ใช้สำหรับแยกเอกสารตามลำดับงานตั้งแต่เริ่มโครงการ → วางแผน → ออกแบบ → จัดซื้อ → ติดตั้ง → ทดสอบ → ส่งมอบ → Warranty/DLP':'Used to group documents by project lifecycle: initiation → planning → design → procurement → installation → testing → handover → Warranty/DLP'
          }
          for name in ['Index.html','Code.gs']:
            p = Path(name)
            s = p.read_text(encoding='utf-8')
            for a,b in pairs.items():
              s = s.replace(a,b)
            s = s.replace('V21_DOCUMENT_LIFECYCLE_GROUPING','V22_ENGLISH_UI')
            p.write_text(s, encoding='utf-8', newline='\n')
          PY

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Restore clasp credentials
        run: |
          echo "${{ secrets.CLASPRC_JSON_B64 }}" | base64 -d > ~/.clasprc.json
          test -s ~/.clasprc.json

      - name: Create clasp config
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "${{ secrets.SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push code to Apps Script
        run: clasp --user default push --force

      - name: Deploy to existing Web App deployment
        run: |
          clasp --user default deploy \
            --deploymentId "${{ secrets.DEPLOYMENT_ID }}" \
            --description "Auto deploy from GitHub Actions - $GITHUB_SHA"
