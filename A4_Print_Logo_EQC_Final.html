  var EQC_CHUNK_FIRST = 17;
  var EQC_CHUNK_NEXT = 18;
  function byId(id){return document.getElementById(id);}
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function logoHtml(){return '<img class="a4-logo-img a4-official-logo-img" alt="AETERLINK Logo" src="'+LOGO_SRC+'">';}
  function patchLogo(){
    if(window.AETERLINK_A4_RENDERER){window.AETERLINK_A4_RENDERER.logoSvg=logoHtml;window.AETERLINK_A4_RENDERER.__aeterlinkOfficialLogoFinal=true;}
    document.querySelectorAll('.a4-logo-cell').forEach(function(cell){if(cell.innerHTML.indexOf('a4-official-logo-img')<0)cell.innerHTML=logoHtml();});
  }
  function clean(clone){
    clone.querySelectorAll('.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-clean-row-bar,.a4-clean-delete-row,.a4-row-delete-btn,.prod-row-delete,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column,.prod-photo-report-toolbar').forEach(function(n){n.remove();});
    clone.querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');n.removeAttribute('spellcheck');});
    clone.querySelectorAll('.a4-logo-cell').forEach(function(cell){cell.innerHTML=logoHtml();});
  }
  function isEqcClone(clone){return !!clone.querySelector('table.a4-equipment-checklist-table');}
  function headers(){return ['No.','Item description','brand','Product name','Installed Quantity','Localisation','Floor','Installation Position<br>(matches as-built drawings?)','Installation Condition<br>(no risk of falling or detachment?)','Confirmation of power-on<br>(operate after power-on?)'];}
  function keys(){return ['No','ItemDescription','Brand','Model','InstalledQuantity','Localisation','Floor','InstallationPosition','InstallationCondition','ConfirmationPower'];}
  function rowText(td){var c=td.cloneNode(true);c.querySelectorAll('button,.a4-no-print').forEach(function(n){n.remove();});return String(c.textContent||'').replace(/^[\s×✕✖xX*•-]+/,'').trim();}
  function rowsFromClone(clone){
    var out=[];
    clone.querySelectorAll('table.a4-equipment-checklist-table tbody tr').forEach(function(tr){
      var c=tr.cells;if(c.length<10)return;
      var r={};keys().forEach(function(k,i){r[k]=rowText(c[i]);});
      if(r.No||r.ItemDescription||r.Model)out.push(r);
    });
    if(out.length) return out;
    try{var arr=JSON.parse((byId('fRows')&&byId('fRows').value)||'[]');return Array.isArray(arr)?arr:[];}catch(e){return [];}
  }
  function tableHtml(rows){
    var widths=['4%','18%','7%','17%','7%','10%','5%','13%','13%','6%'];
    var h=headers(), k=keys();
    var html='<table class="a4-scope-table a4-equipment-checklist-table"><colgroup>'+widths.map(function(w){return '<col style="width:'+w+'">';}).join('')+'</colgroup><thead><tr>'+h.map(function(x){return '<th>'+x+'</th>';}).join('')+'</tr></thead><tbody>';
    rows.forEach(function(r){html+='<tr>'+k.map(function(key){return '<td>'+esc(r[key]||'')+'</td>';}).join('')+'</tr>';});
    return html+'</tbody></table>';
  }
  function infoHtml(firstContent){
    var html='', stop=false;
    Array.prototype.slice.call(firstContent.children).forEach(function(ch){
      if(stop) return;
      if(ch.matches&&ch.matches('table.a4-equipment-checklist-table')){stop=true;return;}
      if(ch.textContent&&/EQUIPMENT\s+CHECKLIST/i.test(ch.textContent)&&ch.classList.contains('a4-section-title')){stop=true;return;}
      html+=ch.outerHTML;
    });
    return html;
  }
  function section(title){return '<div class="a4-section-title a4-editable a4-section-scope">'+title+'</div>';}
  function updateFooter(root){
    var ps=Array.prototype.slice.call(root.querySelectorAll('.a4-page'));
    ps.forEach(function(p,i){var f=p.querySelector('.a4-footer');if(f)f.innerHTML='<span class="a4-footer-center">Document No.: Not issued &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(i+1)+' / '+ps.length+'</span>';});
  }
  function prepareEqcPrintClone(clone){
    if(!isEqcClone(clone))return clone;
    var allRows=rowsFromClone(clone); if(!allRows.length)return clone;
    var pages=Array.prototype.slice.call(clone.children).filter(function(n){return n.classList&&n.classList.contains('a4-page');});
    if(!pages.length)return clone;
    var first=pages[0], firstContent=first.querySelector('.a4-content'); if(!firstContent)return clone;
    var info=infoHtml(firstContent);
    var chunks=[allRows.slice(0,EQC_CHUNK_FIRST)];
    for(var i=EQC_CHUNK_FIRST;i<allRows.length;i+=EQC_CHUNK_NEXT)chunks.push(allRows.slice(i,i+EQC_CHUNK_NEXT));
    pages.slice(1).forEach(function(p){p.remove();});
    firstContent.innerHTML=info+section('EQUIPMENT CHECKLIST')+tableHtml(chunks[0]);
    for(var c=1;c<chunks.length;c++){
      var page=first.cloneNode(true);
      var content=page.querySelector('.a4-content');
      if(content)content.innerHTML=section('EQUIPMENT CHECKLIST — CONTINUED')+tableHtml(chunks[c]);
      clone.appendChild(page);
    }
    clean(clone); updateFooter(clone); return clone;
  }
  function primaryArea(){return document.querySelector('#a4Preview .a4-print-area')||document.querySelector('#a4Preview #a4PrintArea')||document.querySelector('.a4-print-area')||document.querySelector('#a4PrintArea');}
  function printA4(){
    patchLogo();
    if(window.AETERLINK_A4_ADD_ROW_PAGINATION_GUARD&&AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.run)try{AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.run();}catch(e){}
    var source=primaryArea(); if(!source){window.print();return;}
    var clone=source.cloneNode(true); clean(clone); prepareEqcPrintClone(clone);
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent||'';}).join('\n');
    var exactCss='@page{size:210mm 297mm;margin:0!important;}*{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-page{position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}.a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}.a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;}.a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-clean-row-bar,.a4-clean-delete-row,.a4-row-delete-btn,.prod-row-delete,.row-actions,.photo-actions{display:none!important;visibility:hidden!important}.a4-logo-img,.a4-official-logo-img{width:41mm!important;max-width:41mm!important;height:auto!important;max-height:15mm!important;object-fit:contain!important;display:block!important;margin:0 auto!important;}';
    var win=window.open('','_blank'); if(!win){window.print();return;}
    win.document.open(); win.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>A4 Print</title><style>'+styles+'\n'+exactCss+'</style></head><body>'+clone.outerHTML+'</body></html>'); win.document.close();
    setTimeout(function(){win.focus();win.print();},600);
  }
  function dedupeEqcOptions(){
    ['prodDocType','fTemplate'].forEach(function(id){
      var sel=byId(id); if(!sel||!sel.options)return;
      Array.prototype.slice.call(sel.options).forEach(function(o){ if(o.value==='PJ-EQUIP-CHK-001') o.remove(); });
      if(sel.value==='PJ-EQUIP-CHK-001') sel.value='PJ-EQC-001';
    });
    if(window.AETERLINK_ALL_DOCUMENT_ROWS)window.AETERLINK_ALL_DOCUMENT_ROWS=window.AETERLINK_ALL_DOCUMENT_ROWS.filter(function(r){return r.TemplateCode!=='PJ-EQUIP-CHK-001';});
  }
  function boot(){patchLogo();dedupeEqcOptions();if(window.AETERLINK_A4_RENDERER)window.AETERLINK_A4_RENDERER.printA4=printA4;}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);setTimeout(boot,1000);setTimeout(boot,2500);});
  window.addEventListener('load',function(){setTimeout(boot,300);});
  document.addEventListener('change',function(e){if(e.target&&e.target.matches&&e.target.matches('#prodDocType,#fTemplate'))setTimeout(dedupeEqcOptions,80);},true);
  setInterval(function(){patchLogo();dedupeEqcOptions();if(window.AETERLINK_A4_RENDERER)window.AETERLINK_A4_RENDERER.printA4=printA4;},3500);
  window.AETERLINK_PRINT_LOGO_EQC_FINAL={printA4:printA4,patchLogo:patchLogo,dedupeEqcOptions:dedupeEqcOptions,prepareEqcPrintClone:prepareEqcPrintClone};
})();
