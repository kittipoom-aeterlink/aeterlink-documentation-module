<!-- AETERLINK Documentation Module — A4_Document_Type_Grouping.html -->
<style id="a4-document-type-grouping-style">
  .prod-doc-type-tools{margin:6px 0 8px;display:grid;gap:6px;}
  .prod-doc-type-search{width:100%;box-sizing:border-box;border:1px solid var(--aeterlink-line);border-radius:10px;padding:8px 9px;background:#f7fbfd;font-family:inherit;color:#1e3446;font-size:12px;}
  .prod-doc-type-hint{font-size:11px;color:#6b7f90;line-height:1.35;}
  #prodDocType optgroup{font-weight:900;color:#17395d;background:#eef7fb;}
  #prodDocType option{font-weight:500;color:#1e3446;background:#fff;padding:4px 6px;}
</style>
<script id="a4-document-type-grouping-script">
(function(){
  var state={select:null,search:null,allOptions:[],rendering:false,observer:null};
  var STAGES=[['00_CORE','00 — Core / Standard Forms'],['01_INITIATION','01 — Initiation / Kick-off'],['02_PLANNING','02 — Planning / Schedule / Control'],['03_DESIGN','03 — Design / Engineering / Submittal'],['04_PROCUREMENT','04 — Procurement / Material'],['05_CONSTRUCTION','05 — Construction / Installation / Work Permit'],['06_TESTING','06 — Testing / Commissioning'],['07_HANDOVER','07 — Handover / Completion / Payment'],['08_WARRANTY','08 — Warranty / DLP'],['09_RISK','09 — Risk / Issue / Safety'],['99_OTHER','99 — Other / Template / System']];
  var ORDER={};STAGES.forEach(function(s,i){ORDER[s[0]]=i;});
  var ALIAS={'PJ-WORK-COMPLETE-001':'PJ-WCR-001','PJ-WORK-COMPLETE':'PJ-WCR-001'};
  function byId(id){return document.getElementById(id);}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function canonical(code){code=String(code||'').trim().toUpperCase();return ALIAS[code]||code;}
  function letters(w){return String(w||'').toUpperCase().replace(/[^A-Z0-9]/g,'');}
  function cleanName(text,code){var v=String(text||code||'').replace(/^[A-Z0-9-]+\s+[—-]\s*/,'').trim();if(!v||/^PJ-[A-Z0-9-]+$/.test(v))v=String(code||'').replace(/^PJ-/,'').replace(/-\d{3,4}$/,'').replace(/-/g,' ');return v;}
  function words(name){return cleanName(name).replace(/\([^)]*\)/g,' ').replace(/&/g,' AND ').replace(/[\/]/g,' ').replace(/[-–—]/g,' ').toUpperCase().replace(/[^A-Z0-9]+/g,' ').split(/\s+/).filter(function(w){return w&&!/^\d+$/.test(w);});}
  function first(w){return (letters(w)||'X').charAt(0);}
  function nextConsonant(w){w=letters(w);for(var i=1;i<w.length;i++){if(!/[AEIOU]/.test(w.charAt(i)))return w.charAt(i);}return w.charAt(1)||w.charAt(0)||'X';}
  function nextLetter(w){return (letters(w)||'').charAt(1);}
  function explicitAcronym(name){var s=String(name||'');var m=s.match(/\(([A-Z0-9]{2,6})\)/);if(m)return m[1].toUpperCase();var x=s.match(/[\/]\s*([A-Z0-9]{2,6})\b/);return x?x[1].toUpperCase():'';}
  function extend(ac,name,len){ac=letters(ac);if(len<=3)return (ac+'XXX').substring(0,3);if(ac.length>=4)return ac.substring(0,4);var src=words(name).map(letters).join('')+ac+'X';while(ac.length<4)ac+=src.charAt(ac.length)||'X';return ac.substring(0,4);}
  function baseAbbrev(name,code,len){code=canonical(code);name=cleanName(name,code);var ex=explicitAcronym(name);if(ex)return extend(ex,name,len);if(/WORK\s+COMPLETION\s+REPORT/i.test(name)||code==='PJ-WCR-001')return len>3?'WCRP':'WCR';var ws=words(name);if(!ws.length)ws=words(code);var out='';if(ws.length>=3){out=first(ws[0])+first(ws[1])+first(ws[2]);if(len>3)out+=first(ws[3])||nextLetter(ws[2])||nextLetter(ws[1])||nextLetter(ws[0])||'X';}else if(ws.length===2){out=first(ws[0])+nextConsonant(ws[0])+first(ws[1]);if(len>3)out=first(ws[0])+nextConsonant(ws[0])+first(ws[1])+nextConsonant(ws[1]);}else{out=first(ws[0]||code)+nextConsonant(ws[0]||code)+nextConsonant(String(ws[0]||code).substring(1));if(len>3)out+=nextLetter(ws[0]||code)||'X';}out=letters(out);var src=ws.map(letters).join('')+code.replace(/[^A-Z0-9]/g,'');while(out.length<(len>3?4:3))out+=src.charAt(out.length)||'X';return out.substring(0,len>3?4:3);}
  function classify(o){var code=canonical(o.value||'');var text=(code+' '+String(o.rawText||o.name||'').toUpperCase()).replace(/[_-]+/g,' ');if(/^TEMPLATE/.test(code)||/ TEMPLATE | SYSTEM /.test(text))return '99_OTHER';if(/WARRANTY|DLP|DEFECT/.test(text))return '08_WARRANTY';if(/RISK|ISSUE|NCR|SAFETY|HSE|INCIDENT/.test(text))return '09_RISK';if(/HANDOVER|CLOSEOUT|CLOSE OUT|AS BUILT|O&M|OM MANUAL|WCR|WORK COMPLETION|COMPLETION REPORT|RELEASE NOTE|PAY|PAYMENT|CLAIM|MILESTONE|VO|VARIATION|CONTRACT|INSURANCE/.test(text))return '07_HANDOVER';if(/TEST|COMMISSION|COMMISSIONING|T&C|T AND C|SAT|FAT|FUNCTIONAL|ITP|ITR/.test(text))return '06_TESTING';if(/WORK PERMIT|PERMIT|INSTALL|INSTALLATION|CONSTRUCTION|SITE|INSPECTION|CHECKLIST|PUNCH/.test(text))return '05_CONSTRUCTION';if(/PROCURE|PURCHASE|PO|MATERIAL|REQUISITION|EQUIPMENT|SHOPPING|SUPPLIER|DELIVERY|GRN|STOCK/.test(text))return '04_PROCUREMENT';if(/DESIGN|DRAWING|DRW|ENGINEERING|RFI|RFA|SUBMITTAL|CALC|CALCULATION|SPEC|TECHNICAL|SHOP DRAWING/.test(text))return '03_DESIGN';if(/SCHEDULE|SCH|PLAN|MOM|MEETING|MTG|AGENDA|PROGRESS|FORECAST|TRACKER|MASTER SCHEDULE/.test(text))return '02_PLANNING';if(/KICKOFF|KICK OFF|START|INITIATION|CHARTER|PROJECT OPEN/.test(text))return '01_INITIATION';return '99_OTHER';}
  function rawOptions(select){var seen={};return Array.prototype.slice.call(select.querySelectorAll('option')).filter(function(o){return o.value;}).map(function(o){var raw=o.value,code=canonical(raw),rawText=o.textContent||o.innerText||raw,name=cleanName(rawText,code);return {value:code,sourceValue:raw,rawText:rawText,name:name,selected:o.selected,stage:classify({value:code,rawText:rawText,name:name})};}).filter(function(o){if(seen[o.value])return false;seen[o.value]=true;return true;});}
  function optionList(select){var items=rawOptions(select),count={};items.forEach(function(o){o.base=baseAbbrev(o.name,o.value,3);count[o.base]=(count[o.base]||0)+1;});var used={};items.forEach(function(o){var abbr=count[o.base]>1?baseAbbrev(o.name,o.value,4):o.base;if(used[abbr])abbr=baseAbbrev(o.name,o.value,4);var n=2;while(used[abbr]){abbr=(baseAbbrev(o.name,o.value,4)+String(n)).substring(0,5);n++;}used[abbr]=true;var seq=(String(o.value).match(/-(\d{3})$/)||[])[1]||'001';o.displayCode='PJ-'+abbr+'-'+seq;o.text=o.displayCode+' — '+o.name;});return items;}
  function sig(list){return list.map(function(o){return o.value+'|'+o.text;}).join('\n');}
  function ensureTools(select){var field=select.closest('.prod-field')||select.parentNode;if(!field)return null;var existing=byId('prodDocTypeSearch');if(existing)return existing;var tools=document.createElement('div');tools.className='prod-doc-type-tools';tools.innerHTML='<input id="prodDocTypeSearch" class="prod-doc-type-search" type="search" placeholder="Search document type by code / name / phase..."><div class="prod-doc-type-hint">Document Type is grouped by phase. Examples: List of Materials = LOM, Inspection Test Plan (ITP) = ITP, Inspection Test Record (ITR) = ITR, Material Requisition = MTR.</div>';field.insertBefore(tools,select);var input=byId('prodDocTypeSearch');input.addEventListener('input',function(){renderGrouped(select,false);});return input;}
  function filtered(){var q=(state.search&&state.search.value||'').trim().toUpperCase(),list=state.allOptions.slice();if(!q)return list;return list.filter(function(o){var s=(o.value+' '+o.text+' '+o.rawText+' '+o.name+' '+(STAGES[ORDER[o.stage]]?STAGES[ORDER[o.stage]][1]:'')).toUpperCase();return s.indexOf(q)>=0;});}
  function renderGrouped(select,refreshBase){if(!select)return;if(refreshBase){var next=optionList(select);if(next.length&&sig(next)!==sig(state.allOptions))state.allOptions=next;}if(!state.allOptions.length)state.allOptions=optionList(select);var selected=canonical(select.value||(byId('fTemplate')&&byId('fTemplate').value)||'');if(!state.allOptions.some(function(o){return o.value===selected;}))selected=state.allOptions[0]?state.allOptions[0].value:selected;var list=filtered().sort(function(a,b){var da=(ORDER[a.stage]==null?99:ORDER[a.stage]),db=(ORDER[b.stage]==null?99:ORDER[b.stage]);if(da!==db)return da-db;return String(a.displayCode||a.value).localeCompare(String(b.displayCode||b.value));});var groups={};list.forEach(function(o){(groups[o.stage]||(groups[o.stage]=[])).push(o);});var html='';STAGES.forEach(function(s){var items=groups[s[0]]||[];if(!items.length)return;html+='<optgroup label="'+esc(s[1])+'">'+items.map(function(o){return '<option value="'+esc(o.value)+'" '+(o.value===selected?'selected':'')+'>'+esc(o.text)+'</option>';}).join('')+'</optgroup>';});if(!html)html='<option value="'+esc(selected)+'" selected>No matching document type</option>';state.rendering=true;select.innerHTML=html;select.value=selected;var hidden=byId('fTemplate');if(hidden)hidden.value=selected;state.rendering=false;}
  function setup(){var select=byId('prodDocType');if(!select)return false;if(state.select!==select){if(state.observer)state.observer.disconnect();state.select=select;state.search=ensureTools(select);state.allOptions=optionList(select);state.observer=new MutationObserver(function(){if(state.rendering)return;setTimeout(function(){if(state.select)renderGrouped(state.select,true);},30);});state.observer.observe(select,{childList:true,subtree:true});renderGrouped(select,true);return true;}return true;}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(setup,500);setTimeout(setup,1200);setTimeout(setup,2500);});var timer=setInterval(setup,900);setTimeout(function(){clearInterval(timer);setup();},12000);
})();
</script>
