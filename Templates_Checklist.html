<script>
  window.AETERLINK_TEMPLATES = window.AETERLINK_TEMPLATES || {};

  window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST = {
    templateCodes: ['PJ-EQUIP-CHK-001'],
    title: 'EQUIPMENT CHECKLIST',
    displayName: 'Equipment Checklist',
    sections: {
      documentInformation: 'DOCUMENT INFORMATION',
      checklist: 'EQUIPMENT CHECKLIST',
      inspectionResult: 'INSPECTION RESULT',
      approval: 'APPROVAL / ACCEPTANCE'
    },
    rules: {
      hideActionColumnOnPrint: true,
      useMasterA4Layout: true,
      preventFooterOverlap: true,
      paginateRows: true,
      keepHeaderOnEachPage: true
    },
    columns: [
      { key: 'No', label: 'No.', width: '9mm' },
      { key: 'EquipmentTag', label: 'Equipment Tag', width: '26mm' },
      { key: 'Description', label: 'Description', width: 'auto' },
      { key: 'Location', label: 'Location', width: '24mm' },
      { key: 'CheckItem', label: 'Check Item', width: '34mm' },
      { key: 'Status', label: 'Status', width: '20mm' },
      { key: 'Remark', label: 'Remark', width: '28mm' }
    ]
  };

  window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.sampleData = function() {
    return {
      ProjectCode: 'TEST-PJ',
      ProjectName: 'Modular A4 Layout Check',
      Client: 'Sample Client',
      MainContractor: 'AETERLINK',
      DocumentNo: 'TEST-EQUIP-CHK-0001',
      RevisionNo: 'R00',
      Status: 'Draft',
      ChecklistRows: [
        { No:'1', EquipmentTag:'AHU-01', Description:'Air Handling Unit', Location:'Level 1', CheckItem:'Nameplate and installation condition', Status:'Done', Remark:'OK' },
        { No:'2', EquipmentTag:'PCHP-01', Description:'Primary Chilled Water Pump', Location:'Plant Room', CheckItem:'Cable termination and rotation check', Status:'Done', Remark:'OK' },
        { No:'3', EquipmentTag:'CT-01', Description:'Cooling Tower', Location:'Roof', CheckItem:'General visual inspection', Status:'Pending', Remark:'Client witness required' }
      ]
    };
  };

  window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.render = function(data, options) {
    data = Object.assign(window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.sampleData(), data || {});
    options = options || {};
    var tpl = window.AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST;
    var rows = data.ChecklistRows || [];

    return '<div class="a4-root a4-print-area" id="a4PrintArea">' +
      AETERLINK_A4_RENDERER.page({
        title: tpl.title,
        documentNo: data.DocumentNo || '',
        revisionNo: data.RevisionNo || 'R00',
        status: data.Status || 'Draft',
        content: AETERLINK_A4_RENDERER.documentInfo(data) +
          AETERLINK_A4_RENDERER.section(tpl.sections.checklist) +
          AETERLINK_A4_RENDERER.table(tpl.columns, rows)
      }) +
      '</div>';
  };
</script>
