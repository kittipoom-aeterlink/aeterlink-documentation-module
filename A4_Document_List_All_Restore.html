<!-- AETERLINK Documentation Module — A4_Document_List_All_Restore.html -->
<!-- Restore full Document Type list. Does not touch A4 row Add/Delete/Pagination. -->
<style id="a4-document-list-all-restore-style">
  #prodDocType option.a4-doc-restore-master{font-weight:700;}
  #prodDocType optgroup{font-weight:900;color:#17395d;background:#eef7fb;}
</style>
<script id="a4-document-list-all-restore-script">
(function(){
  if(window.__AETERLINK_DOC_LIST_ALL_RESTORE_V1__) return;
  window.__AETERLINK_DOC_LIST_ALL_RESTORE_V1__=true;

  var PHASES=[
    ['00_ALL','All Documents'],
    ['01_INITIATION','01 — Start / Initiation'],
    ['02_PLANNING','02 — Planning / Control'],
    ['03_DESIGN','03 — Design / Engineering'],
    ['04_PROCUREMENT','04 — Procurement / Material'],
    ['05_CONSTRUCTION','05 — Construction / Installation / Work Permit'],
    ['06_TESTING','06 — Testing / Commissioning'],
    ['07_HANDOVER','07 — Handover / Completion / Payment'],
    ['08_WARRANTY','08 — Warranty / DLP']
  ];
  var MASTER=[
    ['PJ-START-001','Project Start / Kickoff Record','01_INITIATION'],
    ['PJ-PIC-001','Project Information Card','01_INITIATION'],
    ['PJ-CONTRACT-001','Contract / PO Summary','01_INITIATION'],
    ['PJ-KOM-001','Kickoff Meeting Minutes','01_INITIATION'],
    ['PJ-SCOPE-001','Scope Clarification Record','01_INITIATION'],
    ['PJ-SCH-001','Master Schedule','02_PLANNING'],
    ['PJ-CASH-001','Cashflow Forecast','02_PLANNING'],
    ['PJ-MANPOWER-001','Manpower Plan','02_PLANNING'],
    ['PJ-RISK-001','Risk Register','02_PLANNING'],
    ['PJ-ISSUE-001','Issue Log','02_PLANNING'],
    ['PJ-DOC-REG-001','Document Register','02_PLANNING'],
    ['PJ-MOM-001','Meeting Minutes','02_PLANNING'],
    ['PJ-AGENDA-001','Meeting Schedule / Agenda','02_PLANNING'],
    ['PJ-DRAW-REG-001','Drawing Register','03_DESIGN'],
    ['PJ-DRAW-REV-001','Drawing Review Record','03_DESIGN'],
    ['PJ-SHOP-DRW-001','Shop Drawing Review','03_DESIGN'],
    ['PJ-CALC-001','Calculation Sheet','03_DESIGN'],
    ['PJ-SPEC-001','Specification / Datasheet Review','03_DESIGN'],
    ['PJ-RFI-001','Request for Information','03_DESIGN'],
    ['PJ-RFA-001','Request for Approval','03_DESIGN'],
    ['PJ-SUBMIT-001','Client Submittal','03_DESIGN'],
    ['PJ-MR-001','Material Requisition','04_PROCUREMENT'],
    ['PJ-MTR-001','Material Requisition – MTR','04_PROCUREMENT'],
    ['PJ-LOM-001','List of Materials','04_PROCUREMENT'],
    ['PJ-PO-REQ-001','Purchase Request / PO Request','04_PROCUREMENT'],
    ['PJ-MAT-IN-001','Material Receiving Inspection','04_PROCUREMENT'],
    ['PJ-MAT-DEL-001','Material Delivery Record','04_PROCUREMENT'],
    ['PJ-EQC-001','Equipment Checklist','05_CONSTRUCTION'],
    ['PJ-EQUIP-CHK-001','Equipment Checklist','05_CONSTRUCTION'],
    ['PJ-JSA-001','Job Safety Analysis','05_CONSTRUCTION'],
    ['PJ-WP-001','Work Permit','05_CONSTRUCTION'],
    ['PJ-METHOD-001','Method Statement','05_CONSTRUCTION'],
    ['PJ-INST-PLAN-001','Installation Plan','05_CONSTRUCTION'],
    ['PJ-INST-CHK-001','Installation Checklist','05_CONSTRUCTION'],
    ['PJ-ITP-001','Inspection Test Plan','05_CONSTRUCTION'],
    ['PJ-ITR-001','Inspection Test Record','05_CONSTRUCTION'],
    ['PJ-NCR-001','NCR / Defect Report','05_CONSTRUCTION'],
    ['PJ-PUNCH-001','Punch List','05_CONSTRUCTION'],
    ['PJ-PROG-001','Progress Report','05_CONSTRUCTION'],
    ['PJ-SAT-001','Site Acceptance Test','06_TESTING'],
    ['PJ-FAT-001','Factory Acceptance Test','06_TESTING'],
    ['PJ-TC-001','Testing & Commissioning Report','06_TESTING'],
    ['PJ-FUNC-TEST-001','Functional Test Record','06_TESTING'],
    ['PJ-IO-TEST-001','I/O Point Test Record','06_TESTING'],
    ['PJ-LOOP-TEST-001','Loop Test Record','06_TESTING'],
    ['PJ-WCR-001','Work Completion Report','07_HANDOVER'],
    ['PJ-WORK-COMPLETE-001','Work Completion Report','07_HANDOVER'],
    ['PJ-HANDOVER-001','Handover Record','07_HANDOVER'],
    ['PJ-ASBUILT-001','As-Built Drawing Submission','07_HANDOVER'],
    ['PJ-OM-001','O&M Manual Submission','07_HANDOVER'],
    ['PJ-TRAIN-001','Training Record','07_HANDOVER'],
    ['PJ-RELEASE-001','Release Note','07_HANDOVER'],
    ['PJ-PAY-001','Payment Claim','07_HANDOVER'],
    ['PJ-PAY-MILE-001','Payment Milestone Record','07_HANDOVER'],
    ['PJ-CLOSE-001','Project Closeout Report','07_HANDOVER'],
    ['PJ-WARRANTY-001','Warranty Certificate','08_WARRANTY'],
    ['PJ-DLP-001','DLP / Warranty Defect Log','08_WARRANTY'],
    ['PJ-SERVICE-001','Service Visit Report','08_WARRANTY'],
    ['PJ-CORRECT-001','Corrective Action Record','08_WARRANTY']
  ];

  function byId(id){return document.getElementById(id);}
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function norm(v){return String(v==null?'':v).trim();}
  function upper(v){return norm(v).toUpperCase();}
  function phaseLabel(key){for(var i=0;i<PHASES.length;i++){if(PHASES[i][0]===key)return PHASES[i][1];}return key||'Other';}
  function inferPhase(row){
    var text=upper([row.TemplateCode,row.DocumentCode,row.TemplateName,row.DocumentTitle,row.Module,row.ModuleGroup,row.DocCategory,row.Phase,row.PhaseNo].join(' '));
    if(/WARRANTY|DLP|SERVICE/.test(text))return '08_WARRANTY';
    if(/HANDOVER|WCR|WORK.*COMP|PAYMENT|PAY|CLOSE|AS.?BUILT|O&M|OM|TRAIN|RELEASE/.test(text))return '07_HANDOVER';
    if(/TEST|COMMISSION|SAT|FAT|FUNCTION|LOOP|I\/O|IO/.test(text))return '06_TESTING';
    if(/CONSTRUCTION|INSTALL|JSA|WORK PERMIT|PERMIT|METHOD|ITP|ITR|NCR|DEFECT|PUNCH|PROGRESS|EQUIP|CHECKLIST/.test(text))return '05_CONSTRUCTION';
    if(/PROCURE|MATERIAL|PURCHASE|\bPO\b|REQUISITION|\bMR\b|\bMTR\b|\bLOM\b|DELIVERY|RECEIVING/.test(text))return '04_PROCUREMENT';
    if(/DESIGN|DRAW|ENGINEERING|RFI|RFA|SUBMITTAL|CALC|SPEC|DATASHEET/.test(text))return '03_DESIGN';
    if(/PLAN|SCHEDULE|CASH|RISK|ISSUE|REGISTER|MOM|MEETING|AGENDA|MANPOWER/.test(text))return '02_PLANNING';
    if(/START|INIT|KICKOFF|CONTRACT|SCOPE/.test(text))return '01_INITIATION';
    return '02_PLANNING';
  }
  function asRow(code,name,phase,source){return {TemplateCode:code,TemplateName:name,PhaseKey:phase,Source:source||'master',Active:'TRUE'};}
  function collectRows(){
    var out=[], seen={};
    function add(code,name,phase,source,raw){
      code=norm(code); name=norm(name||code); if(!code||seen[code])return;
      var active=raw?String(raw.Active==null?raw.IsActive==null?'TRUE':raw.IsActive:raw.Active).toUpperCase():'TRUE';
      if(active==='FALSE'||active==='NO'||active==='0')return;
      seen[code]=true; out.push(asRow(code,name,phase||inferPhase(raw||{TemplateCode:code,TemplateName:name}),source));
    }
    var state=window.APP_STATE&&window.APP_STATE.tables?window.APP_STATE.tables:{};
    (state.FORM_TEMPLATES||[]).forEach(function(r){add(r.TemplateCode||r.DocumentCode||r.Code,r.TemplateName||r.DocumentTitle||r.Name,inferPhase(r),'sheet',r);});
    (state.MODULE_DOCUMENT_RULES||[]).forEach(function(r){add(r.TemplateCode||r.DocumentCode||r.RuleCode,r.TemplateName||r.DocumentTitle||r.Name,inferPhase(r),'rules',r);});
    MASTER.forEach(function(m){add(m[0],m[1],m[2],'master',null);});
    out.sort(function(a,b){if(a.PhaseKey!==b.PhaseKey)return a.PhaseKey.localeCompare(b.PhaseKey);return a.TemplateCode.localeCompare(b.TemplateCode);});
    return out;
  }
  function optionHtml(rows,selected){
    var groups={}; rows.forEach(function(r){(groups[r.PhaseKey]||(groups[r.PhaseKey]=[])).push(r);});
    var html='';
    PHASES.slice(1).forEach(function(p){
      var arr=groups[p[0]]||[]; if(!arr.length)return;
      html+='<optgroup label="'+esc(p[1])+'">';
      arr.forEach(function(r){html+='<option class="a4-doc-restore-master" value="'+esc(r.TemplateCode)+'" '+(r.TemplateCode===selected?'selected':'')+'>'+esc(r.TemplateCode+' — '+r.TemplateName)+'</option>';});
      html+='</optgroup>';
    });
    return html;
  }
  function restoreList(){
    var prod=byId('prodDocType'), hidden=byId('fTemplate'); if(!prod&&!hidden)return;
    var rows=collectRows(); if(!rows.length)return;
    var current=(hidden&&hidden.value)||(prod&&prod.value)||'PJ-WCR-001';
    if(!rows.some(function(r){return r.TemplateCode===current;})) current='PJ-WCR-001';
    var html=optionHtml(rows,current);
    if(prod && prod.getAttribute('data-a4-doc-list-all-count')!==String(rows.length) || (prod&&prod.innerHTML.indexOf('PJ-MTR-001')<0)){
      if(prod){prod.innerHTML=html;prod.value=current;prod.setAttribute('data-a4-doc-list-all-count',String(rows.length));}
    }
    if(hidden){hidden.innerHTML=html;hidden.value=current;hidden.setAttribute('data-a4-doc-list-all-count',String(rows.length));}
    window.AETERLINK_ALL_DOCUMENT_ROWS=rows;
  }
  function fetchTables(){
    if(typeof google==='undefined'||!google.script||!google.script.run)return;
    window.APP_STATE=window.APP_STATE||{};APP_STATE.tables=APP_STATE.tables||{};
    if(!APP_STATE.tables.FORM_TEMPLATES||!APP_STATE.tables.FORM_TEMPLATES.length){
      google.script.run.withSuccessHandler(function(r){APP_STATE.tables.FORM_TEMPLATES=(r&&r.rows)||[];restoreList();}).withFailureHandler(function(){restoreList();}).apiModularTable('FORM_TEMPLATES');
    }
    if(!APP_STATE.tables.MODULE_DOCUMENT_RULES||!APP_STATE.tables.MODULE_DOCUMENT_RULES.length){
      google.script.run.withSuccessHandler(function(r){APP_STATE.tables.MODULE_DOCUMENT_RULES=(r&&r.rows)||[];restoreList();}).withFailureHandler(function(){restoreList();}).apiModularTable('MODULE_DOCUMENT_RULES');
    }
  }
  function patchChange(){
    var prod=byId('prodDocType'), hidden=byId('fTemplate');
    if(prod&&!prod.__a4DocAllBound){prod.__a4DocAllBound=true;prod.addEventListener('focus',restoreList,true);prod.addEventListener('mousedown',restoreList,true);prod.addEventListener('change',function(){if(hidden)hidden.value=prod.value;},true);}
  }
  function boot(){restoreList();patchChange();fetchTables();setTimeout(restoreList,300);setTimeout(restoreList,1200);setTimeout(restoreList,3000);}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,500);setTimeout(boot,1800);});
  window.addEventListener('load',function(){setTimeout(boot,500);setTimeout(boot,2000);});
  document.addEventListener('click',function(e){if(e.target&&e.target.matches&&e.target.matches('#prodLifecycleTabs button'))setTimeout(restoreList,80);},true);
  var obs=null;
  function observe(){var p=byId('prodDocType');if(!p||obs)return;obs=new MutationObserver(function(){setTimeout(restoreList,60);});obs.observe(p,{childList:true,subtree:true});}
  setTimeout(function(){boot();observe();},800);setTimeout(function(){boot();observe();},2500);
  window.AETERLINK_DOC_LIST_ALL_RESTORE={run:restoreList,fetchTables:fetchTables,master:MASTER};
})();
</script>
