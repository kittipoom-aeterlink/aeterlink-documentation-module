<!-- AETERLINK Documentation Module — A4_Layout.html -->
<style>
  .a4-root{background:#7a7a7a;padding:16px}.a4-page{position:relative;width:210mm;height:297mm;min-height:297mm;max-height:297mm;box-sizing:border-box;background:#fff;overflow:hidden;page-break-after:always;break-after:page;margin:0 auto 12px;color:#09243f}.a4-page-inner{height:100%;padding:10.5mm 10.5mm 11mm;display:flex;flex-direction:column}.a4-header{display:grid;grid-template-columns:48mm 1fr 41mm;align-items:stretch;border:1.2px solid #333;min-height:29mm;margin-bottom:5mm}.a4-logo-cell,.a4-title-cell,.a4-meta-cell{display:flex;align-items:center;justify-content:center;padding:3mm;border-right:1.2px solid #333}.a4-meta-cell{border-right:0;justify-content:flex-start}.a4-logo-text{color:#1b9bd7;font-weight:900;letter-spacing:2px;font-size:11pt;white-space:nowrap}.a4-title{font-size:16pt;font-weight:900;text-align:center;color:#06345d;letter-spacing:.5px;line-height:1.05;white-space:nowrap}.a4-subtitle{font-size:5.6pt;color:#2e5d7d;text-align:center;margin-top:1.2mm;font-weight:700}.a4-meta{font-size:6.5pt;color:#111;line-height:1.45;font-weight:800;width:100%}.a4-meta b{display:inline-block;min-width:13mm}.a4-project-grid{width:100%;border-collapse:collapse;margin-bottom:4mm;font-size:7.2pt;table-layout:fixed}.a4-project-grid th{background:#fff;color:#06345d;font-weight:900;text-transform:uppercase;font-size:5.5pt;letter-spacing:.35px;text-align:left;padding:1.35mm 1.7mm .6mm;border:1px solid #333}.a4-project-grid td{font-size:7.1pt;font-weight:900;color:#09243f;padding:.7mm 1.7mm 1.5mm;border:1px solid #333;vertical-align:top}.a4-content{flex:1 1 auto;min-height:0;overflow:hidden}.a4-footer{flex:0 0 auto;padding-top:1.5mm;font-size:5.9pt;color:#555;display:flex;justify-content:space-between;gap:4mm}.a4-section-title{margin:0 0 2mm;padding:1.6mm 2.2mm;background:#113e63;color:#fff;border:1px solid #113e63;font-size:8.2pt;font-weight:900;letter-spacing:.7px;text-transform:uppercase;line-height:1}.a4-page table{width:100%;max-width:100%;table-layout:fixed;border-collapse:collapse;font-size:7pt}.a4-page th,.a4-page td{box-sizing:border-box;border:1px solid #777;white-space:normal;overflow-wrap:break-word;word-break:normal;vertical-align:middle;line-height:1.18;padding:1.08mm 1mm}.a4-page thead th{background:#f1f1f1;color:#061f38;font-size:6.3pt;font-weight:900;text-align:center;line-height:1.1}.a4-info-table th{background:#f0f0f0;color:#061f38;font-size:5.8pt;text-transform:uppercase;letter-spacing:.25px;text-align:left;width:31%}.a4-info-table td{font-size:6.8pt;font-weight:900;min-height:6mm}.a4-scope-table td{font-size:6.65pt;font-weight:800;text-align:center}.a4-scope-table td:nth-child(3){text-align:center;font-weight:900}.a4-scope-table td:nth-child(7){text-align:left;font-weight:700}.a4-page tr{break-inside:avoid;page-break-inside:avoid}.a4-photo-grid{display:grid;grid-template-columns:1fr;gap:7mm;height:228mm}.a4-photo-block{border:1px solid #777;min-height:104mm;display:grid;grid-template-rows:1fr auto;background:#fff}.a4-photo-box{display:flex;align-items:center;justify-content:center;background:#f7fbfd;color:#6b7f90;font-size:9pt;overflow:hidden}.a4-photo-box img{width:100%;height:100%;object-fit:contain;display:block}.a4-photo-caption{border-top:1px solid #777;padding:2mm;font-size:7pt;color:#111;min-height:9mm}.a4-page-break{page-break-after:always;break-after:page}.a4-no-print,.a4-action-column,.row-actions,.photo-actions{display:initial}.a4-print-only{display:none}@media print{@page{size:A4 portrait;margin:0}html,body{width:210mm!important;margin:0!important;padding:0!important;background:#fff!important}body *{visibility:hidden}.a4-print-area,.a4-print-area *{visibility:visible}.a4-print-area{position:absolute;left:0;top:0;width:210mm!important;background:#fff!important;padding:0!important}.a4-root{background:#fff!important;padding:0!important}.a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;overflow:hidden!important;margin:0!important;box-shadow:none!important;border:0!important}.a4-no-print,.a4-action-column,.row-actions,.photo-actions,th.a4-action-column,td.a4-action-column{display:none!important}.a4-print-only{display:initial!important}}
</style>
<script>
  window.AETERLINK_A4_RENDERER={
    escapeHtml:function(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});},
    section:function(title){return '<div class="a4-section-title">'+this.escapeHtml(title)+'</div>';},
    header:function(config){config=config||{};var subtitle=config.subtitle||'';return '<header class="a4-header"><div class="a4-logo-cell"><div class="a4-logo-text">AETERLINK</div></div><div class="a4-title-cell"><div><div class="a4-title">'+this.escapeHtml(config.title||'')+'</div>'+(subtitle?'<div class="a4-subtitle">'+this.escapeHtml(subtitle)+'</div>':'')+'</div></div><div class="a4-meta-cell"><div class="a4-meta"><b>Doc No.:</b> '+this.escapeHtml(config.documentNo||'Not issued')+'<br><b>Rev.:</b> '+this.escapeHtml(config.revisionNo||'0')+'<br><b>Date:</b> '+this.escapeHtml(config.date||new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}))+'</div></div></header>';},
    projectGrid:function(data){data=data||{};return '<table class="a4-project-grid"><tbody><tr><th>Project Code</th><th>Project Name / Site</th><th>Client</th><th>Main-Contractor</th></tr><tr><td>'+this.escapeHtml(data.ProjectCode||'')+'</td><td>'+this.escapeHtml(data.ProjectName||'')+'</td><td>'+this.escapeHtml(data.Client||'')+'</td><td>'+this.escapeHtml(data.MainContractor||'')+'</td></tr></tbody></table>';},
    page:function(config){config=config||{};return '<div class="a4-page"><div class="a4-page-inner">'+this.header(config)+(config.showProjectGrid===false?'':this.projectGrid(config.data||{}))+'<div class="a4-content">'+(config.content||'')+'</div><footer class="a4-footer"><span>AETERLINK Documentation Control</span><span>'+this.escapeHtml(config.footerRight||'A4 controlled layout')+'</span></footer></div></div>';},
    documentInfo:function(data,rows){data=data||{};rows=rows||[['Contract No.',data.ContractNo||'-'],['Purchase Order No.',data.PurchaseOrderNo||'-'],['Work Type',data.WorkType||'Equipment Purchasing / Installation / Implementation / BMS'],['Completion Date',data.CompletionDate||''],['Reference Documents',data.ReferenceDocuments||''],['Remarks / Additional Notes',data.Remarks||'']];return this.section('DOCUMENT INFORMATION')+'<table class="a4-info-table"><tbody>'+rows.map(function(row){return '<tr><th>'+window.AETERLINK_A4_RENDERER.escapeHtml(row[0])+'</th><td>'+window.AETERLINK_A4_RENDERER.escapeHtml(row[1])+'</td></tr>';}).join('')+'</tbody></table>';},
    table:function(columns,rows,className){columns=columns||[];rows=rows||[];return '<table class="'+this.escapeHtml(className||'')+'"><thead><tr>'+columns.map(function(col){return '<th style="width:'+window.AETERLINK_A4_RENDERER.escapeHtml(col.width||'auto')+';">'+window.AETERLINK_A4_RENDERER.escapeHtml(col.label||col.key||'')+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+columns.map(function(col){return '<td>'+window.AETERLINK_A4_RENDERER.escapeHtml(row[col.key]||'')+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';},
    photoGrid:function(photos){photos=photos||[];while(photos.length<2)photos.push({PhotoUrl:'',Caption:''});return '<div class="a4-photo-grid">'+photos.slice(0,2).map(function(photo,i){var url=photo.PhotoUrl||'';return '<div class="a4-photo-block"><div class="a4-photo-box">'+(url?'<img src="'+window.AETERLINK_A4_RENDERER.escapeHtml(url)+'">':'Photo '+(i+1))+'</div><div class="a4-photo-caption">'+window.AETERLINK_A4_RENDERER.escapeHtml(photo.Caption||'')+'</div></div>';}).join('')+'</div>';},
    printA4:function(){window.print();}
  };
</script>
