<!-- AETERLINK Documentation Module — A4_Layout.html -->
<style>
  .a4-root{background:#7a7a7a;padding:16px}.a4-page,.a4-page *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}.a4-page{position:relative;width:210mm;height:297mm;min-height:297mm;max-height:297mm;box-sizing:border-box;background:#fff;overflow:hidden;page-break-after:always;break-after:page;margin:0 auto 12px;color:#09243f}.a4-page-inner{height:100%;padding:10.5mm 10.5mm 11mm;display:flex;flex-direction:column}.a4-header{display:grid;grid-template-columns:48mm 100mm 41mm;align-items:stretch;border:1.2px solid #333;min-height:29mm;margin-bottom:5mm}.a4-logo-cell,.a4-title-cell,.a4-meta-cell{display:flex;align-items:center;justify-content:center;padding:2mm;border-right:1.2px solid #333;min-width:0;overflow:hidden}.a4-meta-cell{border-right:0;justify-content:flex-start}.a4-logo-img{width:35mm;max-width:35mm;height:auto;max-height:12mm;display:block;object-fit:contain}.a4-title{font-size:17pt;font-weight:900;text-align:center;color:#06345d;letter-spacing:.5px;line-height:1.05;white-space:normal;overflow-wrap:anywhere}.a4-subtitle{font-size:6.1pt;color:#2e5d7d;text-align:center;margin-top:1.2mm;font-weight:700;white-space:normal;overflow-wrap:anywhere}.a4-meta{font-size:7.2pt;color:#111;line-height:1.28;font-weight:900;width:100%;white-space:normal;overflow-wrap:anywhere}.a4-meta-row{display:grid;grid-template-columns:17mm 1fr;column-gap:1mm;align-items:start}.a4-meta-row b{font-weight:900;white-space:nowrap}.a4-meta-row span{font-weight:900;white-space:normal;overflow-wrap:anywhere}.a4-project-grid{width:100%;border-collapse:collapse;margin-bottom:4mm;font-size:7.6pt;table-layout:fixed}.a4-project-grid col.c-logo{width:48mm}.a4-project-grid col.c-name{width:65mm}.a4-project-grid col.c-client{width:35mm}.a4-project-grid col.c-doc{width:41mm}.a4-project-grid th{background:#fff;color:#06345d;font-weight:900;text-transform:uppercase;font-size:5.8pt;letter-spacing:.35px;text-align:left;padding:1.35mm 1.7mm .6mm;border:1px solid #333;white-space:normal;overflow-wrap:anywhere}.a4-project-grid td{font-size:7.8pt;font-weight:900;color:#09243f;padding:.8mm 1.7mm 1.55mm;border:1px solid #333;vertical-align:top;white-space:normal;overflow-wrap:anywhere}.a4-content{flex:1 1 auto;min-height:0;overflow:hidden}.a4-footer{flex:0 0 auto;padding-top:1.5mm;font-size:6.3pt;color:#555;display:flex;justify-content:space-between;gap:4mm}.a4-section-title{margin:0 0 2mm;padding:1.8mm 2.2mm;background:#113e63;color:#fff;border:1px solid #113e63;font-size:9pt;font-weight:900;letter-spacing:.8px;text-transform:uppercase;line-height:1;white-space:normal;overflow-wrap:anywhere}.a4-page table{width:100%;max-width:100%;table-layout:fixed;border-collapse:collapse;font-size:7.4pt}.a4-page th,.a4-page td{box-sizing:border-box;border:1px solid #777;white-space:normal;overflow-wrap:anywhere;word-break:break-word;vertical-align:middle;line-height:1.2;padding:1.12mm 1mm}.a4-page thead th{background:#f1f1f1;color:#061f38;font-size:6.8pt;font-weight:900;text-align:center;line-height:1.12}.a4-info-table{table-layout:fixed}.a4-info-table col.c-info-label{width:48mm}.a4-info-table col.c-info-value{width:auto}.a4-info-table th{background:#f0f0f0;color:#061f38;font-size:6.2pt;text-transform:uppercase;letter-spacing:.25px;text-align:left}.a4-info-table td{font-size:7.4pt;font-weight:900;min-height:6mm}.a4-scope-table td{font-size:7pt;font-weight:800;text-align:center}.a4-scope-table td:nth-child(3){text-align:center;font-weight:900}.a4-scope-table td:nth-child(7){text-align:left;font-weight:700}.a4-page tr{break-inside:avoid;page-break-inside:avoid}.a4-photo-grid{display:grid;grid-template-columns:1fr;gap:5mm;height:auto}.a4-photo-block{border:1px solid #777;height:91mm;display:grid;grid-template-columns:55% 45%;background:#fff;overflow:hidden}.a4-photo-box{display:flex;align-items:center;justify-content:center;background:#f7fbfd;color:#6b7f90;font-size:10pt;overflow:hidden;border-right:1px solid #777}.a4-photo-box img{width:100%;height:100%;object-fit:contain;display:block}.a4-photo-info{padding:3mm;display:flex;flex-direction:column;gap:3mm;font-size:7.6pt}.a4-photo-field-label{font-size:6.5pt;color:#06345d;text-transform:uppercase;font-weight:900;letter-spacing:.25px}.a4-photo-field-box{border:1px solid #aaa;padding:1.7mm;font-size:8.6pt;font-weight:900;min-height:7.5mm;white-space:normal;overflow-wrap:anywhere}.a4-photo-text{font-size:8pt;line-height:1.32;min-height:19mm;white-space:normal;overflow-wrap:anywhere}.a4-photo-line{border-top:1px solid #777;margin-top:auto;padding-top:2mm}.a4-editable[contenteditable="true"]{outline:1px dashed transparent;cursor:text}.a4-editable[contenteditable="true"]:hover{outline-color:#93bdd3;background:rgba(230,245,251,.45)}.a4-editable[contenteditable="true"]:focus{outline:1.4px solid #1b9bd7;background:#fff}.a4-page-break{page-break-after:always;break-after:page}.a4-no-print,.a4-action-column,.row-actions,.photo-actions{display:initial}.a4-print-only{display:none}@media print{@page{size:A4 portrait;margin:0}html,body{width:210mm!important;margin:0!important;padding:0!important;background:#fff!important}body *{visibility:hidden}.a4-print-area,.a4-print-area *{visibility:visible}.a4-print-area{position:absolute;left:0;top:0;width:210mm!important;background:#fff!important;padding:0!important;margin:0!important}.a4-root{background:#fff!important;padding:0!important;margin:0!important}.a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;overflow:hidden!important;margin:0!important;box-shadow:none!important;border:0!important}.a4-editable[contenteditable="true"]{outline:none!important;background:transparent!important}.a4-no-print,.a4-action-column,.row-actions,.photo-actions,th.a4-action-column,td.a4-action-column{display:none!important}.a4-print-only{display:initial!important}}
</style>
<script>
  window.AETERLINK_A4_RENDERER={
    logoSvg:function(){return '<svg class="a4-logo-img" viewBox="0 0 1200 165" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="AETERLINK Logo"><g fill="#0b86c6"><path d="M25 135c52-32 78-68 88-134h42c-3 42-26 66-70 86-21 10-34 25-45 54-9 20-34 18-15-6z"/><circle cx="190" cy="123" r="38"/><text x="285" y="122" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="112" letter-spacing="18">AETERLINK</text></g></svg>';},
    escapeHtml:function(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});},
    editable:function(value){return '<span class="a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(value||'')+'</span>';},
    editableDiv:function(value,extraClass){return '<div class="a4-editable '+(extraClass||'')+'" contenteditable="true" spellcheck="false">'+this.escapeHtml(value||'')+'</div>';},
    section:function(title){return '<div class="a4-section-title a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(title)+'</div>';},
    header:function(config){config=config||{};var subtitle=config.subtitle||'';return '<header class="a4-header"><div class="a4-logo-cell">'+this.logoSvg()+'</div><div class="a4-title-cell"><div><div class="a4-title a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(config.title||'')+'</div>'+(subtitle?'<div class="a4-subtitle a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(subtitle)+'</div>':'')+'</div></div><div class="a4-meta-cell"><div class="a4-meta"><div class="a4-meta-row"><b>Doc No.:</b>'+this.editable(config.documentNo||'Not issued')+'</div><div class="a4-meta-row"><b>Rev.:</b>'+this.editable(config.revisionNo||'0')+'</div><div class="a4-meta-row"><b>Date:</b>'+this.editable(config.date||new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}))+'</div></div></div></header>';},
    projectGrid:function(data){data=data||{};return '<table class="a4-project-grid"><colgroup><col class="c-logo"><col class="c-name"><col class="c-client"><col class="c-doc"></colgroup><tbody><tr><th>Project Code</th><th>Project Name / Site</th><th>Client</th><th>Main-Contractor</th></tr><tr><td class="a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(data.ProjectCode||'')+'</td><td class="a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(data.ProjectName||'')+'</td><td class="a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(data.Client||'')+'</td><td class="a4-editable" contenteditable="true" spellcheck="false">'+this.escapeHtml(data.MainContractor||'')+'</td></tr></tbody></table>';},
    page:function(config){config=config||{};return '<div class="a4-page"><div class="a4-page-inner">'+this.header(config)+(config.showProjectGrid===false?'':this.projectGrid(config.data||{}))+'<div class="a4-content">'+(config.content||'')+'</div><footer class="a4-footer"><span>AETERLINK Documentation Control</span><span>'+this.escapeHtml(config.footerRight||'A4 controlled layout')+'</span></footer></div></div>';},
    documentInfo:function(data,rows){data=data||{};rows=rows||[['Contract No.',data.ContractNo||'-'],['Purchase Order No.',data.PurchaseOrderNo||'-'],['Work Type',data.WorkType||'Equipment Purchasing / Installation / Implementation / BMS'],['Completion Date',data.CompletionDate||''],['Reference Documents',data.ReferenceDocuments||''],['Remarks / Additional Notes',data.Remarks||'']];return this.section('DOCUMENT INFORMATION')+'<table class="a4-info-table"><colgroup><col class="c-info-label"><col class="c-info-value"></colgroup><tbody>'+rows.map(function(row){return '<tr><th>'+window.AETERLINK_A4_RENDERER.escapeHtml(row[0])+'</th><td class="a4-editable" contenteditable="true" spellcheck="false">'+window.AETERLINK_A4_RENDERER.escapeHtml(row[1])+'</td></tr>';}).join('')+'</tbody></table>';},
    table:function(columns,rows,className){columns=columns||[];rows=rows||[];return '<table class="'+this.escapeHtml(className||'')+'"><thead><tr>'+columns.map(function(col){return '<th style="width:'+window.AETERLINK_A4_RENDERER.escapeHtml(col.width||'auto')+';">'+window.AETERLINK_A4_RENDERER.escapeHtml(col.label||col.key||'')+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+columns.map(function(col){return '<td class="a4-editable" contenteditable="true" spellcheck="false">'+window.AETERLINK_A4_RENDERER.escapeHtml(row[col.key]||'')+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';},
    photoGrid:function(photos){photos=photos||[];while(photos.length<2)photos.push({PhotoUrl:'',Caption:'',ItemNo:'',Description:'',Note:''});return '<div class="a4-photo-grid">'+photos.slice(0,2).map(function(photo,i){var url=photo.PhotoUrl||'';var item=photo.ItemNo||photo.Item||'';var desc=photo.Description||photo.Caption||'';var note=photo.Note||'';return '<div class="a4-photo-block"><div class="a4-photo-box">'+(url?'<img src="'+window.AETERLINK_A4_RENDERER.escapeHtml(url)+'">':'Photo '+(i+1))+'</div><div class="a4-photo-info"><div><div class="a4-photo-field-label">Item No.</div><div class="a4-photo-field-box a4-editable" contenteditable="true" spellcheck="false">'+window.AETERLINK_A4_RENDERER.escapeHtml(item)+'</div></div><div><div class="a4-photo-field-label">Description</div><div class="a4-photo-text a4-editable" contenteditable="true" spellcheck="false">'+window.AETERLINK_A4_RENDERER.escapeHtml(desc)+'</div></div><div class="a4-photo-line"><div class="a4-photo-field-label">Note</div><div class="a4-photo-text a4-editable" contenteditable="true" spellcheck="false">'+window.AETERLINK_A4_RENDERER.escapeHtml(note)+'</div></div></div></div>';}).join('')+'</div>';},
    printA4:function(){window.print();}
  };
</script>
