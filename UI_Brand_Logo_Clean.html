  function logoImgHtml(){
    return '<img class="official-aeterlink-logo" src="data:image/png;base64,' + LOGO_B64 + '" alt="AETERLINK" loading="eager" decoding="sync">';
  }
  function cleanBrand(){
    var logo=document.querySelector('.mod-logo');
    if(logo){
      if(!logo.querySelector('img.official-aeterlink-logo')) logo.innerHTML=logoImgHtml();
      logo.removeAttribute('title');
      logo.setAttribute('aria-label','AETERLINK logo');
    }
    var h=document.querySelector('.mod-brand h1');
    if(h){h.innerHTML='Aeterlink <span class="jp-company">(Thailand)</span><br><span style="font-size:12px;color:#6b7f8f;font-weight:700;">Documentation Control</span>';}

    if(side){side.textContent='';side.style.display='none';}
    var badge=document.getElementById('versionBadge');
    if(badge){badge.textContent='';badge.style.display='none';}
  }
  document.addEventListener('DOMContentLoaded',function(){setTimeout(cleanBrand,20);setTimeout(cleanBrand,250);setTimeout(cleanBrand,800);setTimeout(cleanBrand,1800);});
  var timer=setInterval(cleanBrand,750);
  setTimeout(function(){clearInterval(timer);cleanBrand();},15000);
  window.AETERLINK_CLEAN_BRAND=cleanBrand;
})();
</script>
