<!-- AETERLINK Documentation Module — UI_Brand_Logo_Clean.html -->
<style id="aeterlink-brand-logo-clean-style">
  /* Final brand override: large official logo and no build/version text in UI. */
  .mod-sidebar{
    width:264px!important;
  }

  .mod-brand{
    display:flex!important;
    flex-direction:column!important;
    align-items:flex-start!important;
    gap:8px!important;
    padding:12px 8px 18px!important;
    margin-bottom:14px!important;
  }

  .mod-logo{
    width:214px!important;
    height:62px!important;
    flex:0 0 62px!important;
    border-radius:0!important;
    background:transparent!important;
    box-shadow:none!important;
    display:flex!important;
    align-items:center!important;
    justify-content:flex-start!important;
    overflow:visible!important;
  }

  .mod-logo svg{
    width:214px!important;
    height:auto!important;
    max-width:214px!important;
    max-height:62px!important;
    display:block!important;
  }

  .mod-brand h1{
    font-size:15px!important;
    line-height:1.18!important;
    margin:2px 0 0!important;
  }

  .mod-brand .jp-company{
    display:inline!important;
    font-size:13px!important;
    margin-left:0!important;
    color:#5f7585!important;
  }

  #sideVersion,
  #versionBadge{
    display:none!important;
    visibility:hidden!important;
    height:0!important;
    min-height:0!important;
    max-height:0!important;
    margin:0!important;
    padding:0!important;
    overflow:hidden!important;
  }
</style>
<script id="aeterlink-brand-logo-clean-script">
(function(){
  function logoSvg(){
    return '<svg viewBox="0 0 1200 165" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" aria-label="AETERLINK Logo"><g fill="#0b86c6"><path d="M25 135c52-32 78-68 88-134h42c-3 42-26 66-70 86-21 10-34 25-45 54-9 20-34 18-15-6z"/><circle cx="190" cy="123" r="38"/><text x="285" y="122" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="112" letter-spacing="18">AETERLINK</text></g></svg>';
  }
  function cleanBrand(){
    var logo=document.querySelector('.mod-logo');
    if(logo){
      logo.innerHTML=logoSvg();
      logo.removeAttribute('title');
    }
    var h=document.querySelector('.mod-brand h1');
    if(h){
      h.innerHTML='Aeterlink <span class="jp-company">(Thailand)</span><br><span style="font-size:12px;color:#6b7f8f;font-weight:700;">Documentation Control</span>';
    }
    var side=document.getElementById('sideVersion');
    if(side){ side.textContent=''; side.style.display='none'; }
    var badge=document.getElementById('versionBadge');
    if(badge){ badge.textContent=''; badge.style.display='none'; }
  }
  document.addEventListener('DOMContentLoaded',function(){setTimeout(cleanBrand,50);setTimeout(cleanBrand,500);setTimeout(cleanBrand,1500);});
  var timer=setInterval(cleanBrand,1000);
  setTimeout(function(){clearInterval(timer);cleanBrand();},12000);
  window.AETERLINK_CLEAN_BRAND=cleanBrand;
})();
</script>
