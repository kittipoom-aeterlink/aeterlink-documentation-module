<script id="a4-eqc-add-row-stable-final-script">
(function(){
  if(window.__AETERLINK_A4_EQC_ADD_ROW_STABLE_FINAL_V1__) return;
  window.__AETERLINK_A4_EQC_ADD_ROW_STABLE_FINAL_V1__=true;
  var KEEP_CODE='PJ-EQC-001';
  var observer=null,timer=null;
  var EQ_WIDTHS=['4%','15%','8%','15%','7%','9%','5%','11%','11%','11%','4%'];
  var columns=[
    {key:'No',label:'No.',width:EQ_WIDTHS[0]},
    {key:'ItemDescription',label:'Item description',width:EQ_WIDTHS[1]},
    {key:'Brand',label:'brand',width:EQ_WIDTHS[2]},
    {key:'Model',label:'Model',width:EQ_WIDTHS[3]},
    {key:'InstalledQuantity',label:'Installed Quantity',width:EQ_WIDTHS[4]},
    {key:'Localisation',label:'Localisation',width:EQ_WIDTHS[5]},
    {key:'Floor',label:'Floor',width:EQ_WIDTHS[6]},
    {key:'InstallationPosition',label:'Installation Position\n(matches as-built drawings?)',width:EQ_WIDTHS[7]},
    {key:'InstallationCondition',label:'Installation Condition\n(no risk of falling or detachment?)',width:EQ_WIDTHS[8]},
    {key:'ConfirmationPower',label:'Confirmation of power-on\n(operate after power-on?)',width:EQ_WIDTHS[9]},
    {key:'Remarks',label:'Remarks',width:EQ_WIDTHS[10]}
  ];
  function byId(id){return document.getElementById(id);}
  function root(){return byId('a4Preview')||byId('a4CheckOutput')||document;}
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function code(){return String((byId('fTemplate')&&byId('fTemplate').value)||(byId('prodDocType')&&byId('prodDocType').value)||'');}
  function isEq(){return /EQC|EQCH|EQUIP/i.test(code());}
  function setEqCode(){var f=byId('fTemplate'),p=byId('prodDocType');if(f&&/EQC|EQCH|EQUIP/i.test(f.value))f.value=KEEP_CODE;if(p&&/EQC|EQCH|EQUIP/i.test(p.value))p.value=KEEP_CODE;}
  function mapRow(r,i){r=r||{};return {No:r.No||r.Item||String(i+1),ItemDescription:r.ItemDescription||r['Item description']||r.ItemDescriptionText||r.Description||r.WorkDescription||r.EquipmentTag||'',Brand:r.Brand||r.brand||'',Model:r.Model||r.ProductName||r['Product name']||r.Product||'',InstalledQuantity:r.InstalledQuantity||r['Installed Quantity']||r.InstalledQty||r.Qty||r.Quantity||'',Localisation:r.Localisation||r.Localization||r.Location||'',Floor:r.Floor||'',InstallationPosition:r.InstallationPosition||r['Installation Position']||r.Position||r.CheckItem||'',InstallationCondition:r.InstallationCondition||r['Installation Condition']||r.Condition||'',ConfirmationPower:r.ConfirmationPower||r['Confirmation of power-on']||r.PowerOn||r.PowerConfirmation||'',Remarks:r.Remarks||r.Remark||''};}
  function isEqRows(arr){return Array.isArray(arr)&&arr.length&&arr.some(function(r){return r&&(r.Brand||r.brand||r.Model||r.ProductName||r.ItemDescription||r['Item description']);})&&!arr.some(function(r){return r&&(r.Section&&r.RequiredInformation);});}
  function defaultRows(){if(window.AETERLINK_EQUIPMENT_CHECKLIST_RENDER_LOCK&&typeof window.AETERLINK_EQUIPMENT_CHECKLIST_RENDER_LOCK.defaultRows==='function'){try{return window.AETERLINK_EQUIPMENT_CHECKLIST_RENDER_LOCK.defaultRows().map(mapRow);}catch(e){}}return [];} 
  function rowsFromF(){try{var f=byId('fRows');var arr=f&&f.value?JSON.parse(f.value):[];return isEqRows(arr)?arr.map(mapRow):defaultRows();}catch(e){return defaultRows();}}
  function cellText(td){var item=td.querySelector('.a4-row-item-value');if(item)return String(item.textContent||'').replace(/^[\s×xX*•-]+/,'').trim();var c=td.cloneNode(true);c.querySelectorAll('button,.a4-no-print').forEach(function(n){n.remove();});return String(c.textContent||'').replace(/^[\s×xX*•-]+/,'').trim();}
  function rowsFromDom(){var out=[];root().querySelectorAll('table.a4-equipment-checklist-table tbody tr').forEach(function(tr){var c=tr.cells;if(!c||c.length<4)return;out.push(mapRow({No:cellText(c[0]),ItemDescription:cellText(c[1]),Brand:cellText(c[2]),Model:cellText(c[3]),InstalledQuantity:cellText(c[4]),Localisation:cellText(c[5]),Floor:cellText(c[6]),InstallationPosition:cellText(c[7]),InstallationCondition:cellText(c[8]),ConfirmationPower:cellText(c[9]),Remarks:cellText(c[10])},out.length));});return out.length?out:rowsFromF();}
  function saveRows(rows){var f=byId('fRows');if(f)f.value=JSON.stringify((rows||[]).map(mapRow),null,2);} 
  function collectData(){var d={};if(typeof window.collectFormData==='function'){try{d=window.collectFormData()||{};}catch(e){d={};}}d.ProjectCode=d.ProjectCode||(byId('fProjectCode')&&byId('fProjectCode').value)||'';d.ProjectName=d.ProjectName||(byId('fProjectName')&&byId('fProjectName').value)||'';d.Client=d.Client||(byId('fClient')&&byId('fClient').value)||'';d.MainContractor=d.MainContractor||(byId('fMainContractor')&&byId('fMainContractor').value)||'';d.DocumentNo=d.DocumentNo||(byId('fDocumentNo')&&byId('fDocumentNo').value)||'';d.RevisionNo=d.RevisionNo||(byId('fRevisionNo')&&byId('fRevisionNo').value)||'R00';d.Status=d.Status||(byId('fStatus')&&byId('fStatus').value)||'Draft';d.ReferenceDocuments=KEEP_CODE;d.WorkType='Controlled Project Document';return d;}
  function makeTable(rows){return window.AETERLINK_A4_RENDERER.table(columns,rows,'a4-scope-table a4-equipment-checklist-table').replace(/a4-row-control-bar[\s\S]*?<\/div>/g,'')+'<div class="a4-eqc-row-control-bar a4-no-print"><button type="button" class="a4-eqc-add-row-btn">+ Add Row</button></div>';}
  function render(rows){
    if(!window.AETERLINK_A4_RENDERER)return false;
    setEqCode();rows=(rows&&rows.length?rows:rowsFromF()).map(mapRow);saveRows(rows);
    var data=collectData();
    var first=24,next=30,chunks=[],idx=0;chunks.push(rows.slice(0,first));idx=first;while(idx<rows.length){chunks.push(rows.slice(idx,idx+next));idx+=next;}if(!chunks.length)chunks=[[]];
    var html='<div class="a4-root a4-print-area" id="a4PrintArea">';
    chunks.forEach(function(chunk,i){var content='';if(i===0){content=window.AETERLINK_A4_RENDERER.documentInfo(data,[['Document Purpose','Capture the required information, references, responsibilities, status and records for this document type.'],['Document Type / Code',KEEP_CODE+' — Equipment Checklist'],['Work Type / Phase','Controlled Project Document'],['Reference Documents',KEEP_CODE],['Prepared By',data.PreparedBy||''],['Approval Status',data.Status||'Draft']])+window.AETERLINK_A4_RENDERER.section('EQUIPMENT CHECKLIST')+makeTable(chunk);}else{content=window.AETERLINK_A4_RENDERER.section('EQUIPMENT CHECKLIST — CONTINUED')+makeTable(chunk);}html+=window.AETERLINK_A4_RENDERER.page({title:'EQUIPMENT CHECKLIST',subtitle:'Installation / Inspection / Verification',documentNo:data.DocumentNo||'',revisionNo:data.RevisionNo||'R00',status:data.Status||'Draft',data:data,content:content});});html+='</div>';
    var target=byId('a4Preview');if(target)target.innerHTML=html;
    setTimeout(function(){decorate();},30);setTimeout(function(){decorate();},180);return false;
  }
  function applyWidths(base){base=base||root();base.querySelectorAll('table.a4-equipment-checklist-table').forEach(function(t){t.style.width='calc(100% - 5mm)';t.style.maxWidth='calc(100% - 5mm)';t.style.marginLeft='5mm';t.style.tableLayout='fixed';var cg=t.querySelector('colgroup');if(!cg){cg=document.createElement('colgroup');t.insertBefore(cg,t.firstChild);}cg.innerHTML='';EQ_WIDTHS.forEach(function(w){var c=document.createElement('col');c.style.width=w;cg.appendChild(c);});t.querySelectorAll('tr').forEach(function(tr){Array.prototype.slice.call(tr.children).forEach(function(cell,i){if(EQ_WIDTHS[i]){cell.style.width=EQ_WIDTHS[i];cell.style.minWidth=EQ_WIDTHS[i];cell.style.maxWidth=EQ_WIDTHS[i];}});});});}
  function makeEditable(base){base=base||root();base.querySelectorAll('.a4-title,.a4-subtitle,.a4-section-title').forEach(function(n){n.setAttribute('contenteditable','true');n.setAttribute('spellcheck','false');});}
  function addDeleteButtons(base){base=base||root();base.querySelectorAll('table.a4-equipment-checklist-table tbody tr').forEach(function(tr){var td=tr.cells&&tr.cells[0];if(!td)return;td.style.position='relative';td.style.overflow='visible';td.querySelectorAll('.a4-row-paged-delete,.a4-draft-delete-row-btn,.a4-row-clean-delete,.a4-row-delete-btn').forEach(function(b){b.remove();});if(!td.querySelector('.a4-eqc-delete-row-btn')){var b=document.createElement('button');b.type='button';b.className='a4-eqc-delete-row-btn a4-no-print';b.textContent='×';b.title='Delete this row';td.insertBefore(b,td.firstChild);}});}
  function updateFooters(base){base=base||root();var pages=Array.prototype.slice.call(base.querySelectorAll('.a4-page'));var doc=(byId('fDocumentNo')&&byId('fDocumentNo').value)||'Not issued';pages.forEach(function(p,i){var f=p.querySelector('.a4-footer');if(f)f.innerHTML='<span class="a4-footer-center">Document No.: '+esc(doc)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(i+1)+' / '+pages.length+'</span>';});}
  function decorate(){applyWidths(root());makeEditable(root());addDeleteButtons(root());updateFooters(root());}
  function addRow(){var rows=rowsFromDom();rows.push(mapRow({No:String(rows.length+1)},rows.length));return render(rows);}
  function deleteRow(btn){var rows=rowsFromDom();var tr=btn&&btn.closest&&btn.closest('tr');var trs=Array.prototype.slice.call(root().querySelectorAll('table.a4-equipment-checklist-table tbody tr'));var index=trs.indexOf(tr);if(index>=0)rows.splice(index,1);rows=rows.map(function(r,i){r.No=String(i+1);return r;});return render(rows);}
  function patchPreview(){if(typeof window.previewCurrentForm==='function'&&!window.previewCurrentForm.__eqcStableFinal){var old=window.previewCurrentForm;window.previewCurrentForm=function(){if(isEq())return render(rowsFromF());var ret=old.apply(this,arguments);setTimeout(decorate,80);return ret;};window.previewCurrentForm.__eqcStableFinal=true;}if(typeof window.prodRefreshA4==='function'&&!window.prodRefreshA4.__eqcStableFinal){var oldR=window.prodRefreshA4;window.prodRefreshA4=function(){if(isEq())return render(rowsFromF());var ret=oldR.apply(this,arguments);setTimeout(decorate,80);return ret;};window.prodRefreshA4.__eqcStableFinal=true;}if(typeof window.loadSampleForTemplate==='function'&&!window.loadSampleForTemplate.__eqcStableFinal){var oldL=window.loadSampleForTemplate;window.loadSampleForTemplate=function(){if(isEq())return render(defaultRows());return oldL.apply(this,arguments);};window.loadSampleForTemplate.__eqcStableFinal=true;}}
  function schedule(){clearTimeout(timer);timer=setTimeout(decorate,80);}
  document.addEventListener('click',function(e){var add=e.target&&e.target.closest?e.target.closest('.a4-eqc-add-row-btn'):null;if(add){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();return addRow();}var del=e.target&&e.target.closest?e.target.closest('.a4-eqc-delete-row-btn'):null;if(del){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();return deleteRow(del);}},true);
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('table.a4-equipment-checklist-table')){saveRows(rowsFromDom());}},true);
  document.addEventListener('change',function(e){if(e.target&&e.target.matches&&e.target.matches('#prodDocType,#fTemplate'))setTimeout(function(){if(isEq())render(rowsFromF());else decorate();},120);},true);
  function boot(){patchPreview();if(isEq())render(rowsFromF());else decorate();var target=byId('a4Preview');if(target&&!observer&&window.MutationObserver){observer=new MutationObserver(function(muts){for(var i=0;i<muts.length;i++){if(muts[i].addedNodes&&muts[i].addedNodes.length){schedule();break;}}});observer.observe(target,{childList:true,subtree:true});}}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,900);setTimeout(boot,2600);setTimeout(boot,5600);});window.addEventListener('load',function(){setTimeout(boot,900);setTimeout(boot,2600);});setTimeout(boot,1400);setTimeout(boot,3600);setTimeout(boot,6500);
  window.AETERLINK_EQC_ADD_ROW_STABLE_FINAL={run:boot,render:render,addRow:addRow,deleteRow:deleteRow,rowsFromDom:rowsFromDom,rowsFromF:rowsFromF};
})();
</script>
