<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AETERLINK Documentation Control V24</title>
  <style>
    :root{
      --ink:#1e3446;--muted:#6b7f90;--line:#d9e6ee;--soft:#f3f8fb;--soft2:#eaf3f8;
      --primary:#244963;--primary2:#17395d;--accent:#d5b467;--danger:#d87d7d;--ok:#d9eadf;
      --paper:#f5f7f8;--card:#ffffff;--bg:#f6f9fb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Noto Sans Thai",sans-serif;background:linear-gradient(180deg,#f8fbfd,#eef5f8);color:var(--ink)}
    .app{display:grid;grid-template-columns:286px 1fr;min-height:100vh}
    aside{background:#fff;border-right:1px solid var(--line);padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{display:flex;align-items:center;gap:10px;margin:0 0 18px}
    .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#dbeef4,#fff);display:flex;align-items:center;justify-content:center;color:var(--primary2);font-weight:900;border:1px solid var(--line)}
    .brand h1{font-size:15px;margin:0;color:var(--primary2);line-height:1.18}
    .brand small{display:block;color:var(--muted);margin-top:4px;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nav button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;padding:11px 12px;border-radius:14px;color:#25465b;cursor:pointer;text-align:left;margin:3px 0;font-size:14px}
    .nav button:hover,.nav button.active{background:#eaf3f8;color:#17395d;font-weight:800}
    .nav .sep{height:1px;background:#edf3f6;margin:10px 4px}
    main{padding:16px;overflow:auto}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .title h2{margin:0;color:var(--primary2);font-size:21px}
    .title p{margin:4px 0 0;color:var(--muted);font-size:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,.btn{font-family:inherit;border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 11px;cursor:pointer;color:#243746}
    button:hover{filter:brightness(.98)}
    button.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
    button.gold{background:#d8b962;color:#243746;border-color:#d8b962;font-weight:700}
    button.danger{background:#fff5f5;color:#bd5757;border-color:#f0d4d4}
    button.soft{background:#f0f7fb;color:#244963}
    button.sm{padding:5px 9px;font-size:12px}
    input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 9px;background:#fff;font-family:inherit;color:var(--ink)}
    textarea{min-height:84px;resize:vertical}
    label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#596b78;font-weight:800;margin:10px 0 5px;display:block}
    .req{color:#d36f6f}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-bottom:14px}
    .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 10px 24px rgba(23,57,93,.04)}
    .kpi .label{color:var(--muted);font-size:12px}
    .kpi .value{font-size:25px;font-weight:900;color:var(--primary2);margin-top:5px}
    .hint{background:#f7fbfd;border:1px solid var(--line);border-radius:14px;padding:11px;color:#6b7f90;font-size:12px;line-height:1.45}
    .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    .toolbar input{max-width:340px}
    .table-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:auto;max-height:70vh}
    table.data,table{border-collapse:separate;border-spacing:0;width:100%;font-size:12px}
    th,td{padding:8px 9px;border-bottom:1px solid #edf2f5;text-align:left;vertical-align:middle;white-space:nowrap}
    th{position:sticky;top:0;background:#edf6f9;color:#17395d;z-index:1}
    tr:hover td{background:#fbfdfe}
    .pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:11px;background:#f7fbfd;font-weight:800;color:#466176}
    .pill.Approved{background:#d7ead8}.pill.Rejected{background:#fadadd}.pill.Draft{background:#eef2f5}
    .pill.Pending,.pill.Submitted,.pill.InReview{background:#fff2cc}.pill.Issued{background:#dceef8}
    .modal{position:fixed;inset:0;background:rgba(28,45,58,.40);display:none;align-items:center;justify-content:center;padding:18px;z-index:60}
    .modal.open{display:flex}
    .dialog{width:min(1120px,96vw);max-height:92vh;background:#fff;border-radius:18px;overflow:auto;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.18)}
    .dialog-head{display:flex;justify-content:space-between;align-items:center;background:#eef6fb;border-bottom:1px solid var(--line);padding:12px 14px;position:sticky;top:0;z-index:3}
    .dialog-body{padding:14px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:11px}
    .field.full{grid-column:1/-1}
    .toast{position:fixed;right:20px;bottom:20px;background:#17395d;color:#fff;padding:12px 14px;border-radius:12px;display:none;z-index:90}
    .toast.show{display:block}
    iframe.preview{width:100%;height:72vh;border:1px solid var(--line);border-radius:14px;background:white}
    .tabs{display:flex;gap:6px;align-items:center;margin:0 0 10px}
    .tabs button{background:#f9fcfe;border-color:#cfe0e8;color:#5a7487;font-weight:700;min-width:120px}
    .tabs button.active{background:#244963;color:#fff;border-color:#244963}
    .workflow{display:grid;grid-template-columns:410px 1fr;gap:14px;align-items:start}
    .side,.preview-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 10px 28px rgba(23,57,93,.05)}
    .side-head,.preview-head{display:flex;align-items:center;justify-content:space-between;background:#e8f3f9;border-bottom:1px solid var(--line);padding:11px 14px;font-weight:800;color:#264a63}
    .side-body{padding:12px}
    .panel{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:12px}
    .panel-title{background:#e9f3f9;display:flex;justify-content:space-between;padding:9px 11px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;font-weight:800;color:#254a63}
    .panel-body{padding:10px}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .readbox{background:#f7fbfd;border:1px solid #e2edf3;border-radius:10px;padding:8px;font-size:11px;color:#617488}
    .readbox b{display:block;color:#2a485d;margin-bottom:3px}
    .status-line{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
    .button-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .button-grid button{width:100%;padding:11px}
    .paper-stage{background:#777;overflow:auto;padding:12px;max-height:calc(100vh - 148px)}
    #a4preview{min-width:210mm;transform-origin:top left}
    .records{display:none;background:#fff;border-top:1px solid var(--line);padding:14px}
    .records.open{display:block}
    .server-banner{background:#fff8f8;border:1px solid #f0d4d4;border-radius:14px;padding:14px;margin-bottom:14px}
    .server-banner b{color:#bd5757}
    .server-banner pre{white-space:pre-wrap;color:#884444;font-size:11px;margin:8px 0 0;background:#fff2f2;padding:8px;border-radius:8px;border:1px solid #f5d4d4}
    .connecting-badge{display:inline-flex;align-items:center;gap:6px;background:#fff9ec;border:1px solid #f0d898;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;color:#8a6c1a}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:12px;height:12px;border:2px solid #d0b96a;border-top-color:#8a6c1a;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @media(max-width:1150px){
      .app{grid-template-columns:1fr}
      aside{height:auto;position:relative}
      .grid{grid-template-columns:1fr 1fr}
      .workflow{grid-template-columns:1fr}
      .paper-stage{max-height:none}
      #a4preview{transform:scale(.82);min-height:297mm}
      .form-grid{grid-template-columns:1fr}
    }
    @media print{
      @page{size:A4 portrait;margin:0}
      html,body{margin:0!important;padding:0!important;background:#fff!important;width:210mm!important}
      aside,.topbar,.nav,.toast,.modal,.print-hidden,.workflow .side,.preview-head,.tabs,.records{display:none!important}
      .app{display:block!important;min-height:auto!important}
      main{padding:0!important;margin:0!important;overflow:visible!important}
      .workflow{display:block!important}
      .preview-card{border:0!important;box-shadow:none!important;background:#fff!important;overflow:visible!important}
      .paper-stage{background:#fff!important;padding:0!important;overflow:visible!important;max-height:none!important}
      #a4preview{transform:none!important;min-width:auto!important;width:210mm!important}
      #a4preview .a4-root{background:#fff!important;padding:0!important;margin:0!important}
      #a4preview .a4-page{margin:0!important;box-shadow:none!important;border:0!important}
    }

    body.printing-a4 .photo-actions,body.printing-a4 .row-actions{display:none!important}
    @media print{
      @page{size:A4 portrait;margin:0}
      body{background:#fff!important}
      .a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;overflow:hidden!important;break-after:page!important;page-break-after:always!important}
      .photo-page .photo-list{height:202mm!important;overflow:hidden!important}
      .photo-page .photo-row{height:98mm!important;min-height:98mm!important;max-height:98mm!important;page-break-inside:avoid!important;break-inside:avoid!important}
    }
  
/* V24_A4_LAYOUT_GUARD — keep document content inside each A4 page */
#a4preview .a4-root{
  background:#777!important;
}
#a4preview .a4-page{
  position:relative!important;
  width:210mm!important;
  height:297mm!important;
  min-height:297mm!important;
  max-height:297mm!important;
  box-sizing:border-box!important;
  overflow:hidden!important;
  page-break-after:always!important;
  break-after:page!important;
}
#a4preview .a4-page table{
  width:100%!important;
  max-width:100%!important;
  table-layout:fixed!important;
  border-collapse:collapse!important;
}
#a4preview .a4-page th,
#a4preview .a4-page td{
  box-sizing:border-box!important;
  white-space:normal!important;
  overflow-wrap:break-word!important;
  word-break:normal!important;
  vertical-align:middle!important;
  line-height:1.12!important;
  padding:1.45mm 1.05mm!important;
}
#a4preview .a4-page thead th{
  line-height:1.08!important;
  padding-top:1.2mm!important;
  padding-bottom:1.2mm!important;
}
#a4preview .a4-page tr{
  break-inside:avoid!important;
  page-break-inside:avoid!important;
}
#a4preview .a4-page .row-actions{
  display:flex!important;
  flex-direction:row!important;
  flex-wrap:nowrap!important;
  gap:2px!important;
  align-items:center!important;
  justify-content:center!important;
}
#a4preview .a4-page .row-actions button,
#a4preview .a4-page .row-actions .btn{
  width:13px!important;
  height:13px!important;
  min-width:13px!important;
  max-width:13px!important;
  min-height:13px!important;
  padding:0!important;
  margin:0!important;
  font-size:8px!important;
  line-height:11px!important;
  border-radius:3px!important;
}
#a4preview .a4-page.v24-overflow{
  outline:2px solid #d87d7d!important;
  outline-offset:-2px!important;
}
#a4preview .v24-layout-warning{
  margin:6px 0;
  padding:8px 10px;
  border:1px solid #f0d4d4;
  border-radius:10px;
  background:#fff5f5;
  color:#a14c4c;
  font-size:11px;
}
@media print{
  #a4preview .a4-root{
    background:#fff!important;
  }
  #a4preview .a4-page{
    margin:0!important;
    box-shadow:none!important;
    border:0!important;
    overflow:hidden!important;
  }
  #a4preview .a4-page .row-actions,
  #a4preview .a4-page .photo-actions,
  #a4preview .a4-page th:last-child,
  #a4preview .a4-page td:last-child{
    display:none!important;
  }
  #a4preview .v24-layout-warning{
    display:none!important;
  }
}

</style>

<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <h1>AETERLINK<br>Documentation Control</h1>
        <small id="versionBadge">Starting up...</small>
      </div>
    </div>

      <div class="actions">
        <button class="soft" onclick="healthCheck()">Health</button>
        <button class="soft" onclick="doRefresh()">Refresh</button>
        <button class="primary" onclick="openQuickCreate()">+ Create Form</button>

    </div>
    <div id="content"><div class="card" style="text-align:center;padding:32px"><div class="spinner" style="width:24px;height:24px;margin:0 auto 12px"></div><div style="color:var(--muted)">Connecting to server…</div></div></div>
  </main>
</div>

</div>
<div class="toast" id="toast"></div>

function docLifecycleStage(t) {
  t = t || {};
  var code = String(t.TemplateCode || '').trim().toUpperCase();
  var name = String(t.TemplateName || '').trim().toUpperCase();
  var moduleName = String(t.Module || '').trim().toUpperCase();
  if (DOC_LIFECYCLE_EXACT[code]) return DOC_LIFECYCLE_EXACT[code];

  if (/WARRANTY|DLP|DEFECT LIABILITY/.test(code + ' ' + name + ' ' + moduleName)) return '08_WARRANTY';
  if (/HANDOVER|HO-|HNDOVER|CLOSE|CLOSURE|ASB|AS-BUILT|O&M|OMM|OAM|ACCEPTANCE|CERTIFICATE|SPARE|FINAL|REMOVAL|WCR|WORK-COMPLETE|WORK COMPLETION|EQUIP.*CHECK|EQUIP.*LIST|RELEASE-NOTE-POST/.test(code + ' ' + name + ' ' + moduleName)) return '07_HANDOVER';
  if (/TEST|COMMISSION|COM-RPT|SAT|FAT|READINESS|POINT-CHECK|FUNC-CHECK|UNIT-CHECK/.test(code + ' ' + name + ' ' + moduleName)) return '06_TESTING';
  if (/CONSTRUCTION|INSTALL|INS-|DWR|DAILY.*CON|WEEKLY.*CON|WORK-PERMIT|INSPECTION|QA|HSE|NCR|PUNCH|SITE-ISSUE|CONST-PHOTO|JSA-CON|ITP|ITR/.test(code + ' ' + name + ' ' + moduleName)) return '05_CONSTRUCTION';
  if (/PROCURE|PRC|PURCHASE|PO-|GRN|MATERIAL|MAT-|INV-|STOCK|STK|EQUIP-PLAN/.test(code + ' ' + name + ' ' + moduleName)) return '04_PROCUREMENT';
  if (/DESIGN|ENGINEERING|ENG|DRAWING|DRW|RFI|RFA|TECH|SUBMITTAL|SHOP|DATASHEET|SPEC|CALC|METHOD|SEQUENCE|POINT-LIST|CALIB/.test(code + ' ' + name + ' ' + moduleName)) return '03_DESIGN';
  if (/PLAN|SCHEDULE|BUDGET|RISK|RACI|MOM|MEETING|KICKOFF|CONTROL|CLAIM|PAYMENT|ORG|CASHFLOW|DAILY.*PRE|WEEKLY.*PRE|INSURANCE|JSA-PRE/.test(code + ' ' + name + ' ' + moduleName)) return '02_PLANNING';
  if (/HND|HANDOVER FORM|SALES|START|CHARTER|CODE REQUEST|INITIATION/.test(code + ' ' + name + ' ' + moduleName)) return '01_INITIATION';

  var cat = String(t.DocCategory || t.Phase || '').toLowerCase();
  if (cat.indexOf('post') >= 0) return '07_HANDOVER';
  if (cat.indexOf('construction') >= 0) return '05_CONSTRUCTION';
  if (cat.indexOf('pre') >= 0) return '02_PLANNING';
  return '02_PLANNING';
}

function docLifecycleLabel(key) {
  return DOC_LIFECYCLE_LABELS_TH[key] || key || '';
}

function sortTemplatesByLifecycle(a, b) {
  var ia = DOC_LIFECYCLE_STAGES.findIndex(function(s){ return s.key === docLifecycleStage(a); });
  var ib = DOC_LIFECYCLE_STAGES.findIndex(function(s){ return s.key === docLifecycleStage(b); });
  if (ia !== ib) return ia - ib;
  return String(a.TemplateCode || '').localeCompare(String(b.TemplateCode || ''));
}

function updateDocCategoryHint() {
  var el = document.getElementById('docCategoryHint');
  if (!el) return;
  if (!currentTemplate) {
    el.innerHTML = '<b>Document lifecycle:</b> Select a document type';
    return;
  }
  var key = docLifecycleStage(currentTemplate);
  el.innerHTML = '<b>Document lifecycle:</b> ' + esc(docLifecycleLabel(key)) +
    '<div style="margin-top:4px;color:#6b7f90">ใช้สำหรับแยกเอกสารตามลำดับงานตั้งแต่เริ่มโครงการ → วางแผน → ออกแบบ → จัดซื้อ → ติดตั้ง → ทดสอบ → ส่งมอบ → Warranty/DLP</div>';
}


/* ─── Server wrapper ─────────────────────────────────────── */
function server(fn, args) {
  return new Promise(function(resolve, reject) {
    try {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        reject(new Error('google.script.run is not available. Make sure this page is served from a Google Apps Script Web App deployment, not opened directly as a file.'));
        return;
      }
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [fn].apply(null, args || []);
    } catch (e) {
      reject(e);
    }
  });
}

function serverT(fn, args, ms) {
  return Promise.race([
    server(fn, args || []),
    new Promise(function(_, reject) {
      setTimeout(function() { reject(new Error(fn + ' timed out after ' + Math.round((ms || 15000) / 1000) + 's')); }, ms || 15000);
    })
  ]);
}

/* ─── Boot ───────────────────────────────────────────────── */
function boot() {
  APP = fallbackApp();
  renderNav();
  renderDashboard(APP.dashboard, false); // render offline state immediately
  tryConnect();
}

function tryConnect() {
  connectAttempts++;
  setVersionBadge('Connecting… (attempt ' + connectAttempts + ')');
  serverT('apiInitV8', [], 18000)
    .then(function(res) {
      APP = res || fallbackApp();
      serverConnected = true;
      lastServerError = '';
      setVersionBadge((APP.app && APP.app.version) || 'V8');
      renderNav();
      if (current === 'DASHBOARD') renderDashboard(APP.dashboard || {}, true);
      else if (current === 'A4_WORKFLOW') renderA4Workflow();
      toast('Server connected');
    })
    .catch(function(err) {
      serverConnected = false;
      lastServerError = (err && err.message) ? err.message : String(err || 'Unknown error');
      setVersionBadge('Offline — server not connected');
      if (current === 'DASHBOARD') renderDashboard(APP.dashboard || {}, false);
    });
}

function setVersionBadge(text) {
  var el = document.getElementById('versionBadge');
  if (el) el.textContent = text;
}

/* ─── Nav ────────────────────────────────────────────────── */
function renderNav() {
  var nav = document.getElementById('nav');
  if (!nav) return;
  var app = APP || fallbackApp();
  var items = [
    { key: 'DASHBOARD', label: 'Dashboard', icon: '📊' },
    { key: 'A4_WORKFLOW', label: 'Documents & Forms A4', icon: '📝' },
    { sep: true }
  ];
  Object.keys(app.modules || {}).forEach(function(k) {
    items.push({ key: k, label: app.modules[k].label, icon: app.modules[k].icon });
  });
  nav.innerHTML = items.map(function(m) {
    if (m.sep) return '<div class="sep"></div>';
    return '<button onclick="goto(\'' + m.key + '\')" id="nav-' + m.key + '"><span>' + m.icon + '</span>' + esc(m.label) + '</button>';
  }).join('');
  markNav();
}

function markNav() {
  document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
  var el = document.getElementById('nav-' + current);
  if (el) el.classList.add('active');
}

/* ─── Routing ────────────────────────────────────────────── */
async function goto(key) {
  current = key;
  markNav();
  if (key === 'DASHBOARD') { renderDashboard(APP.dashboard || {}, serverConnected); return; }
  if (key === 'A4_WORKFLOW') { renderA4Workflow(); return; }
  if (!serverConnected) {
    showConnectPrompt(key);
    return;
  }
  await loadTable(key);
}

function showConnectPrompt(key) {
  document.getElementById('pageTitle').textContent = (APP.modules[key] || {}).label || key;
  document.getElementById('content').innerHTML =
    '<div class="server-banner"><b>Server not connected</b>' +
    '<pre>' + esc(lastServerError || 'Click Reconnect to retry.') + '</pre>' +
    '<div style="margin-top:10px;display:flex;gap:8px">' +
    '<button class="primary" onclick="reconnectAndLoad(\'' + key + '\')">Reconnect & Load</button>' +
    '<button onclick="doRefresh()">Refresh Page</button></div></div>';
}

async function reconnectAndLoad(key) {
  await tryConnectPromise();
  if (serverConnected) await loadTable(key);
  else showConnectPrompt(key);
}

function tryConnectPromise() {
  connectAttempts++;
  setVersionBadge('Connecting…');
  return serverT('apiInitV8', [], 18000)
    .then(function(res) {
      APP = res || fallbackApp();
      serverConnected = true;
      lastServerError = '';
      setVersionBadge((APP.app && APP.app.version) || 'V8');
      renderNav();
      toast('Connected');
    })
    .catch(function(err) {
      serverConnected = false;
      lastServerError = (err && err.message) ? err.message : String(err || 'Unknown error');
      setVersionBadge('Offline');
    });
}

async function doRefresh() {
  await tryConnectPromise();
  if (current === 'DASHBOARD') renderDashboard(APP.dashboard || {}, serverConnected);
  else if (current === 'A4_WORKFLOW') renderA4Workflow();
  else if (serverConnected) await loadTable(current);
}

/* ─── Table view ─────────────────────────────────────────── */
async function loadTable(table) {
  document.getElementById('pageTitle').textContent = (APP.modules[table] || {}).label || table;
  document.getElementById('pageSub').textContent = table;
  document.getElementById('content').innerHTML = '<div class="card">Loading ' + esc(table) + '…</div>';
  try {
    var res = await serverT('apiGetTable', [table, { maxRows: 2000 }], 20000);
    currentRows = res.rows || [];
    renderTable(table, res.headers, currentRows);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="server-banner"><b>Failed to load ' + esc(table) + '</b><pre>' + esc((e && e.message) || e) + '</pre>' +
      '<button class="primary" onclick="loadTable(\'' + table + '\')">Retry</button></div>';
  }
}

function renderTable(table, headers, rows) {
  var editable = (APP.modules[table] || {}).editable;
  document.getElementById('content').innerHTML =
    '<div class="toolbar"><input id="search" placeholder="Search ' + esc(table) + '…" oninput="filterTable(\'' + table + '\')">' +
    (editable ? '<button class="primary" onclick="openEdit(\'' + table + '\')">+ New</button>' : '') +
    (table === 'FORM_RECORDS' ? '<button onclick="goto(\'A4_WORKFLOW\')">Open A4 Workflow</button>' : '') +
    '</div><div id="tableBox">' + tableHtml(table, headers, rows) + '</div>';
}

function filterTable(table) {
  var q = document.getElementById('search').value.toLowerCase();
  var rows = currentRows.filter(function(r) { return JSON.stringify(r).toLowerCase().indexOf(q) >= 0; });
  document.getElementById('tableBox').innerHTML = tableHtml(table, (APP.schemas || {})[table], rows);
}

function tableHtml(table, headers, rows) {
  return '<div class="table-wrap"><table class="data"><thead><tr><th>Action</th>' +
    (headers || []).map(function(h) { return '<th>' + esc(h) + '</th>'; }).join('') +
    '</tr></thead><tbody>' +
    (rows || []).map(function(r) {
      return '<tr><td>' + rowActions(table, r) + '</td>' +
        (headers || []).map(function(h) { return cell(table, h, r[h]); }).join('') + '</tr>';
    }).join('') +
    '</tbody></table></div>';
}

function rowActions(table, r) {
  var idField = ((APP.schemas || {})[table] || [])[0] || '';
  var id = r[idField] || '';
  var a = '';
  if ((APP.modules[table] || {}).editable) a += '<button class="sm" onclick="openEdit(\'' + table + '\',\'' + esc(id) + '\')">Edit</button> ';
  if (table === 'FORM_RECORDS') a += '<button class="sm" onclick="openA4Record(\'' + esc(id) + '\')">A4</button> <button class="sm" onclick="generatePdf(\'' + esc(id) + '\')">PDF</button>';
  if (table === 'DOCUMENT_REGISTER') a += '<button class="sm" onclick="createSubmittal(\'' + esc(id) + '\')">Submittal</button>';
  return a || '–';
}

function cell(table, h, v) {
  if (/Url$/i.test(h) && v) return '<td><a href="' + esc(v) + '" target="_blank">Open</a></td>';
  if (h === 'Status' || h === 'ClientStatus' || h === 'DocumentStatus') {
    var cls = String(v || '').replace(/\s+/g, '');
    return '<td><span class="pill ' + esc(cls) + '">' + esc(v) + '</span></td>';
  }
  var s = String(v == null ? '' : v);
  return '<td title="' + esc(s) + '">' + esc(s.length > 80 ? s.slice(0, 80) + '…' : s) + '</td>';
}

function simpleTable(rows, headers) {
  if (!rows || !rows.length) return '<div class="hint">No records yet.</div>';
  return '<div class="table-wrap" style="max-height:320px"><table class="data"><thead><tr>' +
    headers.map(function(h) { return '<th>' + esc(h) + '</th>'; }).join('') +
    '</tr></thead><tbody>' +
    rows.map(function(r) { return '<tr>' + headers.map(function(h) { return cell('', h, r[h]); }).join('') + '</tr>'; }).join('') +
    '</tbody></table></div>';
}

/* ─── Edit / Save ────────────────────────────────────────── */
async function openEdit(table, id) {
  var headers = (APP.schemas || {})[table] || [];
  var rec = {};
  if (id) {
    try { var res = await server('apiGetRecord', [table, id]); rec = res.record || {}; }
    catch (e) { toast('Could not load record: ' + ((e && e.message) || e)); return; }
  }
  var fields = headers.map(function(h) {
    var val = rec[h] || '';
    var full = ['FieldsJson','DataJson','BeforeJson','AfterJson','RecordJson','Description','Remarks','Message'].indexOf(h) >= 0;
    var input = full
      ? '<textarea data-k="' + esc(h) + '">' + esc(val) + '</textarea>'
      : '<input data-k="' + esc(h) + '" value="' + esc(val) + '">';
    return '<div class="field ' + (full ? 'full' : '') + '"><label>' + esc(h) + '</label>' + input + '</div>';
  }).join('');
  openModal((id ? 'Edit ' : 'New ') + table,
    '<div class="form-grid">' + fields + '</div>' +
    '<div class="hint" style="margin-top:10px">For DataJson / FieldsJson, paste valid JSON.</div><br>' +
    '<button class="primary" onclick="saveEdit(\'' + table + '\')">Save</button>');
}

async function saveEdit(table) {
  var rec = {};
  document.querySelectorAll('#modalBody [data-k]').forEach(function(el) { rec[el.dataset.k] = el.value; });
  try {
    await server('apiSaveRecord', [table, rec]);
    closeModal();
    if (current === table) await loadTable(table);
    toast('Saved');
  } catch (e) { toast('Save failed: ' + ((e && e.message) || e)); }
}

async function createSubmittal(documentId) {
  try {
    if (!documentId) throw new Error('DocumentId is empty. Please refresh Document Register and try again.');
    toast('Creating submittal...');
    var res = await server('apiCreateSubmittal', [documentId]);
    if (!res) {
      // Older deployed Code.gs versions may return null. Retry once after a short delay.
      await new Promise(function(r){ setTimeout(r, 700); });
      res = await server('apiCreateSubmittal', [documentId]);
    }
    if (!res) throw new Error('Server returned empty response. Please deploy Code.gs V12 as New Version.');
    var sub = res.submittal || res.record || res;
    if (!sub || !sub.SubmittalId) {
      throw new Error('Submittal response is missing SubmittalId. Response: ' + JSON.stringify(res).slice(0, 500));
    }
    toast('Submittal created: ' + sub.SubmittalId);
    if (current === 'DOCUMENT_REGISTER') await loadTable('DOCUMENT_REGISTER');
  } catch (e) { toast('Submittal failed: ' + ((e && e.message) || e)); }
}

function renderPhaseTabs() {
  var el = document.getElementById('phaseTabs');
  if (!el) return;
  el.innerHTML = DOC_LIFECYCLE_STAGES.map(function(s) {
    return '<button class="' + (s.key === phaseFilter ? 'active' : '') + '" onclick="setPhase(\'' + s.key + '\')">' + esc(s.label) + '</button>';
  }).join('');
}

function setPhase(p) {
  phaseFilter = p || 'All';
  renderPhaseTabs();
  renderTemplatesSelect();
  templateChanged();
}

function renderProjectsSelect() {
  var sel = document.getElementById('projectSelect');
  if (!sel) return;
  sel.innerHTML = (APP.projects || []).map(function(p) {
    return '<option value="' + esc(p.ProjectCode) + '">' + esc(p.ProjectCode) + ' — ' + esc(p.ProjectName) + '</option>';
  }).join('');
  if (APP.activeProjectCode) sel.value = APP.activeProjectCode;
}

function renderTemplatesSelect() {
  var sel = document.getElementById('templateSelect');
  if (!sel) return;

  var previous = sel.value || (currentTemplate && currentTemplate.TemplateCode) || '';
  var allTemplates = (APP.templates || []).slice().sort(sortTemplatesByLifecycle);
  var filtered = allTemplates.filter(function(t) {
    return phaseFilter === 'All' || docLifecycleStage(t) === phaseFilter;
  });

  if (!filtered.length) {
    sel.innerHTML = '<option value="">— No templates loaded (reconnect) —</option>';
    updateDocCategoryHint();
    return;
  }

  var html = '';
  DOC_LIFECYCLE_STAGES.forEach(function(stage) {
    if (stage.key === 'All') return;
    var items = filtered.filter(function(t) { return docLifecycleStage(t) === stage.key; });
    if (!items.length) return;
    html += '<optgroup label="' + esc(docLifecycleLabel(stage.key)) + '">';
    html += items.map(function(t) {
      return '<option value="' + esc(t.TemplateCode) + '">' + esc(t.TemplateCode) + ' — ' + esc(t.TemplateName) + '</option>';
    }).join('');
    html += '</optgroup>';
  });
  sel.innerHTML = html;

  if (previous && filtered.some(function(t){ return t.TemplateCode === previous; })) {
    sel.value = previous;
  }
  updateDocCategoryHint();
}

async function loadPreview() {
  if (_previewInFlight) { _previewNeedsRefresh = true; return; }
  _previewInFlight = true;
  _previewNeedsRefresh = false;
  var previewEl = document.getElementById('a4preview');
  if (!previewEl) { _previewInFlight = false; return; }
  if (!currentTemplate) {
    previewEl.innerHTML = '<div style="background:white;padding:20px;text-align:center;color:#888;font-size:13px">Select a template to see the A4 preview</div>';
    _previewInFlight = false;
    return;
  }
  if (!serverConnected) {
    previewEl.innerHTML = '<div style="background:white;padding:20px;text-align:center;color:#888;font-size:13px">Server not connected — cannot render A4. Click Reconnect in the sidebar.</div>';
    _previewInFlight = false;
    return;
  }
  previewEl.style.opacity = '0.5';
  previewEl.style.pointerEvents = 'none';
  try {
    var projectCode = document.getElementById('projectSelect') ? document.getElementById('projectSelect').value : '';
    var html = await server('apiPreviewHtml', [currentTemplate.TemplateCode, projectCode, JSON.stringify(currentData || {}), { editable: true, record: currentRecord || {} }]);
    previewEl.innerHTML = html;
    bindA4Inputs();
    updateIssuePanel();
    v24A4LayoutGuard(true);
  } catch (e) {
    previewEl.innerHTML = '<div style="background:white;padding:20px;color:#bd5757;font-size:12px"><b>Preview error</b><br>' + esc((e && e.message) || e) + '</div>';
  } finally {
    previewEl.style.opacity = '';
    previewEl.style.pointerEvents = '';
    _previewInFlight = false;
    if (_previewNeedsRefresh) { _previewNeedsRefresh = false; loadPreview(); }
  }
}

function bindA4Inputs() {
  document.querySelectorAll('#a4preview input,#a4preview textarea,#a4preview select,#a4preview [contenteditable="true"]').forEach(function(el) {
    el.addEventListener('input', function() { setDirty(true); });
    el.addEventListener('change', function() { setDirty(true); });
    if (el.getAttribute && el.getAttribute('contenteditable') === 'true') {
      el.addEventListener('paste', function(e) {
        e.preventDefault();
        var text = (e.clipboardData || window.clipboardData).getData('text/plain');
        document.execCommand('insertText', false, text);
      });
      el.addEventListener('blur', function() { syncContentEditable(el); });
    }
  });
}

function syncContentEditable(el) {
  if (!el || !el.dataset) return;
  var arrName = el.dataset.array;
  var key = el.dataset.key;
  if (!arrName || !key) return;
  var data = collectA4();
  currentData = data;
}

function currentProjectCodeV19() {
  return document.getElementById('projectSelect') ? document.getElementById('projectSelect').value : ((APP.projects || [])[0] || {}).ProjectCode;
}

function currentFormRecordIdV19() {
  return currentRecord && currentRecord.FormRecordId ? currentRecord.FormRecordId : '';
}

function collectA4() {
  var data = Object.assign({}, currentData || {});
  document.querySelectorAll('#a4preview [data-key]:not([data-array])').forEach(function(el) {
    var key = el.dataset.key;
    data[key] = getElValue(el);
  });
  var arrays = {};
  document.querySelectorAll('#a4preview [data-array][data-index][data-key]').forEach(function(el) {
    var arrName = el.dataset.array;
    var idx = parseInt(el.dataset.index, 10);
    var key = el.dataset.key;
    if (!arrays[arrName]) arrays[arrName] = parseArr(data[arrName]);
    while (arrays[arrName].length <= idx) arrays[arrName].push({});
    arrays[arrName][idx][key] = getElValue(el);
  });
  Object.keys(arrays).forEach(function(k) { data[k] = JSON.stringify(arrays[k]); });
  currentData = data;
  return data;
}

function getElValue(el) {
  if (el.getAttribute && el.getAttribute('contenteditable') === 'true') return el.innerText.trim();
  if (el.type === 'checkbox') return el.checked ? 'TRUE' : 'FALSE';
  return el.value;
}

function parseArr(v) {
  if (Array.isArray(v)) return v;
  try { var a = JSON.parse(v || '[]'); return Array.isArray(a) ? a : []; } catch(e) { return []; }
}

/* V24_A4_LAYOUT_GUARD — browser-accurate A4 layout check and fit */
function v24A4Pages() {
  return Array.prototype.slice.call(document.querySelectorAll('#a4preview .a4-page'));
}
function v24A4PageLimit(page) {
  var footer = page.querySelector('.a4-footer,[class*="footer"],.footer');
  var reserve = footer ? Math.ceil(footer.getBoundingClientRect().height) + 10 : 16;
  return Math.max(80, page.clientHeight - reserve);
}
function v24A4MeasurePage(page) {
  if (!page) return null;
  var limit = v24A4PageLimit(page);
  var maxBottom = 0;
  var pageTop = page.getBoundingClientRect().top;
  Array.prototype.slice.call(page.children).forEach(function(el) {
    if (!el || el.classList.contains('v24-layout-warning')) return;
    if (/(footer)/i.test(el.className || '')) return;
    var r = el.getBoundingClientRect();
    maxBottom = Math.max(maxBottom, Math.ceil(r.bottom - pageTop));
  });
  var scrollBottom = Math.ceil(page.scrollHeight);
  var used = Math.max(maxBottom, scrollBottom);
  return {
    limit: limit,
    used: used,
    overflowPx: Math.max(0, used - limit),
    ok: used <= limit
  };
}
function v24A4NormalizeTables(root) {
  root = root || document;
  Array.prototype.slice.call(root.querySelectorAll('#a4preview .a4-page table')).forEach(function(table) {
    table.style.tableLayout = 'fixed';
    table.style.width = '100%';
    table.style.maxWidth = '100%';
    Array.prototype.slice.call(table.querySelectorAll('th,td')).forEach(function(cell) {
      cell.style.whiteSpace = 'normal';
      cell.style.overflowWrap = 'break-word';
      cell.style.wordBreak = 'normal';
      cell.style.verticalAlign = 'middle';
    });
  });
}
function v24A4CompactPage(page) {
  if (!page) return;
  page.querySelectorAll('.row-actions').forEach(function(actions) {
    actions.style.display = 'flex';
    actions.style.flexDirection = 'row';
    actions.style.flexWrap = 'nowrap';
    actions.style.gap = '2px';
    actions.style.alignItems = 'center';
    actions.style.justifyContent = 'center';
  });
}
function v24A4ScalePageIfNeeded(page) {
  var m = v24A4MeasurePage(page);
  if (!m) return null;
  page.classList.toggle('v24-overflow', !m.ok);
  var body = page.querySelector('.v24-a4-scale-body');
  if (!body) {
    body = document.createElement('div');
    body.className = 'v24-a4-scale-body';
    var footer = page.querySelector('.a4-footer,[class*="footer"],.footer');
    Array.prototype.slice.call(page.childNodes).forEach(function(n) {
      if (n !== footer && !(n.classList && n.classList.contains('v24-layout-warning'))) body.appendChild(n);
    });
    page.insertBefore(body, footer || null);
  }
  body.style.transformOrigin = 'top left';
  body.style.transform = 'scale(1)';
  body.style.width = '100%';
  m = v24A4MeasurePage(page);
  if (m && !m.ok) {
    var scale = Math.max(0.86, Math.min(1, m.limit / Math.max(1, m.used)));
    body.style.transform = 'scale(' + scale + ')';
    body.style.width = (100 / scale) + '%';
    m.scale = Number(scale.toFixed(3));
    m.status = scale < 1 ? 'AUTO-FIT' : 'OVERFLOW';
  } else if (m) {
    m.scale = 1;
    m.status = 'OK';
  }
  page.classList.toggle('v24-overflow', m && m.status === 'OVERFLOW');
  return m;
}
function v24A4LayoutGuard(showWarning) {
  v24A4NormalizeTables(document);
  setTimeout(function() {
    var report = [];
    v24A4Pages().forEach(function(page, idx) {
      v24A4CompactPage(page);
      var m = v24A4ScalePageIfNeeded(page) || {};
      m.page = idx + 1;
      report.push(m);
    });
    window.__v24A4LayoutReport = report;
    if (showWarning) v24ShowA4LayoutWarning(report);
  }, 60);
}
function v24ShowA4LayoutWarning(report) {
  var host = document.getElementById('a4preview');
  if (!host) return;
  var old = host.querySelector('.v24-layout-warning');
  if (old) old.remove();
  var bad = (report || []).filter(function(r){ return r.status === 'OVERFLOW'; });
  if (!bad.length) return;
  var div = document.createElement('div');
  div.className = 'v24-layout-warning';
  div.textContent = 'A4 layout warning: ' + bad.length + ' page(s) still overflow after auto-fit. Please reduce rows or split the table.';
  host.insertBefore(div, host.firstChild);
}
function v24A4ClientLayoutHtml() {
  v24A4LayoutGuard(false);
  var report = window.__v24A4LayoutReport || [];
  var bad = report.filter(function(r){ return r.status === 'OVERFLOW'; }).length;
  var auto = report.filter(function(r){ return r.status === 'AUTO-FIT'; }).length;
  return '<h4>Live Browser A4 Fit</h4>' +
    '<div class="hint" style="margin-bottom:8px">' +
    (bad ? ('Still overflow: ' + bad + ' page(s).') : ('OK. Auto-fit applied on ' + auto + ' page(s).')) +
    '<br><span style="color:#6b7f90">This check reads actual rendered A4 height in the browser. It complements the server pagination estimate.</span></div>' +
    '<pre style="white-space:pre-wrap;font-size:11px;background:#f7fafc;border:1px solid #dbe7ef;border-radius:10px;padding:10px">' +
    esc(JSON.stringify(report, null, 2)) + '</pre>';
}

function printA4() {
  try { collectA4(); } catch(e) {}
  v24A4LayoutGuard(true);
  document.body.classList.add('printing-a4');
  setTimeout(function(){ window.print(); }, 80);
}
window.addEventListener('afterprint', function(){ document.body.classList.remove('printing-a4'); });

/* ─── A4 row helpers (called from rendered HTML) ─────────── */
async function a4AddRow(arrName, idx) {
  var data = collectA4();
  var arr = parseArr(data[arrName]);
  var sample = arr[idx] || arr[0] || {};
  var empty = {};
  Object.keys(sample).forEach(function(k) { empty[k] = ''; });
  arr.splice(idx + 1, 0, empty);
  data[arrName] = JSON.stringify(arr);
  currentData = data;
  await loadPreview();
}

async function a4DeleteRow(arrName, idx) {
  var data = collectA4();
  var arr = parseArr(data[arrName]);
  if (arr.length > 1) arr.splice(idx, 1);
  data[arrName] = JSON.stringify(arr);
  currentData = data;
  await loadPreview();
}

async function a4MoveRow(arrName, idx, delta) {
  var data = collectA4();
  var arr = parseArr(data[arrName]);
  var ni = idx + delta;
  if (ni < 0 || ni >= arr.length) return;
  var item = arr.splice(idx, 1)[0];
  arr.splice(ni, 0, item);
  data[arrName] = JSON.stringify(arr);
  currentData = data;
  await loadPreview();
}

function a4PickPhoto(idx) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function() {
    var file = input.files && input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function() {
      var data = collectA4();
      var arr = parseArr(data.PhotoItemsJson);
      while (arr.length <= idx) arr.push({ ItemNo: '', Description: '', Note: '', ImageKey: '', ImageData: '' });
      arr[idx].ImageData = String(reader.result || '');
      arr[idx].ImageKey = '';
      data.PhotoItemsJson = JSON.stringify(arr);
      currentData = data;
      setDirty(true);
      loadPreview();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function a4ClearPhoto(idx) {
  var data = collectA4();
  var arr = parseArr(data.PhotoItemsJson);
  if (arr[idx]) { arr[idx].ImageData = ''; arr[idx].ImageKey = ''; }
  data.PhotoItemsJson = JSON.stringify(arr);
  currentData = data;
  setDirty(true);
  loadPreview();
}

/* ─── Utilities ──────────────────────────────────────────── */
async function healthCheck() {
  try {
    var res = await serverT('apiHealthCheck', [], 8000);
    openModal('Health Check', '<pre style="white-space:pre-wrap">' + esc(JSON.stringify(res, null, 2)) + '</pre>');
  } catch (e) {
    openModal('Health Check Failed', '<div class="server-banner"><b>Server failed</b><pre>' + esc((e && e.message) || e) + '</pre></div>');
  }
}

function openModal(title, html) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}
function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

boot();
