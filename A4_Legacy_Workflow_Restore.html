<!-- AETERLINK Documentation Module — A4_Legacy_Workflow_Restore.html -->
<style id="a4-legacy-workflow-restore-style">
  /* Restore the V24 legacy workflow screen while applying the same WCR A4 master grid to every A4 document type. */
  body.a4-legacy-restored .workflow{grid-template-columns:410px minmax(0,1fr)!important;gap:14px!important;align-items:start!important;}
  body.a4-legacy-restored .side{display:block!important;visibility:visible!important;}
  body.a4-legacy-restored .preview-card{display:block!important;visibility:visible!important;}
  body.a4-legacy-restored .paper-stage{background:#777!important;overflow:auto!important;padding:12px!important;}

  #a4preview .a4-root{background:#777!important;padding:16px!important;margin:0!important;}
  #a4preview .a4-page,#a4preview .a4-page *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box!important;}
  #a4preview .a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;background:#fff!important;color:#09243f!important;overflow:hidden!important;margin:0 auto 12px!important;page-break-after:always!important;break-after:page!important;}
  #a4preview .a4-page-inner{height:100%!important;padding:10.5mm 10.5mm 11mm!important;display:flex!important;flex-direction:column!important;}
  #a4preview .a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}

  /* WCR master header style applied to all document templates. */
  #a4preview .a4-header{display:grid!important;grid-template-columns:48mm 100mm 41mm!important;align-items:stretch!important;border:1.2px solid #333!important;min-height:29mm!important;margin-bottom:5mm!important;background:#fff!important;}
  #a4preview .a4-logo-cell,#a4preview .a4-title-cell,#a4preview .a4-meta-cell{display:flex!important;align-items:center!important;justify-content:center!important;padding:2mm!important;border-right:1.2px solid #333!important;min-width:0!important;overflow:hidden!important;background:#fff!important;}
  #a4preview .a4-meta-cell{border-right:0!important;justify-content:flex-start!important;align-items:flex-start!important;padding-top:6mm!important;}
  #a4preview .a4-logo-img{width:42mm!important;max-width:42mm!important;height:auto!important;max-height:14mm!important;display:block!important;object-fit:contain!important;}
  #a4preview .a4-title{font-size:17pt!important;font-weight:900!important;text-align:center!important;color:#06345d!important;letter-spacing:.5px!important;line-height:1.05!important;white-space:normal!important;overflow-wrap:anywhere!important;}
  #a4preview .a4-subtitle{font-size:6.1pt!important;color:#2e5d7d!important;text-align:center!important;margin-top:1.2mm!important;font-weight:700!important;white-space:normal!important;overflow-wrap:anywhere!important;}
  #a4preview .a4-meta{font-size:7.2pt!important;color:#111!important;line-height:1.2!important;font-weight:900!important;width:100%!important;white-space:normal!important;overflow-wrap:anywhere!important;}
  #a4preview .a4-meta-row{display:grid!important;grid-template-columns:17mm minmax(0,1fr)!important;column-gap:1mm!important;align-items:start!important;margin-bottom:.8mm!important;}

  #a4preview .a4-project-grid{width:100%!important;border-collapse:collapse!important;margin-bottom:4mm!important;font-size:7.6pt!important;table-layout:fixed!important;}
  #a4preview .a4-project-grid th{background:#fff!important;color:#06345d!important;font-weight:900!important;text-transform:uppercase!important;font-size:5.8pt!important;letter-spacing:.35px!important;text-align:left!important;padding:1.35mm 1.7mm .6mm!important;border:1px solid #333!important;white-space:normal!important;overflow-wrap:anywhere!important;}
  #a4preview .a4-project-grid td{font-size:7.8pt!important;font-weight:900!important;color:#09243f!important;padding:.8mm 1.7mm 1.55mm!important;border:1px solid #333!important;vertical-align:top!important;white-space:normal!important;overflow-wrap:anywhere!important;}

  #a4preview .a4-section-title{margin:0 0 2mm!important;padding:1.8mm 2.2mm!important;background:#113e63!important;color:#fff!important;border:1px solid #113e63!important;font-size:9pt!important;font-weight:900!important;letter-spacing:.8px!important;text-transform:uppercase!important;line-height:1!important;white-space:normal!important;overflow-wrap:anywhere!important;}
  #a4preview .a4-section-scope{margin-top:4mm!important;}

  /* Uniform A4 table grid: one visible line per edge, no missing top line and no double-thick grid. */
  #a4preview .a4-page table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:separate!important;border-spacing:0!important;font-size:7.4pt!important;}
  #a4preview .a4-page th,#a4preview .a4-page td{box-sizing:border-box!important;white-space:normal!important;overflow-wrap:anywhere!important;word-break:break-word!important;vertical-align:middle!important;line-height:1.18!important;padding:1.12mm 1mm!important;}
  #a4preview table.a4-info-table th,#a4preview table.a4-info-table td,#a4preview table.a4-scope-table th,#a4preview table.a4-scope-table td{border:0!important;border-right:.18mm solid #666!important;border-bottom:.18mm solid #666!important;box-shadow:none!important;}
  #a4preview table.a4-info-table thead tr:first-child>* ,#a4preview table.a4-info-table tbody tr:first-child>* ,#a4preview table.a4-scope-table thead tr:first-child>*{border-top:.18mm solid #666!important;}
  #a4preview table.a4-info-table tr>*:first-child,#a4preview table.a4-scope-table tr>*:first-child{border-left:.18mm solid #666!important;}
  #a4preview table.a4-info-table tr>*:last-child,#a4preview table.a4-scope-table tr>*:last-child{border-right:.18mm solid #666!important;}
  #a4preview table.a4-info-table tbody tr:last-child>*,#a4preview table.a4-scope-table tbody tr:last-child>*{border-bottom:.18mm solid #666!important;}
  #a4preview table.a4-scope-table thead th{background:#f1f1f1!important;color:#061f38!important;font-size:6.8pt!important;font-weight:900!important;text-align:center!important;line-height:1.12!important;}
  #a4preview table.a4-scope-table td{font-size:7pt!important;font-weight:800!important;text-align:center!important;}
  #a4preview table.a4-scope-table td:nth-child(3){text-align:center!important;font-weight:900!important;}
  #a4preview table.a4-scope-table td:nth-child(7){text-align:left!important;font-weight:700!important;}
  #a4preview table.a4-info-table th{background:#f0f0f0!important;color:#061f38!important;font-size:6.2pt!important;text-transform:uppercase!important;letter-spacing:.25px!important;text-align:left!important;}
  #a4preview table.a4-info-table td{font-size:7.4pt!important;font-weight:900!important;}

  #a4preview .a4-footer{flex:0 0 auto!important;padding-top:1.5mm!important;font-size:6.3pt!important;color:#555!important;display:flex!important;justify-content:center!important;gap:4mm!important;text-align:center!important;}
  #a4preview .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;font-weight:700!important;}

  @media print{
    @page{size:A4 portrait;margin:0!important;}
    html,body{margin:0!important;padding:0!important;background:#fff!important;width:210mm!important;}
    aside,.topbar,.nav,.toast,.modal,.print-hidden,.workflow .side,.preview-head,.tabs,.records{display:none!important;}
    .app{display:block!important;min-height:auto!important;}
    main{padding:0!important;margin:0!important;overflow:visible!important;}
    .workflow{display:block!important;}
    .preview-card{border:0!important;box-shadow:none!important;background:#fff!important;overflow:visible!important;}
    .paper-stage{background:#fff!important;padding:0!important;overflow:visible!important;max-height:none!important;}
    #a4preview{transform:none!important;min-width:auto!important;width:210mm!important;}
    #a4preview .a4-root{background:#fff!important;padding:0!important;margin:0!important;}
    #a4preview .a4-page{margin:0!important;box-shadow:none!important;border:0!important;overflow:hidden!important;}
    #a4preview .row-actions,#a4preview .photo-actions,#a4preview .a4-action-column,#a4preview th:last-child.is-action,#a4preview td:last-child.is-action{display:none!important;}
  }
</style>
<script id="a4-legacy-workflow-restore-script">
(function(){
  var EN_LABELS={
    All:'All documents',
    '01_INITIATION':'1. Project Start / Sales Handover',
    '02_PLANNING':'2. Project Planning / Control',
    '03_DESIGN':'3. Design / Engineering / Approval Documents',
    '04_PROCUREMENT':'4. Procurement / Material',
    '05_CONSTRUCTION':'5. Construction / Installation',
    '06_TESTING':'6. Testing / Commissioning',
    '07_HANDOVER':'7. Handover / Closeout',
    '08_WARRANTY':'8. Warranty / DLP / Post-handover'
  };
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function a4Root(){return document.querySelector('#a4preview .a4-root')||document.querySelector('#a4preview');}
  function a4Pages(root){root=root||a4Root();return root?[].slice.call(root.querySelectorAll('.a4-page')):[];}
  function textOf(n){return (n&&n.textContent||'').replace(/\s+/g,' ').trim();}
  function getDocNo(root){root=root||a4Root();var rows=root?root.querySelectorAll('.a4-meta-row'):[];for(var i=0;i<rows.length;i++){if(/doc\s*no/i.test(textOf(rows[i]))){var span=rows[i].querySelector('span,.a4-editable');var v=(span?textOf(span):textOf(rows[i]).replace(/doc\s*no\.?\s*:?/i,''));return v||'Not issued';}}var box=document.querySelector('.readbox b, .readbox');return box?textOf(box).replace(/Document No\.?/i,'').trim()||'Not issued':'Not issued';}
  function markTables(page){
    var tables=[].slice.call(page.querySelectorAll('table'));
    tables.forEach(function(t){
      var header=textOf(t.querySelector('thead')||t.rows[0]||t).toLowerCase();
      var body=textOf(t).toLowerCase();
      if(/package/.test(header)&&/work description/.test(header)&&/remarks/.test(header)) t.classList.add('a4-scope-table');
      else if(/contract no|purchase order|work type|completion date|reference documents|additional notes/.test(body)) t.classList.add('a4-info-table');
      else if(/project code/.test(body)&&/project name/.test(body)&&/main-contractor/.test(body)) t.classList.add('a4-project-grid');
      if(t.classList.contains('a4-scope-table')){
        var heads=[].slice.call(t.querySelectorAll('thead th, tr:first-child th, tr:first-child td'));
        heads.forEach(function(th){ if(/^action$/i.test(textOf(th))) th.classList.add('is-action'); });
        [].slice.call(t.rows).forEach(function(tr){ var cells=tr.cells; if(cells.length && /^action$/i.test(textOf(heads[heads.length-1]||''))) cells[cells.length-1].classList.add('is-action'); });
      }
    });
  }
  function normalizeTables(root){
    root=root||a4Root(); if(!root)return;
    root.querySelectorAll('table.a4-info-table,table.a4-scope-table').forEach(function(table){
      table.style.borderCollapse='separate'; table.style.borderSpacing='0'; table.style.tableLayout='fixed'; table.style.width='100%'; table.style.maxWidth='100%';
      table.querySelectorAll('th,td').forEach(function(cell){
        cell.style.border='0'; cell.style.borderRight='.18mm solid #666'; cell.style.borderBottom='.18mm solid #666'; cell.style.boxShadow='none';
      });
      table.querySelectorAll('thead tr:first-child > *, tbody tr:first-child > *').forEach(function(cell){ if(!table.tHead || cell.parentNode.parentNode.tagName==='THEAD') cell.style.borderTop='.18mm solid #666'; });
      if(!table.tHead) table.querySelectorAll('tbody tr:first-child > *').forEach(function(cell){ cell.style.borderTop='.18mm solid #666'; });
      table.querySelectorAll('tr > *:first-child').forEach(function(cell){ cell.style.borderLeft='.18mm solid #666'; });
      table.querySelectorAll('tr > *:last-child').forEach(function(cell){ cell.style.borderRight='.18mm solid #666'; });
      table.querySelectorAll('tbody tr:last-child > *').forEach(function(cell){ cell.style.borderBottom='.18mm solid #666'; });
    });
  }
  function updateFooters(root){
    root=root||a4Root(); if(!root)return;
    var pages=a4Pages(root), docNo=getDocNo(root);
    pages.forEach(function(page,i){
      var footer=page.querySelector('.a4-footer');
      if(!footer){footer=document.createElement('footer');footer.className='a4-footer';var inner=page.querySelector('.a4-page-inner')||page;inner.appendChild(footer);}
      footer.innerHTML='<span class="a4-footer-center">Document No.: '+esc(docNo)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(i+1)+' / '+pages.length+'</span>';
    });
  }
  function forceEnglishLifecycle(){
    window.DOC_LIFECYCLE_LABELS_TH=EN_LABELS;
    window.docLifecycleLabel=function(key){return EN_LABELS[key]||key||'';};
    var el=document.getElementById('docCategoryHint');
    if(el&&window.currentTemplate&&window.docLifecycleStage){
      var key=window.docLifecycleStage(window.currentTemplate);
      el.innerHTML='<b>Document lifecycle:</b> '+esc(window.docLifecycleLabel(key))+'<div style="margin-top:4px;color:#6b7f90">Used to group documents by project lifecycle: initiation → planning → design → procurement → installation → testing → handover → Warranty/DLP</div>';
    }
  }
  function normalizeLegacyA4(){
    document.body.classList.add('a4-legacy-restored');
    forceEnglishLifecycle();
    var root=a4Root(); if(!root)return;
    root.classList.add('a4-print-area');
    a4Pages(root).forEach(function(page){page.classList.add('a4-master-layout'); markTables(page);});
    normalizeTables(root); updateFooters(root);
  }
  function cloneForPrint(){
    normalizeLegacyA4();
    var root=a4Root(); if(!root)return null;
    var clone=root.cloneNode(true);
    clone.querySelectorAll('.row-actions,.photo-actions,.a4-no-print,.v24-layout-warning,button,.is-action').forEach(function(n){n.remove();});
    clone.querySelectorAll('select').forEach(function(sel){var span=document.createElement('span');span.textContent=sel.value||sel.options[sel.selectedIndex]&&sel.options[sel.selectedIndex].text||'';sel.parentNode.replaceChild(span,sel);});
    clone.querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');});
    normalizeTables(clone); updateFooters(clone);
    return clone;
  }
  function printLegacyA4(){
    var clone=cloneForPrint(); if(!clone){window.print();return;}
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent;}).join('\n');
    var css='@page{size:A4 portrait;margin:0!important;}*{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}html,body{width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}.a4-root{background:#fff!important;padding:0!important;margin:0!important;width:210mm!important;}.a4-page{width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;box-shadow:none!important;border:0!important;overflow:hidden!important;page-break-after:always!important;break-after:page!important;}.a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}.a4-page-inner{height:100%!important;padding:10.5mm 10.5mm 11mm!important;display:flex!important;flex-direction:column!important;}.row-actions,.photo-actions,button,.is-action{display:none!important;}';
    var win=window.open('','_blank'); if(!win){window.print();return;}
    win.document.open();
    win.document.write('<!doctype html><html><head><meta charset="UTF-8"><title>A4 Print</title><style>'+styles+'\n'+css+'</style></head><body>'+clone.outerHTML+'</body></html>');
    win.document.close(); setTimeout(function(){win.focus();win.print();},450);
  }
  function installPrintHooks(){
    ['printA4','printA4Pdf','printA4Preview','printPdf','doPrint','printDocument'].forEach(function(name){window[name]=printLegacyA4;});
    if(window.AETERLINK_A4_RENDERER) window.AETERLINK_A4_RENDERER.printA4=printLegacyA4;
  }
  function patchRenderHooks(){
    ['renderA4','renderA4Workflow','refreshA4','refreshPreview','updatePreview','selectTemplate','renderWorkflow'].forEach(function(name){
      if(typeof window[name]==='function'&&!window[name].__legacyRestorePatched){
        var old=window[name];
        window[name]=function(){var r=old.apply(this,arguments);setTimeout(normalizeLegacyA4,120);setTimeout(normalizeLegacyA4,420);return r;};
        window[name].__legacyRestorePatched=true;
      }
    });
  }
  document.addEventListener('click',function(e){
    var b=e.target&&e.target.closest&&e.target.closest('button');
    if(!b)return;
    var tx=textOf(b).toLowerCase();
    if(tx.indexOf('print')>=0 && (tx.indexOf('pdf')>=0 || tx.indexOf('save')>=0)){
      e.preventDefault(); e.stopPropagation(); printLegacyA4();
    }
  },true);
  document.addEventListener('DOMContentLoaded',function(){installPrintHooks();patchRenderHooks();setTimeout(normalizeLegacyA4,300);setTimeout(normalizeLegacyA4,900);});
  var timer=setInterval(function(){installPrintHooks();patchRenderHooks();normalizeLegacyA4();},800);
  setTimeout(function(){clearInterval(timer);normalizeLegacyA4();},12000);
  window.AETERLINK_LEGACY_RESTORE={normalize:normalizeLegacyA4,print:printLegacyA4};
})();
</script>
