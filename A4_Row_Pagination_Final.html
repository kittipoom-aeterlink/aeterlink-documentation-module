<!-- AETERLINK Documentation Module — A4_Row_Pagination_Final.html -->
<!-- Final A4 row pagination layer: delete any row, auto-create continuation pages, status single value, A4-safe widths. -->
<style id="a4-row-pagination-final-style">
  #a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table,.a4-print-area table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:collapse!important;margin:0 auto!important;}
  #a4Preview table.a4-scope-table th,#a4Preview table.a4-scope-table td,#a4CheckOutput table.a4-scope-table th,#a4CheckOutput table.a4-scope-table td,.a4-print-area table.a4-scope-table th,.a4-print-area table.a4-scope-table td{border:1px solid #000!important;padding:1.2mm 2mm!important;text-align:left!important;word-wrap:break-word!important;overflow-wrap:break-word!important;}
  #a4Preview table.a4-scope-table th,#a4CheckOutput table.a4-scope-table th,.a4-print-area table.a4-scope-table th{text-align:center!important;}
  #a4Preview .a4-row-control-bar,#a4CheckOutput .a4-row-control-bar{display:flex!important;gap:6px!important;margin:2.2mm 0 0!important;position:relative!important;z-index:120!important;pointer-events:auto!important;}
  #a4Preview .a4-row-control-bar button,#a4CheckOutput .a4-row-control-bar button{border:1px solid #adc3d2!important;background:#fff!important;color:#07385b!important;border-radius:6px!important;padding:4px 12px!important;font-size:13px!important;font-weight:600!important;cursor:pointer!important;}
  #a4Preview .a4-row-delete-cell,#a4CheckOutput .a4-row-delete-cell{position:relative!important;padding-left:5mm!important;text-align:center!important;vertical-align:middle!important;}
  #a4Preview .a4-row-paged-delete,#a4CheckOutput .a4-row-paged-delete{display:block!important;visibility:visible!important;position:absolute!important;left:1mm!important;top:50%!important;transform:translateY(-50%)!important;background:#fff!important;border:1px solid #c2c2c2!important;color:#07385b!important;width:6mm!important;height:6mm!important;padding:0!important;border-radius:3px!important;font-size:16px!important;font-weight:bold!important;cursor:pointer!important;line-height:1!important;}
  #a4Preview .a4-row-paged-delete:hover,#a4CheckOutput .a4-row-paged-delete:hover{background:#fff1f1!important;border-color:#a91d1d!important;}
  #a4Preview .a4-row-item-value,#a4CheckOutput .a4-row-item-value{display:block!important;width:100%!important;text-align:center!important;margin:0 auto!important;min-height:10px!important;outline:none!important;}
  #a4Preview .a4-status-select,#a4CheckOutput .a4-status-select{width:100%!important;border:0!important;background:transparent!important;font:inherit!important;font-weight:900!important;color:#092b3a!important;padding:0!important;}
  #a4Preview .a4-status-print,#a4CheckOutput .a4-status-print{display:none!important;visibility:hidden!important;}
  @media print{.a4-row-control-bar,.a4-row-paged-delete,.a4-row-clean-delete,.a4-row-delete-btn,.a4-preview-actions{display:none!important;visibility:hidden!important}.a4-row-delete-cell{padding-left:.7mm!important;}}
</style>
<script id="a4-row-pagination-final-script">
(function(){
  if(window.__AETERLINK_A4_ROW_PAGINATION_FINAL_V1__) return;
  window.__AETERLINK_A4_ROW_PAGINATION_FINAL_V1__=true;
  var syncTimer=null, patchDone=false;
  var STATUS=['','-','Not Started','In Progress','Pending','Done','Issue','N/A','Open','Closed','Approved','Submitted'];
  var W6=['16mm','74mm','13mm','13mm','20mm','43mm'];
  var W7=['9mm','24mm','34mm','23mm','45mm','18mm','25mm'];
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function root(){return document.getElementById('a4Preview')||document.getElementById('a4CheckOutput')||document;}
  function area(){return document.querySelector('#a4Preview .a4-print-area')||document.querySelector('#a4PrintArea')||document.querySelector('.a4-print-area')||root();}
  function tables(base){base=base||root();return [].slice.call(base.querySelectorAll('.a4-page .a4-content table.a4-scope-table,.a4-page .a4-content table')).filter(function(t){return t&&t.tBodies&&t.tBodies[0];});}
  function pages(base){base=base||area();return [].slice.call(base.querySelectorAll('.a4-page'));}
  function labels(t){var r=t&&t.tHead&&t.tHead.rows&&t.tHead.rows[0];return r?[].slice.call(r.cells).map(function(th){return String(th.textContent||'').trim();}):[];}
  function widths(t){var n=(t&&t.tHead&&t.tHead.rows[0]&&t.tHead.rows[0].cells.length)||0;return n===7?W7:W6;}
  function applyWidths(t){if(!t)return;var ws=widths(t);var cg=t.querySelector('colgroup');if(!cg){cg=document.createElement('colgroup');t.insertBefore(cg,t.firstChild);}cg.innerHTML='';ws.slice(0,t.tHead.rows[0].cells.length).forEach(function(w){var col=document.createElement('col');col.style.width=w;cg.appendChild(col);});}
  function isStatus(label,index){var s=String(label||'').trim();return s?/^status$/i.test(s):index===4;}
  function key(label,index){var s=String(label||'').trim();if(/^item$/i.test(s))return'Item';if(/^no\.?$/i.test(s))return'No';if(/equipment\s*tag/i.test(s))return'EquipmentTag';if(/work\s*description/i.test(s)||/^description$/i.test(s))return'WorkDescription';if(/^qty\.?$/i.test(s))return'Qty';if(/^unit$/i.test(s))return'Unit';if(/^status$/i.test(s))return'Status';if(/^remarks?$/i.test(s))return'Remarks';return s?s.replace(/[^A-Za-z0-9]+/g,''):'Col'+index;}
  function strip(v){return String(v==null?'':v).replace(/^[\s×xX*•-]+/,'').trim();}
  function cleanStatus(v){v=String(v==null?'':v).trim();var c=v.replace(/\s+/g,'').toLowerCase();for(var i=0;i<STATUS.length;i++){var n=STATUS[i];if(!n)continue;var nc=n.replace(/\s+/g,'').toLowerCase();if(nc===c)return n;}return v;}
  function statusHtml(v){v=cleanStatus(v||'Pending')||'Pending';return '<select class="a4-status-select" contenteditable="false">'+STATUS.map(function(o){return '<option value="'+esc(o)+'"'+(o===v?' selected':'')+'>'+esc(o||'-')+'</option>';}).join('')+'</select><span class="a4-status-print">'+esc(v)+'</span>';}
  function value(td,index){var sel=td.querySelector('select.a4-status-select,select');if(sel)return cleanStatus(sel.value||'');var sp=td.querySelector('.a4-row-item-value,.a4-row-item-text');if(sp)return sp.textContent;return td.textContent;}
  function prepCell(td,i,h){td.classList.add('a4-editable');if(i===0){var v=strip(value(td,0));td.classList.add('a4-row-delete-cell');td.contentEditable='false';td.innerHTML='<button type="button" class="a4-row-paged-delete" title="Delete this row" aria-label="Delete this row" contenteditable="false">×</button><span class="a4-row-item-value" contenteditable="true" spellcheck="false">'+esc(v)+'</span>';}else if(isStatus(h[i],i)){td.contentEditable='false';td.innerHTML=statusHtml(value(td,i));}else{td.contentEditable='true';td.spellcheck='false';}}
  function prepTable(t){t.classList.add('a4-scope-table');applyWidths(t);var h=labels(t);[].slice.call(t.tBodies[0].rows).forEach(function(tr){[].slice.call(tr.cells).forEach(function(td,i){prepCell(td,i,h);});});}
  function addBars(base){base=base||root();base.querySelectorAll('.a4-row-control-bar').forEach(function(n){n.remove();});tables(base).forEach(function(t){var bar=document.createElement('div');bar.className='a4-row-control-bar a4-no-print';bar.innerHTML='<button type="button" class="a4-paged-add-row-btn">+ Add Row</button>';var next=t.nextElementSibling;if(next&&next.classList&&next.classList.contains('a4-row-control-bar'))return;t.parentNode.insertBefore(bar,t.nextSibling);});}
  function fit(page){var c=page&&page.querySelector('.a4-content');return !c||c.scrollHeight<=c.clientHeight+2;}
  function continuedPageAfter(page,table){var next=page.nextElementSibling;if(next&&next.classList&&next.classList.contains('a4-scope-continued-page'))return next;var p=document.createElement('div');p.className='a4-page a4-scope-continued-page';var h=page.getAttribute('style')||'';p.setAttribute('style',h);var c=document.createElement('div');c.className='a4-content';var t=table.cloneNode(true);[].slice.call(t.tBodies[0].rows).forEach(function(r){r.remove();});c.appendChild(t);p.appendChild(c);page.parentNode.insertBefore(p,next);return p;}
  function paginateFrom(table){var guard=0,page=table&&table.closest('.a4-page');while(page&&guard++<40){var t=page.querySelector('.a4-content table.a4-scope-table');if(!t)break;applyWidths(t);while(!fit(page)&&t.tBodies[0].rows.length){var lastRow=t.tBodies[0].rows[t.tBodies[0].rows.length-1];var np=continuedPageAfter(page,t);var nt=np.querySelector('table');nt.tBodies[0].appendChild(lastRow);}page=page.nextElementSibling;}}
  function cleanupEmptyPages(){pages(area()).forEach(function(p){if(!p.classList.contains('a4-scope-continued-page'))return;var t=p.querySelector('table.a4-scope-table');if(t&&t.tBodies[0].rows.length===0)p.remove();});}
  function tableFrom(btn){var bar=btn&&btn.closest&&btn.closest('.a4-row-control-bar');if(bar&&bar.previousElementSibling&&bar.previousElementSibling.tBodies)return bar.previousElementSibling;var current=document.activeElement&&document.activeElement.closest?document.activeElement.closest('table.a4-scope-table'):null;if(current)return current;var list=tables(root());return list.length?list[list.length-1]:null;}
  function addRow(btn){
    var t=tableFrom(btn);if(!t)return false;
    var h=labels(t),cols=h.length||(t.rows[0]?t.rows[0].cells.length:6)||6;
    var tr=t.tBodies[0].insertRow(-1);
    for(var i=0;i<cols;i++){
      var td=tr.insertCell(-1);
      td.textContent=isStatus(h[i],i)?'Pending':'';
      prepCell(td,i,h);
    }
    // ✅ Automatic page break detection and pagination
    var page=t.closest('.a4-page');
    if(page){
      var content=page.querySelector('.a4-content');
      if(content){
        // Check if content overflows the page height
        setTimeout(function(){
          if(content.scrollHeight>content.clientHeight+2){
            paginateFrom(t);
            cleanupEmptyPages();
          }
          addBars(root());
          updateFooters();
          syncRows();
        },50);
      }
    }else{
      addBars(root());
      updateFooters();
      syncRows();
    }
    var focusCell=tr.cells[1]||tr.cells[0];
    if(focusCell&&focusCell.focus)setTimeout(function(){focusCell.focus();},0);
    return false;
  }
  function deleteRow(btn){var tr=btn&&btn.closest&&btn.closest('tr'),t=tr&&tr.closest('table');if(tr)tr.remove();cleanupEmptyPages();if(t)applyWidths(t);addBars(root());updateFooters();syncRows();return false;}
  function syncRows(){var f=document.getElementById('fRows');if(!f)return;var out=[];tables(document.getElementById('a4Preview')||root()).forEach(function(t){var h=labels(t);[].slice.call(t.tBodies[0].rows).forEach(function(tr){var o={};[].slice.call(tr.cells).forEach(function(td,i){o[key(h[i],i)]=value(td,i);});out.push(o);});});try{f.value=JSON.stringify(out,null,2);}catch(e){}}
  function syncSoon(){clearTimeout(syncTimer);syncTimer=setTimeout(syncRows,80);}
  function updateFooters(){var a=area(),ps=pages(a),doc='Not issued';var input=document.getElementById('fDocumentNo');if(input&&input.value)doc=input.value;ps.forEach(function(p,i){var f=p.querySelector('.a4-page-footer');if(!f){f=document.createElement('div');f.className='a4-page-footer a4-no-print';f.style.textAlign='center';f.style.fontSize='10px';f.style.marginTop='2mm';p.appendChild(f);}f.innerHTML='<span>Document No.: '+esc(doc)+' | Page '+esc(String(i+1)+' / '+String(ps.length))+'</span>';});}
  function normalize(base){base=base||root();tables(base).forEach(prepTable);addBars(base);updateFooters();syncRows();}
  function patchRenderer(){var r=window.AETERLINK_A4_RENDERER;if(!r)return;r.addRow=function(btn){return addRow(btn);};r.deleteRow=function(btn){return deleteRow(btn);};r.deleteLastRow=function(btn){var t=tableFrom(btn);if(t&&t.tBodies[0].rows.length)t.tBodies[0].deleteRow(t.tBodies[0].rows.length-1);syncRows();return false;};r.table=function(columns,rows,cls){columns=(columns||[]).filter(function(c){return c.key!=='Action';});rows=rows||[];var html='<table class="'+esc(cls||'a4-scope-table')+'"><thead><tr>'+columns.map(function(c){return '<th>'+esc(c.label||c.key||'')+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(row){return '<tr>'+columns.map(function(c){var v=row&&row[c.key]!=null?row[c.key]:'';if(/^status$/i.test(String(c.key||c.label||'')))return '<td>'+statusHtml(v||'Pending')+'</td>';return '<td class="a4-editable" contenteditable="true" spellcheck="false">'+esc(v)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table><div class="a4-row-control-bar a4-no-print"><button type="button" class="a4-paged-add-row-btn">+ Add Row</button></div>';return html;};}
  function patchPreview(){if(patchDone||typeof window.previewCurrentForm!=='function'||window.previewCurrentForm.__a4PagedFinal)return;var old=window.previewCurrentForm;window.previewCurrentForm=function(){var ret=old.apply(this,arguments);setTimeout(function(){patchRenderer();normalize(document.getElementById('a4Preview')||root());tables(document.getElementById('a4Preview')||root()).slice(0,1).forEach(paginateFrom);},120);return ret;};window.previewCurrentForm.__a4PagedFinal=true;patchDone=true;}
  document.addEventListener('click',function(e){var a=e.target&&e.target.closest?e.target.closest('.a4-paged-add-row-btn'):null;if(a){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();addRow(a);return false;}var d=e.target&&e.target.closest?e.target.closest('.a4-row-paged-delete'):null;if(d){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();deleteRow(d);return false;}},true);
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table'))syncSoon();},true);
  document.addEventListener('change',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview table.a4-scope-table,#a4CheckOutput table.a4-scope-table'))syncSoon();},true);
  function boot(){patchRenderer();patchPreview();normalize(document.getElementById('a4Preview')||root());normalize(document.getElementById('a4CheckOutput')||root());}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,300);setTimeout(boot,1200);});window.addEventListener('load',function(){setTimeout(boot,300);setTimeout(boot,1200);});setTimeout(boot,600);setTimeout(boot,1800);
  window.AETERLINK_A4_ROW_PAGINATION_FINAL={run:normalize,addRow:addRow,deleteRow:deleteRow,syncRows:syncRows,paginateFrom:paginateFrom,applyWidths:applyWidths,cleanStatus:cleanStatus};
})();
</script>
