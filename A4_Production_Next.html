<!-- AETERLINK Documentation Module — A4_Production_Next.html -->
<!-- Safe production actions only. A4 table Add/Delete/Edit is handled only by A4_Row_Controls_Restore.html. -->
<style id="a4-production-next-style">
  #prodFieldPanel,.prod-field-panel,.prod-dyn-field,.prod-workflow-badge{display:none!important;}
  #a4Preview .row-actions,#a4Preview .prod-inline-editor,#a4Preview .prod-row-delete{display:none!important;visibility:hidden!important;}
  #a4Preview .a4-status-print{display:none!important;visibility:hidden!important;}
  #a4Preview [contenteditable="true"]{outline:0;cursor:text;}
  #a4Preview [contenteditable="true"]:focus{box-shadow:inset 0 0 0 1.5px #4aa3d8;background:#f8fdff;}
  @media print{.prod-inline-editor,.prod-row-delete,.prod-photo-report-toolbar,.a4-row-control-bar,.a4-row-delete-btn,.a4-no-print,.a4-preview-actions,.row-actions,.photo-actions{display:none!important;visibility:hidden!important}.a4-status-select{display:none!important;visibility:hidden!important}.a4-status-print{display:inline!important;visibility:visible!important}}
</style>
<script id="a4-production-next-script">
(function(){
  if(window.__AETERLINK_PRODUCTION_NEXT_ACTIONS_ONLY_V8__) return;
  window.__AETERLINK_PRODUCTION_NEXT_ACTIONS_ONLY_V8__=true;

  var state={recordId:'',documentNo:''};
  var bootTimer=null, bootTries=0;
  function byId(id){return document.getElementById(id);}
  function area(){return byId('a4Preview')||document;}
  function printArea(){return area().querySelector('#a4PrintArea')||area().querySelector('.a4-print-area')||document.querySelector('.a4-print-area')||null;}
  function msg(t){var e=byId('prodStatusMsg')||byId('saveStatus');if(e)e.textContent=t;}
  function code(){return (byId('fTemplate')&&byId('fTemplate').value)||(byId('prodDocType')&&byId('prodDocType').value)||'PJ-WCR-001';}
  function esc(v){return String(v==null?'':v).replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c];});}
  function cleanStatus(v){
    v=String(v==null?'':v).trim();
    var names=['Done','Pending','Not Started','In Progress','Issue','N/A','Open','Closed','Issued','Draft','Approved','Submitted','-'];
    var c=v.replace(/\s+/g,'').toLowerCase();
    for(var i=0;i<names.length;i++){var n=names[i],nc=n.replace(/\s+/g,'').toLowerCase();if(c===nc||c===nc+nc||c.indexOf(nc+nc)===0)return n;}
    return v;
  }
  function stripDeleteMarker(v){return String(v==null?'':v).replace(/^[\s×✕✖xX*•\-]+/,'').trim();}
  function removeNonPrintControls(root){
    root=root||document;
    root.querySelectorAll('.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-row-delete-btn,.row-actions,.photo-actions,.prod-inline-editor,.prod-row-delete,.prod-photo-report-toolbar,.a4-action-column,th.a4-action-column,td.a4-action-column').forEach(function(n){n.remove();});
    root.querySelectorAll('[contenteditable]').forEach(function(n){n.removeAttribute('contenteditable');n.removeAttribute('spellcheck');});
  }
  function convertStatusForPrint(root){
    root=root||document;
    root.querySelectorAll('td').forEach(function(td){
      var sel=td.querySelector('select.a4-status-select,select');
      if(sel){td.textContent=cleanStatus(sel.value||td.textContent||'');return;}
      td.querySelectorAll('.a4-status-print').forEach(function(sp){sp.remove();});
    });
  }
  function cleanFirstColumn(root){
    root=root||document;
    root.querySelectorAll('table.a4-scope-table tbody tr').forEach(function(tr){
      var td=tr.cells&&tr.cells[0]; if(!td)return;
      td.querySelectorAll('.a4-row-delete-btn,.prod-row-delete,button').forEach(function(n){n.remove();});
      var span=td.querySelector('.a4-row-item-value');
      td.textContent=stripDeleteMarker(span?span.textContent:td.textContent);
      td.style.textAlign='center';td.style.verticalAlign='middle';
    });
  }
  function syncRows(){
    if(window.AETERLINK_A4_ROW_CONTROLS&&AETERLINK_A4_ROW_CONTROLS.syncRows){try{AETERLINK_A4_ROW_CONTROLS.syncRows();}catch(e){}}
    else collectRowsFallback();
  }
  function collectRowsFallback(){
    var root=area();
    var tables=[].slice.call(root.querySelectorAll('table.a4-scope-table')).filter(function(t){return t.tBodies&&t.tBodies.length;});
    if(!tables.length)return null;
    var headers=[].map.call(tables[0].querySelectorAll('thead th'),function(th){return String(th.textContent||'').trim();});
    function key(label,index){var s=String(label||'').trim();if(/^item$/i.test(s))return'Item';if(/work\s*description/i.test(s)||/^description$/i.test(s))return'WorkDescription';if(/^qty\.?$/i.test(s))return'Qty';if(/^unit$/i.test(s))return'Unit';if(/^status$/i.test(s))return'Status';if(/^remarks?$/i.test(s))return'Remarks';return s?s.replace(/[^A-Za-z0-9]+/g,''):'Col'+index;}
    var rows=[];
    tables.forEach(function(table){[].forEach.call(table.tBodies[0].rows,function(tr){var obj={};[].forEach.call(tr.cells,function(td,i){var sel=td.querySelector('select');var span=td.querySelector('.a4-row-item-value');var v=sel?cleanStatus(sel.value||''):(span?span.textContent:td.textContent);if(i===0)v=stripDeleteMarker(v);obj[key(headers[i],i)]=String(v||'').trim();});rows.push(obj);});});
    var f=byId('fRows');if(f)try{f.value=JSON.stringify(rows,null,2);}catch(e){}
    return rows;
  }
  function buildPrintReadyHtml(){
    syncRows();
    var src=printArea(); if(!src)return '';
    var clone=src.cloneNode(true);
    removeNonPrintControls(clone);
    convertStatusForPrint(clone);
    cleanFirstColumn(clone);
    return clone.outerHTML;
  }
  function collectPrintCss(){
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent||'';}).join('\n');
    return styles+'\n.a4-no-print,.a4-preview-actions,.a4-row-control-bar,.a4-row-delete-btn,.prod-inline-editor,.prod-row-delete,.prod-photo-report-toolbar,.row-actions,.photo-actions{display:none!important;visibility:hidden!important}.a4-status-select{display:none!important;visibility:hidden!important}.a4-status-print{display:inline!important;visibility:visible!important}';
  }
  function saveAs(status){
    syncRows();
    if(!window.collectFormData){msg('Cannot save: form data collector is not available.');return;}
    var d=window.collectFormData();
    status=status||((byId('prodStatus')&&byId('prodStatus').value)||(byId('fStatus')&&byId('fStatus').value)||'Draft');
    if(byId('fStatus'))byId('fStatus').value=status;if(byId('prodStatus'))byId('prodStatus').value=status;
    var issued=status==='Issued';
    var p={FormRecordId:state.recordId,ProjectCode:d.ProjectCode,TemplateCode:code(),DocumentNo:d.DocumentNo||state.documentNo,RevisionNo:d.RevisionNo||'R00',Status:status,DocumentStatus:status,Data:d,RevisionReason:(byId('prodRevisionReason')&&byId('prodRevisionReason').value)||'',SubmittedAt:issued?new Date().toISOString():'',LockedAfterPdf:issued?'TRUE':'FALSE',Html:issued?buildPrintReadyHtml():'',Styles:issued?collectPrintCss():''};
    msg('Saving '+status+'...');
    google.script.run.withSuccessHandler(function(r){
      if(r&&r.record){
        state.recordId=r.record.FormRecordId||state.recordId;state.documentNo=r.record.DocumentNo||state.documentNo;
        if(byId('fDocumentNo'))byId('fDocumentNo').value=state.documentNo;if(byId('prodDocumentNo'))byId('prodDocumentNo').value=state.documentNo;
        var box=byId('prodDocNoBox');if(box)box.textContent=state.documentNo;var fr=byId('prodRecordIdBox');if(fr)fr.textContent=state.recordId;
        var link=r.fileUrl||(r.pdf&&r.pdf.fileUrl)||'';msg(status+' saved: '+state.documentNo+(link?' | PDF saved to Drive':''));
        if(window.refreshData)window.refreshData();if(window.previewCurrentForm)window.previewCurrentForm();
      }
    }).withFailureHandler(function(e){msg('Save failed: '+(e&&e.message?e.message:String(e)));}).apiModularSaveFormRecordV2(p);
  }
  function revision(){
    var r=(byId('prodRevisionReason')&&byId('prodRevisionReason').value||'').trim();if(!r){msg('Revision reason is required before starting revision.');return;}
    var e=byId('prodRevisionNo')||byId('fRevisionNo');var n=parseInt(String(e?e.value:'R00').replace(/\D/g,''),10);if(isNaN(n))n=0;var next='R'+('00'+(n+1)).slice(-2);
    if(byId('prodRevisionNo'))byId('prodRevisionNo').value=next;if(byId('fRevisionNo'))byId('fRevisionNo').value=next;state.recordId='';if(byId('prodStatus'))byId('prodStatus').value='Draft';if(byId('fStatus'))byId('fStatus').value='Draft';msg('Revision started: '+next);if(window.previewCurrentForm)window.previewCurrentForm();
  }
  function boot(){
    window.prodSaveDraft=function(){saveAs('Draft');};
    window.prodIssueSend=function(){saveAs('Issued');};
    window.prodStartRevision=revision;
    window.prodValidate=function(){msg('Validation passed: A4 preview is ready.');};
    window.saveCurrentForm=function(){saveAs((byId('prodStatus')&&byId('prodStatus').value)||(byId('fStatus')&&byId('fStatus').value)||'Draft');};
    window.AETERLINK_PROD_NEXT={savePreviewData:function(){saveAs('Draft');},richSave:saveAs,startRevision:revision,buildPrintReadyHtml:buildPrintReadyHtml,collectPrintCss:collectPrintCss,collectRowsFallback:collectRowsFallback};
    bootTries++; if(bootTries<3) scheduleBoot(700);
  }
  function scheduleBoot(delay){clearTimeout(bootTimer);bootTimer=setTimeout(boot,delay==null?0:delay);}
  document.addEventListener('DOMContentLoaded',function(){scheduleBoot(0);});
  window.addEventListener('load',function(){scheduleBoot(0);});
  scheduleBoot(250);
})();
</script>
