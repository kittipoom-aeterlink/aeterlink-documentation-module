<!-- AETERLINK Documentation Module — A4_Production_Next.html -->
<style>
  #prodFieldPanel,.prod-field-panel,.prod-dyn-field,.prod-workflow-badge{display:none!important;}
  #a4Preview .row-actions,#a4Preview .a4-preview-actions:not(.prod-inline-editor){display:none!important;}
  .prod-inline-editor{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 0;}
  .prod-inline-editor button{border:1px solid var(--aeterlink-line);background:#fff;border-radius:9px;padding:6px 9px;cursor:pointer;font-size:12px;}
  .prod-inline-editor button.primary{background:var(--aeterlink-primary);border-color:var(--aeterlink-primary);color:#fff;font-weight:800;}
  #a4Preview [contenteditable="true"]{outline:0;cursor:text;}
  #a4Preview [contenteditable="true"]:focus{box-shadow:inset 0 0 0 1.5px #4aa3d8;background:#f8fdff;}
  #a4Preview .a4-scope-table{table-layout:fixed!important;width:100%!important;border-collapse:separate!important;border-spacing:0!important;}
  #a4Preview .a4-scope-table th,#a4Preview .a4-scope-table td{border:0!important;border-right:.18mm solid #666!important;border-bottom:.18mm solid #666!important;box-shadow:none!important;}
  #a4Preview .a4-scope-table thead tr:first-child>*{border-top:.18mm solid #666!important;}
  #a4Preview .a4-scope-table tr>*:first-child{border-left:.18mm solid #666!important;}
  #a4Preview .a4-scope-table tr>*:last-child{border-right:.18mm solid #666!important;}
  #a4Preview .a4-scope-table tbody tr:last-child>*{border-bottom:.18mm solid #666!important;}
</style>
<script>
(function(){
  var state={recordId:'',documentNo:''};
  function byId(id){return document.getElementById(id);}
  function area(){return byId('a4Preview')||document;}
  function msg(t){var e=byId('prodStatusMsg')||byId('saveStatus'); if(e)e.textContent=t;}
  function code(){return (byId('fTemplate')&&byId('fTemplate').value)||(byId('prodDocType')&&byId('prodDocType').value)||'PJ-WCR-001';}
  function removeFieldPanel(){document.querySelectorAll('#prodFieldPanel,.prod-field-panel').forEach(function(n){n.remove();});}
  function normalize(){
    removeFieldPanel();
    area().querySelectorAll('.row-actions,.a4-preview-actions:not(.prod-inline-editor)').forEach(function(n){n.style.display='none';});
    var bars=[].slice.call(area().querySelectorAll('.prod-inline-editor')); bars.forEach(function(b,i){if(i>0)b.remove();});
    area().querySelectorAll('table.a4-scope-table').forEach(function(t){
      t.style.borderCollapse='separate';t.style.borderSpacing='0';t.style.tableLayout='fixed';t.style.width='100%';
      t.querySelectorAll('th,td').forEach(function(c){c.style.border='0';c.style.borderRight='.18mm solid #666';c.style.borderBottom='.18mm solid #666';c.style.boxShadow='none';});
      t.querySelectorAll('thead tr:first-child>*').forEach(function(c){c.style.borderTop='.18mm solid #666';});
      t.querySelectorAll('tr>*:first-child').forEach(function(c){c.style.borderLeft='.18mm solid #666';});
      t.querySelectorAll('tr>*:last-child').forEach(function(c){c.style.borderRight='.18mm solid #666';});
      t.querySelectorAll('tbody tr:last-child>*').forEach(function(c){c.style.borderBottom='.18mm solid #666';});
    });
  }
  function rows(){
    var t=area().querySelector('table.a4-scope-table'); if(!t||!t.tBodies[0])return null;
    var h=[].map.call(t.querySelectorAll('thead th'),function(x){return x.textContent.trim();});
    return [].map.call(t.tBodies[0].rows,function(tr){var o={};[].forEach.call(tr.cells,function(td,i){var k=(h[i]||('Col'+i)).replace(/\s+/g,'').replace('Description','WorkDescription').replace('Qty.','Qty').replace('Remark','Remarks');var s=td.querySelector('select');o[k]=s?s.value:td.textContent.trim();});return o;});
  }
  function syncRows(){var r=rows(); if(r&&byId('fRows'))byId('fRows').value=JSON.stringify(r,null,2);}
  function editable(){
    removeFieldPanel();
    area().querySelectorAll('.a4-project-grid td,.a4-info-table td,.a4-meta-row span,.a4-title,.a4-subtitle,table.a4-scope-table td').forEach(function(el){if(el.querySelector('select,button,img'))return;el.contentEditable='true';el.spellcheck=false;});
    var t=area().querySelector('table.a4-scope-table');
    if(t&&!area().querySelector('.prod-inline-editor')){var bar=document.createElement('div');bar.className='prod-inline-editor a4-no-print';bar.innerHTML='<button type="button" onclick="AETERLINK_PROD_NEXT.addPreviewRow()">+ Add Row</button><button type="button" onclick="AETERLINK_PROD_NEXT.deletePreviewRow()">- Delete Last Row</button><button type="button" class="primary" onclick="AETERLINK_PROD_NEXT.savePreviewData()">Save Preview Data</button>';t.parentNode.insertBefore(bar,t.nextSibling);}
    normalize();
  }
  function addRow(){var t=area().querySelector('table.a4-scope-table');if(!t||!t.tBodies[0])return;var h=[].map.call(t.querySelectorAll('thead th'),function(x){return x.textContent.trim();});if(!h.length)h=['Package','Item','Work Description','Qty.','Unit','Status','Remarks'];var tr=t.tBodies[0].insertRow(-1);h.forEach(function(x){var td=tr.insertCell(-1);if(/status/i.test(x)){td.innerHTML='<select class="a4-status-select"><option></option><option>Not Started</option><option>In Progress</option><option selected>Pending</option><option>Done</option><option>Issue</option><option>N/A</option></select><span class="a4-status-print">Pending</span>';}else{td.textContent=/package/i.test(x)?'Step 1':'';td.contentEditable='true';}});syncRows();setTimeout(function(){editable();if(window.AETERLINK_REPAGINATE_A4)window.AETERLINK_REPAGINATE_A4();},80);}
  function delRow(){var t=area().querySelector('table.a4-scope-table');if(t&&t.tBodies[0]&&t.tBodies[0].rows.length)t.tBodies[0].deleteRow(t.tBodies[0].rows.length-1);syncRows();if(window.AETERLINK_REPAGINATE_A4)window.AETERLINK_REPAGINATE_A4();normalize();}
  function saveAs(status){syncRows();if(!window.collectFormData)return msg('Cannot save: form data collector is not available.');var d=window.collectFormData();status=status||((byId('prodStatus')&&byId('prodStatus').value)||(byId('fStatus')&&byId('fStatus').value)||'Draft');if(byId('fStatus'))byId('fStatus').value=status;if(byId('prodStatus'))byId('prodStatus').value=status;var p={FormRecordId:state.recordId,ProjectCode:d.ProjectCode,TemplateCode:code(),DocumentNo:d.DocumentNo||state.documentNo,RevisionNo:d.RevisionNo||'R00',Status:status,DocumentStatus:status,Data:d,RevisionReason:(byId('prodRevisionReason')&&byId('prodRevisionReason').value)||'',SubmittedAt:status==='Issued'?new Date().toISOString():'',LockedAfterPdf:status==='Issued'?'TRUE':'FALSE'};msg('Saving '+status+'...');google.script.run.withSuccessHandler(function(r){if(r&&r.record){state.recordId=r.record.FormRecordId||state.recordId;state.documentNo=r.record.DocumentNo||state.documentNo;if(byId('fDocumentNo'))byId('fDocumentNo').value=state.documentNo;if(byId('prodDocumentNo'))byId('prodDocumentNo').value=state.documentNo;var box=byId('prodDocNoBox');if(box)box.textContent=state.documentNo;var fr=byId('prodRecordIdBox');if(fr)fr.textContent=state.recordId;msg(status+' saved: '+state.documentNo);if(window.refreshData)window.refreshData();if(window.previewCurrentForm)window.previewCurrentForm();}}).withFailureHandler(function(e){msg('Save failed: '+(e&&e.message?e.message:String(e)));}).apiModularSaveFormRecord(p);}
  function revision(){var r=(byId('prodRevisionReason')&&byId('prodRevisionReason').value||'').trim();if(!r){msg('Revision reason is required before starting revision.');return;}var e=byId('prodRevisionNo')||byId('fRevisionNo');var n=parseInt(String(e?e.value:'R00').replace(/\D/g,''),10);if(isNaN(n))n=0;var next='R'+('00'+(n+1)).slice(-2);if(byId('prodRevisionNo'))byId('prodRevisionNo').value=next;if(byId('fRevisionNo'))byId('fRevisionNo').value=next;state.recordId='';if(byId('prodStatus'))byId('prodStatus').value='Draft';if(byId('fStatus'))byId('fStatus').value='Draft';msg('Revision started: '+next);if(window.previewCurrentForm)window.previewCurrentForm();}
  function patch(){if(window.previewCurrentForm&&!window.previewCurrentForm.__a4ProdOriginalInput){var old=window.previewCurrentForm;window.previewCurrentForm=function(){removeFieldPanel();var r=old.apply(this,arguments);setTimeout(editable,150);setTimeout(normalize,280);return r;};window.previewCurrentForm.__a4ProdOriginalInput=true;}window.prodSaveDraft=function(){saveAs('Draft');};window.prodIssueSend=function(){saveAs('Issued');};window.prodStartRevision=revision;window.prodValidate=function(){msg('Validation passed: original workflow form and A4 preview are ready.');};window.saveCurrentForm=function(){saveAs((byId('prodStatus')&&byId('prodStatus').value)||(byId('fStatus')&&byId('fStatus').value)||'Draft');};}
  function boot(){patch();removeFieldPanel();editable();normalize();}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,300);setTimeout(boot,1000);});
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview')){syncRows();normalize();}});
  document.addEventListener('change',function(e){if(e.target&&e.target.closest&&e.target.closest('#a4Preview')){syncRows();normalize();}});
  var timer=setInterval(boot,900);setTimeout(function(){clearInterval(timer);boot();},9000);
  window.AETERLINK_PROD_NEXT={addPreviewRow:addRow,deletePreviewRow:delRow,savePreviewData:function(){saveAs('Draft');},makePreviewEditable:editable,normalizeBorders:normalize,richSave:saveAs,startRevision:revision};
})();
</script>
