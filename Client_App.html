<!--
  AETERLINK Documentation Module — Client_App.html
  Client-side JavaScript partial for modular Index.html refactor.
-->
<script>
(function () {
  var client = window.AETERLINK_CLIENT = window.AETERLINK_CLIENT || {};
  client.version = 'CLIENT_APP_MODULAR_2026_05_08_R05';
  client.buildTimestamp = new Date().toISOString();

  client.lifecycleStages = [
    { key: 'All', label: 'All documents' },
    { key: '01_INITIATION', label: '1. Project Start / Sales Handover' },
    { key: '02_PLANNING', label: '2. Project Planning / Control' },
    { key: '03_DESIGN', label: '3. Design / Engineering / Approval Documents' },
    { key: '04_PROCUREMENT', label: '4. Procurement / Material' },
    { key: '05_CONSTRUCTION', label: '5. Construction / Installation' },
    { key: '06_TESTING', label: '6. Testing / Commissioning' },
    { key: '07_HANDOVER', label: '7. Handover / Closeout' },
    { key: '08_WARRANTY', label: '8. Warranty / DLP / Post-handover' }
  ];

  client.lifecycleLabels = client.lifecycleStages.reduce(function (map, stage) {
    map[stage.key] = stage.label;
    return map;
  }, {});
  client.lifecycleHint = 'Used to group documents by project lifecycle: initiation → planning → design → procurement → installation → testing → handover → Warranty/DLP';
  client.lifecycleLabel = function (key) { return client.lifecycleLabels[key] || key || ''; };
  client.setBuildBadge = function (buildInfo) {
    var badge = document.getElementById('versionBadge');
    if (!badge) return;
    var info = buildInfo || {};
    badge.textContent = (info.appVersion || client.version) + ' - ' + (info.buildTimestamp || client.buildTimestamp);
  };
  client.loadBuildInfo = function () {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      client.setBuildBadge();
      return;
    }
    google.script.run.withSuccessHandler(function (info) {
      client.setBuildBadge(info);
    }).withFailureHandler(function () {
      client.setBuildBadge();
    }).apiBuildInfo();
  };
  client.debugInfo = function () {
    return { version: client.version, buildTimestamp: client.buildTimestamp, href: window.location.href };
  };

  function el(tag, attrs, text) {
    var node = document.createElement(tag);
    attrs = attrs || {};
    Object.keys(attrs).forEach(function (key) {
      if (key === 'className') node.className = attrs[key];
      else if (key === 'style') node.setAttribute('style', attrs[key]);
      else node.setAttribute(key, attrs[key]);
    });
    if (text !== undefined) node.textContent = text;
    return node;
  }

  client.editor = {
    getActiveTemplate: function () {
      var input = document.getElementById('fTemplate');
      return input && input.value === 'PJ-EQUIP-CHK-001' ? 'CHECKLIST' : 'WCR';
    },
    parseRows: function () {
      var input = document.getElementById('fRows');
      if (!input) return [];
      try { return JSON.parse(input.value || '[]'); }
      catch (err) { alert('Rows JSON is invalid: ' + err.message); return []; }
    },
    setRows: function (rows) {
      var input = document.getElementById('fRows');
      if (input) input.value = JSON.stringify(rows || [], null, 2);
    },
    defaultRow: function () {
      if (this.getActiveTemplate() === 'CHECKLIST') {
        return { No: '', EquipmentTag: '', Description: '', Location: '', CheckItem: '', Status: 'Pending', Remark: '' };
      }
      return { Package: 'Step 1', Item: '', WorkDescription: '', Qty: '', Unit: '', Status: 'Pending', Remarks: '', Action: '' };
    },
    addRow: function () {
      var rows = this.parseRows();
      var row = this.defaultRow();
      if (this.getActiveTemplate() === 'CHECKLIST') row.No = String(rows.length + 1);
      rows.push(row);
      this.setRows(rows);
      if (typeof previewCurrentForm === 'function') previewCurrentForm();
    },
    deleteLastRow: function () {
      var rows = this.parseRows();
      if (!rows.length) return;
      rows.pop();
      this.setRows(rows);
      if (typeof previewCurrentForm === 'function') previewCurrentForm();
    },
    injectControls: function () {
      var rows = document.getElementById('fRows');
      if (!rows || document.getElementById('modExtraEditorControls')) return;
      var holder = el('div', { id: 'modExtraEditorControls', style: 'margin:8px 0 12px;' });
      var actionRow = el('div', { className: 'mod-actions', style: 'margin-bottom:8px;' });
      var addRowBtn = el('button', { type: 'button', className: 'mod-btn' }, '+ Add Row');
      addRowBtn.addEventListener('click', this.addRow.bind(this));
      var deleteRowBtn = el('button', { type: 'button', className: 'mod-btn' }, '- Delete Last Row');
      deleteRowBtn.addEventListener('click', this.deleteLastRow.bind(this));
      actionRow.appendChild(addRowBtn);
      actionRow.appendChild(deleteRowBtn);

      var infoPanel = el('div', { style: 'border:1px solid var(--aeterlink-line);border-radius:12px;padding:10px;background:#f7fbfd;margin-bottom:10px;' });
      infoPanel.innerHTML = '<b style="color:#17395d;">Document Information</b><div class="form-grid" style="margin-top:8px;"><label>Contract No.<input id="fContractNo" value="-"></label><label>Purchase Order No.<input id="fPurchaseOrderNo" value="-"></label><label>Work Type<input id="fWorkType" value="Equipment Purchasing / Installation / Implementation / BMS"></label><label>Completion Date<input id="fCompletionDate" value="30 April 2026"></label><label style="grid-column:span 2;">Reference Documents<input id="fReferenceDocuments" value="Equipment Checklist / Work Completion Evidence"></label><label style="grid-column:span 2;">Remarks / Additional Notes<input id="fRemarks" value="Work completion data and photo evidence imported from the uploaded Work Completion Report workbook."></label></div>';

      holder.appendChild(actionRow);
      holder.appendChild(infoPanel);
      rows.parentNode.insertBefore(holder, rows.nextSibling);
    },
    patchCollectFormData: function () {
      if (window.__aeterlinkCollectPatched || typeof collectFormData !== 'function') return;
      window.__aeterlinkCollectPatched = true;
      var original = collectFormData;
      window.collectFormData = function () {
        var data = original();
        ['ContractNo', 'PurchaseOrderNo', 'WorkType', 'CompletionDate', 'ReferenceDocuments', 'Remarks'].forEach(function (key) {
          var input = document.getElementById('f' + key);
          if (input) data[key] = input.value;
        });
        return data;
      };
    },
    patchTemplateLoad: function () {
      if (window.__aeterlinkLoadPatched || typeof loadSampleForTemplate !== 'function') return;
      window.__aeterlinkLoadPatched = true;
      var original = loadSampleForTemplate;
      window.loadSampleForTemplate = function () {
        original();
        var data = typeof sampleData === 'function' ? sampleData() : {};
        var map = { fContractNo: 'ContractNo', fPurchaseOrderNo: 'PurchaseOrderNo', fWorkType: 'WorkType', fCompletionDate: 'CompletionDate', fReferenceDocuments: 'ReferenceDocuments', fRemarks: 'Remarks' };
        Object.keys(map).forEach(function (id) {
          var input = document.getElementById(id);
          if (input) input.value = data[map[id]] || input.value || '';
        });
      };
    },
    boot: function () {
      this.injectControls();
      this.patchCollectFormData();
      this.patchTemplateLoad();
    }
  };

  document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () { if (client.editor) client.editor.boot(); }, 250);
  });
})();
</script>
