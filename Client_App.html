<script>
(function () {
  var client = window.AETERLINK_CLIENT = window.AETERLINK_CLIENT || {};
  client.version = 'CLIENT_APP_MODULAR_2026_05_08_R06_PHOTO_REPORT';
  client.buildTimestamp = new Date().toISOString();

  client.lifecycleStages = [
    { key: 'All', label: 'All documents' },
    { key: '01_INITIATION', label: '1. Project Start / Sales Handover' },
    { key: '02_PLANNING', label: '2. Project Planning / Control' },
    { key: '03_DESIGN', label: '3. Design / Engineering / Approval Documents' },
    { key: '04_PROCUREMENT', label: '4. Procurement / Material' },
    { key: '05_CONSTRUCTION', label: '5. Construction / Installation' },
    { key: '06_TESTING', label: '6. Testing / Commissioning' },
    { key: '07_HANDOVER', label: '7. Handover / Closeout' },
    { key: '08_WARRANTY', label: '8. Warranty / DLP / Post-handover' }
  ];

  client.lifecycleLabels = client.lifecycleStages.reduce(function (map, stage) { map[stage.key] = stage.label; return map; }, {});
  client.lifecycleHint = 'Used to group documents by project lifecycle: initiation → planning → design → procurement → installation → testing → handover → Warranty/DLP';
  client.lifecycleLabel = function (key) { return client.lifecycleLabels[key] || key || ''; };
  client.setBuildBadge = function (buildInfo) { var badge = document.getElementById('versionBadge'); if (!badge) return; var info = buildInfo || {}; badge.textContent = (info.appVersion || client.version) + ' - ' + (info.buildTimestamp || client.buildTimestamp); };
  client.loadBuildInfo = function () { if (typeof google === 'undefined' || !google.script || !google.script.run) { client.setBuildBadge(); return; } google.script.run.withSuccessHandler(function (info) { client.setBuildBadge(info); }).withFailureHandler(function () { client.setBuildBadge(); }).apiBuildInfo(); };
  client.debugInfo = function () { return { version: client.version, buildTimestamp: client.buildTimestamp, href: window.location.href }; };

  function el(tag, attrs, text) { var node = document.createElement(tag); attrs = attrs || {}; Object.keys(attrs).forEach(function (key) { if (key === 'className') node.className = attrs[key]; else if (key === 'style') node.setAttribute('style', attrs[key]); else node.setAttribute(key, attrs[key]); }); if (text !== undefined) node.textContent = text; return node; }

  client.editor = {
    getActiveTemplate: function () { var input = document.getElementById('fTemplate'); return input && input.value === 'PJ-EQUIP-CHK-001' ? 'CHECKLIST' : 'WCR'; },
    parseRows: function () { var input = document.getElementById('fRows'); if (!input) return []; try { return JSON.parse(input.value || '[]'); } catch (err) { alert('Rows JSON is invalid: ' + err.message); return []; } },
    setRows: function (rows) { var input = document.getElementById('fRows'); if (input) input.value = JSON.stringify(rows || [], null, 2); },
    defaultRow: function () { if (this.getActiveTemplate() === 'CHECKLIST') return { No: '', EquipmentTag: '', Description: '', Location: '', CheckItem: '', Status: 'Pending', Remark: '' }; return { Package: 'Step 1', Item: '', WorkDescription: '', Qty: '', Unit: '', Status: 'Pending', Remarks: '', Action: '' }; },
    addRow: function () { var rows = this.parseRows(); var row = this.defaultRow(); if (this.getActiveTemplate() === 'CHECKLIST') row.No = String(rows.length + 1); rows.push(row); this.setRows(rows); if (typeof previewCurrentForm === 'function') previewCurrentForm(); },
    deleteLastRow: function () { var rows = this.parseRows(); if (!rows.length) return; rows.pop(); this.setRows(rows); if (typeof previewCurrentForm === 'function') previewCurrentForm(); },
    injectControls: function () {
      var rows = document.getElementById('fRows'); if (!rows || document.getElementById('modExtraEditorControls')) return;
      var holder = el('div', { id: 'modExtraEditorControls', style: 'margin:8px 0 12px;' });
      var actionRow = el('div', { className: 'mod-actions', style: 'margin-bottom:8px;' });
      var addRowBtn = el('button', { type: 'button', className: 'mod-btn' }, '+ Add Row'); addRowBtn.addEventListener('click', this.addRow.bind(this));
      var deleteRowBtn = el('button', { type: 'button', className: 'mod-btn' }, '- Delete Last Row'); deleteRowBtn.addEventListener('click', this.deleteLastRow.bind(this));
      actionRow.appendChild(addRowBtn); actionRow.appendChild(deleteRowBtn);
      var infoPanel = el('div', { style: 'border:1px solid var(--aeterlink-line);border-radius:12px;padding:10px;background:#f7fbfd;margin-bottom:10px;' });
      infoPanel.innerHTML = '<b style="color:#17395d;">Document Information</b><div class="form-grid" style="margin-top:8px;"><label>Contract No.<input id="fContractNo" value="-"></label><label>Purchase Order No.<input id="fPurchaseOrderNo" value="-"></label><label>Work Type<input id="fWorkType" value="Equipment Purchasing / Installation / Implementation / BMS"></label><label>Completion Date<input id="fCompletionDate" value="30 April 2026"></label><label style="grid-column:span 2;">Reference Documents<input id="fReferenceDocuments" value="Equipment Checklist / Work Completion Evidence"></label><label style="grid-column:span 2;">Remarks / Additional Notes<input id="fRemarks" value="Work completion data and photo evidence imported from the uploaded Work Completion Report workbook."></label></div>';
      holder.appendChild(actionRow); holder.appendChild(infoPanel); rows.parentNode.insertBefore(holder, rows.nextSibling);
    },
    patchCollectFormData: function () {
      if (window.__aeterlinkCollectPatched || typeof collectFormData !== 'function') return;
      window.__aeterlinkCollectPatched = true;
      var original = collectFormData;
      window.collectFormData = function () { var data = original(); ['ContractNo', 'PurchaseOrderNo', 'WorkType', 'CompletionDate', 'ReferenceDocuments', 'Remarks'].forEach(function (key) { var input = document.getElementById('f' + key); if (input) data[key] = input.value; }); return data; };
    },
    patchTemplateLoad: function () {
      if (window.__aeterlinkLoadPatched || typeof loadSampleForTemplate !== 'function') return;
      window.__aeterlinkLoadPatched = true;
      var original = loadSampleForTemplate;
      window.loadSampleForTemplate = function () { original(); var data = typeof sampleData === 'function' ? sampleData() : {}; var map = { fContractNo: 'ContractNo', fPurchaseOrderNo: 'PurchaseOrderNo', fWorkType: 'WorkType', fCompletionDate: 'CompletionDate', fReferenceDocuments: 'ReferenceDocuments', fRemarks: 'Remarks' }; Object.keys(map).forEach(function (id) { var input = document.getElementById(id); if (input) input.value = data[map[id]] || input.value || ''; }); };
    },
    boot: function () { this.injectControls(); this.patchCollectFormData(); this.patchTemplateLoad(); }
  };

  document.addEventListener('DOMContentLoaded', function () { setTimeout(function () { if (client.editor) client.editor.boot(); }, 250); });
})();
</script>
<style>
.prod-photo-report-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px auto 10px;max-width:210mm;box-sizing:border-box;background:#fff;border:1px solid var(--aeterlink-line,#d8e5ec);border-radius:10px;padding:8px 10px;color:#35576d;font-size:12px}.prod-photo-report-toolbar button{border:1px solid #adc3d2;background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:800;color:#07385b;cursor:pointer}.prod-photo-report-toolbar button.primary{background:#0f4268;color:#fff;border-color:#0f4268}.prod-photo-report-toolbar span{color:#6b7f90;font-weight:700}@media print{.prod-photo-report-toolbar{display:none!important}}
</style>
<script>
(function(){
  var state={userRemovedAll:false,lastTemplate:''};
  function byId(id){return document.getElementById(id)}
  function r(){return window.AETERLINK_A4_RENDERER}
  function wrap(){return byId('a4Preview')||document}
  function area(){return wrap().querySelector('#a4PrintArea')||wrap().querySelector('.a4-print-area')||wrap()}
  function pages(){return [].slice.call(area().querySelectorAll('.a4-page')).filter(function(p){return p.querySelector('.a4-photo-grid')})}
  function firstPage(){return area().querySelector('.a4-page')}
  function text(e){return String(e?e.textContent||'':'').trim()}
  function empty(){return {PhotoUrl:'',ItemNo:'',Description:'',Caption:'',Note:''}}
  function collect(){var out=[];pages().forEach(function(p){[].slice.call(p.querySelectorAll('.a4-photo-block')).forEach(function(b){var img=b.querySelector('.a4-photo-box img'),fs=b.querySelectorAll('.a4-photo-field-box,.a4-photo-text');var item=text(fs[0]),desc=text(fs[1]),note=text(fs[2]),url=img?img.getAttribute('src')||'':'';if(url||item||desc||note)out.push({PhotoUrl:url,ItemNo:item,Description:desc,Caption:desc,Note:note});});});return out}
  function makePage(photos){var base=firstPage(),page=document.createElement('div'),inner=document.createElement('div'),content=document.createElement('div'),box=document.createElement('div');page.className='a4-page';inner.className='a4-page-inner';content.className='a4-content';['.a4-header','.a4-project-grid'].forEach(function(sel){var n=base&&base.querySelector(sel);if(n)inner.appendChild(n.cloneNode(true));});box.innerHTML=r().section('PHOTO REPORT')+r().photoGrid((photos&&photos.length)?photos:[empty(),empty()]);while(box.firstChild)content.appendChild(box.firstChild);inner.appendChild(content);var f=base&&base.querySelector('.a4-footer');if(f)inner.appendChild(f.cloneNode(true));page.appendChild(inner);return page}
  function insert(photos){var target=pages().pop()||firstPage();if(!target||!target.parentNode)return;target.parentNode.insertBefore(makePage(photos),target.nextSibling);normalize()}
  function toolbar(){var a=byId('a4Preview');if(!a)return;var tb=byId('prodPhotoReportToolbar');if(tb)return tb;tb=document.createElement('div');tb.id='prodPhotoReportToolbar';tb.className='prod-photo-report-toolbar a4-no-print';tb.innerHTML='<button type="button" class="primary" onclick="AETERLINK_PHOTO_REPORT.addPhotoReport()">+ Add Photo Report / Photo</button><span id="prodPhotoReportHint">Photo report is available for every document.</span>';a.parentNode.insertBefore(tb,a);return tb}
  function hint(){toolbar();var h=byId('prodPhotoReportHint');if(h)h.textContent=pages().length?('PHOTO REPORT active: '+area().querySelectorAll('.a4-photo-block').length+' photo slot(s). Delete all photos to remove the sheet.'):('No PHOTO REPORT sheet. Click button to add a PHOTO REPORT sheet again.')}
  function renumber(){var i=1;pages().forEach(function(p){[].slice.call(p.querySelectorAll('.a4-photo-block')).forEach(function(b){var box=b.querySelector('.a4-photo-box');if(box&&!box.querySelector('img')&&(/^Photo\s*\d*$/i.test(text(box))||!text(box)))box.textContent='Photo '+i;i++;});});}
  function normalize(){pages().forEach(function(p){if(!p.querySelector('.a4-photo-block'))p.remove()});renumber();hint();}
  function ensure(){var tpl=(byId('fTemplate')&&byId('fTemplate').value)||(byId('prodDocType')&&byId('prodDocType').value)||'';if(tpl!==state.lastTemplate){state.lastTemplate=tpl;state.userRemovedAll=false}if(!state.userRemovedAll&&!pages().length&&firstPage())insert([empty(),empty()]);else normalize()}
  function add(){state.userRemovedAll=false;var ps=pages();if(!ps.length){insert([empty()]);return}var grid=ps[ps.length-1].querySelector('.a4-photo-grid'),count=grid?grid.querySelectorAll('.a4-photo-block').length:0;if(grid&&count<2){var t=document.createElement('div');t.innerHTML=r().photoBlock(empty(),count);grid.appendChild(t.firstChild);normalize()}else insert([empty()])}
  function patchRenderer(){if(!r()||r().__photoManagerPatched)return;var oldDel=r().deletePhotoBlock;r().deletePhotoBlock=function(btn){var b=btn&&btn.closest?btn.closest('.a4-photo-block'):null;if(b&&b.parentNode)b.parentNode.removeChild(b);else if(oldDel)oldDel.apply(r(),arguments);pages().forEach(function(p){if(!p.querySelector('.a4-photo-block'))p.remove()});if(!pages().length)state.userRemovedAll=true;normalize()};var oldAdd=r().addPhotoBlock;r().addPhotoBlock=function(btn){state.userRemovedAll=false;var actions=btn&&btn.closest?btn.closest('.a4-preview-actions'):null,grid=actions?actions.previousElementSibling:null;if(!grid||!grid.classList.contains('a4-photo-grid')){add();return}var count=grid.querySelectorAll('.a4-photo-block').length;if(count<2){var t=document.createElement('div');t.innerHTML=r().photoBlock(empty(),count);grid.appendChild(t.firstChild);normalize()}else insert([empty()])};r().__photoManagerPatched=true}
  function patchCollect(){if(!window.collectFormData||window.collectFormData.__photoPatch)return;var old=window.collectFormData;window.collectFormData=function(){var d=old.apply(this,arguments);d.Photos=collect();return d};window.collectFormData.__photoPatch=true}
  function patchPreview(){if(!window.previewCurrentForm||window.previewCurrentForm.__photoPatch)return;var old=window.previewCurrentForm;window.previewCurrentForm=function(){var before=collect(),had=pages().length>0;var ret=old.apply(this,arguments);setTimeout(function(){if(had&&before.length){pages().forEach(function(p){p.remove()});for(var i=0;i<before.length;i+=2)insert(before.slice(i,i+2))}ensure()},180);return ret};window.previewCurrentForm.__photoPatch=true}
  function boot(){patchRenderer();patchCollect();patchPreview();toolbar();setTimeout(ensure,260)}
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,900);setTimeout(boot,1800)});var tm=setInterval(boot,1200);setTimeout(function(){clearInterval(tm);boot()},12000);
  window.AETERLINK_PHOTO_REPORT={addPhotoReport:add,collectPhotos:collect,normalize:normalize,ensureDefault:ensure,removeAll:function(){pages().forEach(function(p){p.remove()});state.userRemovedAll=true;normalize()}};
})();
</script>
