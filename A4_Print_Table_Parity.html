<!-- AETERLINK Documentation Module — A4_Print_Table_Parity.html -->
<style>
  :root{--a4-grid-line:.18mm;--a4-grid-color:#666;}

  /* Final border model: one line only. Prevent double-thick lines and restore the full Remarks right edge. */
  .a4-page table.a4-scope-table{
    width:100%!important;
    max-width:100%!important;
    table-layout:fixed!important;
    border-collapse:separate!important;
    border-spacing:0!important;
    border:0!important;
    outline:0!important;
    box-shadow:
      inset 0 var(--a4-grid-line) 0 var(--a4-grid-color),
      inset var(--a4-grid-line) 0 0 var(--a4-grid-color),
      inset calc(-1 * var(--a4-grid-line)) 0 0 var(--a4-grid-color),
      inset 0 calc(-1 * var(--a4-grid-line)) 0 var(--a4-grid-color)!important;
    overflow:visible!important;
  }
  .a4-page table.a4-scope-table th,
  .a4-page table.a4-scope-table td{
    border:0!important;
    border-right:var(--a4-grid-line) solid var(--a4-grid-color)!important;
    border-bottom:var(--a4-grid-line) solid var(--a4-grid-color)!important;
    box-shadow:none!important;
    background-clip:padding-box!important;
  }
  .a4-page table.a4-scope-table tr > *:last-child{border-right:0!important;box-shadow:none!important;}
  .a4-page table.a4-scope-table tbody tr:last-child > *{border-bottom:0!important;}

  .a4-footer{justify-content:center!important;align-items:center!important;text-align:center!important;gap:0!important;color:#555!important;}
  .a4-footer > span:not(.a4-footer-center){display:none!important;}
  .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;font-size:6.4pt!important;line-height:1.15!important;font-weight:700!important;color:#555!important;}

  @media print{
    @page{size:210mm 297mm;margin:0!important;}
    html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;}
    body{overflow:visible!important;}
    .a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}
    .a4-page{position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}
    .a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}
    .a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;}
    .a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}
    .a4-page table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:separate!important;border-spacing:0!important;border:0!important;outline:0!important;box-shadow:inset 0 var(--a4-grid-line) 0 var(--a4-grid-color),inset var(--a4-grid-line) 0 0 var(--a4-grid-color),inset calc(-1 * var(--a4-grid-line)) 0 0 var(--a4-grid-color),inset 0 calc(-1 * var(--a4-grid-line)) 0 var(--a4-grid-color)!important;}
    .a4-page table.a4-scope-table th,.a4-page table.a4-scope-table td{border:0!important;border-right:var(--a4-grid-line) solid var(--a4-grid-color)!important;border-bottom:var(--a4-grid-line) solid var(--a4-grid-color)!important;box-shadow:none!important;}
    .a4-page table.a4-scope-table tr > *:last-child{border-right:0!important;box-shadow:none!important;}
    .a4-page table.a4-scope-table tbody tr:last-child > *{border-bottom:0!important;}
    .a4-no-print,.a4-preview-actions,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column{display:none!important;visibility:hidden!important;}
    .a4-status-select{display:none!important;visibility:hidden!important;}
    .a4-status-print{display:inline!important;visibility:visible!important;}
    .a4-footer{justify-content:center!important;text-align:center!important;}
    .a4-footer > span:not(.a4-footer-center){display:none!important;}
    .a4-footer-center{display:block!important;width:100%!important;text-align:center!important;color:#555!important;}
  }
</style>
<script>
(function(){
  function getArea(){return document.querySelector('#a4Preview .a4-print-area')||document.querySelector('.a4-print-area');}
  function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function getDocNo(root){
    root=root||getArea()||document;
    var rows=root.querySelectorAll('.a4-meta-row');
    for(var i=0;i<rows.length;i++){
      var label=(rows[i].querySelector('b')||{}).textContent||'';
      if(label.toLowerCase().indexOf('doc no')>=0){
        var target=rows[i].querySelector('.a4-editable,span');
        var v=(target?target.textContent:'')||'';
        return v.trim()||'Not issued';
      }
    }
    return 'Not issued';
  }
  function normalizeTableBorders(root){
    root=root||getArea()||document;
    root.querySelectorAll('table.a4-scope-table').forEach(function(table){
      table.style.width='100%';
      table.style.maxWidth='100%';
      table.style.tableLayout='fixed';
      table.style.borderCollapse='separate';
      table.style.borderSpacing='0';
      table.style.border='0';
      table.style.outline='0';
      table.style.boxShadow='inset 0 .18mm 0 #666, inset .18mm 0 0 #666, inset -.18mm 0 0 #666, inset 0 -.18mm 0 #666';
      table.querySelectorAll('th,td').forEach(function(cell){
        cell.style.border='0';
        cell.style.borderRight='.18mm solid #666';
        cell.style.borderBottom='.18mm solid #666';
        cell.style.boxShadow='none';
      });
      table.querySelectorAll('tr > *:last-child').forEach(function(cell){
        cell.style.borderRight='0';
        cell.style.boxShadow='none';
      });
      table.querySelectorAll('tbody tr:last-child > *').forEach(function(cell){
        cell.style.borderBottom='0';
      });
    });
  }
  function updateFooter(root){
    root=root||getArea();
    if(!root)return;
    var pages=[].slice.call(root.querySelectorAll('.a4-page'));
    var docNo=getDocNo(root);
    pages.forEach(function(page,i){
      var f=page.querySelector('.a4-footer');
      if(!f)return;
      f.innerHTML='<span class="a4-footer-center">Document No.: '+esc(docNo)+' &nbsp;&nbsp;|&nbsp;&nbsp; Page No.: '+(i+1)+' / '+pages.length+'</span>';
    });
  }
  function normalize(root){normalizeTableBorders(root);updateFooter(root);}
  function preparePrintClone(){
    if(window.AETERLINK_REPAGINATE_A4)window.AETERLINK_REPAGINATE_A4();
    var source=getArea();
    if(!source)return null;
    normalize(source);
    var clone=source.cloneNode(true);
    clone.querySelectorAll('.a4-no-print,.a4-preview-actions,.row-actions,.photo-actions,.a4-action-column,th.a4-action-column,td.a4-action-column').forEach(function(n){n.remove();});
    clone.querySelectorAll('.a4-status-select').forEach(function(sel){
      var text=document.createElement('span');
      text.className='a4-status-print';
      text.textContent=sel.value||'';
      sel.parentNode.insertBefore(text,sel);
      sel.remove();
    });
    normalize(clone);
    return clone;
  }
  function printExactPreview(){
    var clone=preparePrintClone();
    if(!clone){window.print();return;}
    var styles=[].map.call(document.querySelectorAll('style'),function(s){return s.textContent;}).join('\n');
    var finalCss='@page{size:210mm 297mm;margin:0!important;}*{box-sizing:border-box!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}html,body{width:210mm!important;min-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-root,.a4-print-area{position:static!important;left:auto!important;top:auto!important;width:210mm!important;max-width:210mm!important;margin:0!important;padding:0!important;background:#fff!important;overflow:visible!important;}.a4-page{position:relative!important;width:210mm!important;height:297mm!important;min-height:297mm!important;max-height:297mm!important;margin:0!important;padding:0!important;overflow:hidden!important;box-shadow:none!important;border:0!important;page-break-after:always!important;break-after:page!important;transform:none!important;}.a4-page:last-child{page-break-after:auto!important;break-after:auto!important;}.a4-page-inner{width:100%!important;height:100%!important;padding:10.5mm 10.5mm 11mm!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;}.a4-content{flex:1 1 auto!important;min-height:0!important;overflow:hidden!important;}.a4-no-print,.a4-preview-actions,.row-actions,.photo-actions{display:none!important;visibility:hidden!important;}.a4-status-select{display:none!important;visibility:hidden!important;}.a4-status-print{display:inline!important;visibility:visible!important;}table.a4-scope-table{width:100%!important;max-width:100%!important;table-layout:fixed!important;border-collapse:separate!important;border-spacing:0!important;border:0!important;outline:0!important;box-shadow:inset 0 .18mm 0 #666,inset .18mm 0 0 #666,inset -.18mm 0 0 #666,inset 0 -.18mm 0 #666!important;}table.a4-scope-table th,table.a4-scope-table td{border:0!important;border-right:.18mm solid #666!important;border-bottom:.18mm solid #666!important;box-shadow:none!important;}table.a4-scope-table tr>*:last-child{border-right:0!important;box-shadow:none!important;}table.a4-scope-table tbody tr:last-child>*{border-bottom:0!important;}.a4-footer{justify-content:center!important;text-align:center!important}.a4-footer-center{display:block!important;width:100%!important;text-align:center!important;color:#555!important;}';
    var win=window.open('','_blank');
    if(!win){window.print();return;}
    win.document.open();
    win.document.write('<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A4 Print</title><style>'+styles+'\n'+finalCss+'</style></head><body>'+clone.outerHTML+'</body></html>');
    win.document.close();
    setTimeout(function(){win.focus();win.print();},500);
  }
  function install(){
    if(window.AETERLINK_A4_RENDERER){window.AETERLINK_A4_RENDERER.printA4=printExactPreview;}
    normalize(getArea());
  }
  function patchPreview(){
    if(typeof window.previewCurrentForm==='function'&&!window.__a4PrintParityPreviewPatch){
      window.__a4PrintParityPreviewPatch=true;
      var original=window.previewCurrentForm;
      window.previewCurrentForm=function(){
        original.apply(this,arguments);
        setTimeout(function(){normalize(getArea());},220);
      };
    }
  }
  document.addEventListener('DOMContentLoaded',function(){install();patchPreview();setTimeout(install,300);setTimeout(install,800);});
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('.a4-page'))setTimeout(function(){normalize(getArea());},80);});
  document.addEventListener('change',function(e){if(e.target&&e.target.closest&&e.target.closest('.a4-page'))setTimeout(function(){normalize(getArea());},80);});
  var timer=setInterval(function(){install();patchPreview();},250);
  setTimeout(function(){clearInterval(timer);install();},5000);
  window.AETERLINK_NORMALIZE_A4_PARITY=function(){normalize(getArea());};
})();
</script>
