<!-- AETERLINK Documentation Module — A4_EQC_Edit_Load_Render_Fix.html -->
<!-- EQC edit-only fix: when editing saved/issued PJ-EQC-001 records, render the same Equipment Checklist layout and keep fRows as ChecklistRows. No other functions/modules changed. -->
<script id="a4-eqc-edit-load-render-fix-script">
(function(){
  if(window.__AETERLINK_EQC_EDIT_LOAD_RENDER_FIX_V1__) return;
  window.__AETERLINK_EQC_EDIT_LOAD_RENDER_FIX_V1__ = true;

  var oldPreview = null;
  var oldCollect = null;
  var oldActive = null;
  var patchedDraftLoad = false;

  function byId(id){return document.getElementById(id);}
  function val(id){var e=byId(id);return e?String(e.value||'').trim():'';}
  function setVal(id,v){var e=byId(id);if(e)e.value=v==null?'':String(v);}
  function text(id,v){var e=byId(id);if(e)e.textContent=v==null?'':String(v);}
  function isEqcCode(code){code=String(code||'').toUpperCase();return /PJ-EQC-001|PJ-EQUIP-CHK-001|EQC|EQUIP/.test(code);}
  function isEqcSelected(){return isEqcCode(val('fTemplate')||val('prodDocType'));}
  function parseRows(){
    var raw=val('fRows');
    try{var a=JSON.parse(raw||'[]');return Array.isArray(a)?a:[];}catch(e){return [];}
  }
  function rowLooksEqc(r){return !!(r && (Object.prototype.hasOwnProperty.call(r,'ItemDescription') || Object.prototype.hasOwnProperty.call(r,'Brand') || Object.prototype.hasOwnProperty.call(r,'InstallationPosition') || Object.prototype.hasOwnProperty.call(r,'ConfirmationPower')));}
  function normalizeEqcRows(rows){
    rows = Array.isArray(rows)?rows:[];
    return rows.map(function(r,i){
      r=r||{};
      if(rowLooksEqc(r)){
        return {
          No:String(r.No||r.no||i+1),
          ItemDescription:r.ItemDescription||r['Item description']||r.Item||r.ItemDescriptionText||'',
          Brand:r.Brand||r.brand||'',
          Model:r.Model||r['Product name']||r.ProductName||r.Product||'',
          InstalledQuantity:r.InstalledQuantity||r['Installed Quantity']||r.Quantity||r.Qty||'',
          Localisation:r.Localisation||r.Location||'',
          Floor:r.Floor||'',
          InstallationPosition:r.InstallationPosition||r['Installation Position']||'',
          InstallationCondition:r.InstallationCondition||r['Installation Condition']||'',
          ConfirmationPower:r.ConfirmationPower||r['Confirmation of power-on']||r.Confirmation||'',
          Remarks:r.Remarks||''
        };
      }
      return {
        No:String(r.No||r.Item||i+1),
        ItemDescription:r.WorkDescription||r.Description||r.Subject||'',
        Brand:r.Brand||'',
        Model:r.Model||r.ProductName||'',
        InstalledQuantity:r.Qty||r.Quantity||'',
        Localisation:r.Location||r.Localisation||'',
        Floor:r.Floor||'',
        InstallationPosition:r.InstallationPosition||r.Status||'',
        InstallationCondition:r.InstallationCondition||'',
        ConfirmationPower:r.ConfirmationPower||'',
        Remarks:r.Remarks||''
      };
    });
  }
  function chooseEqcRowsFromData(d){
    d=d||{};
    var rows = d.ChecklistRows || d.EquipmentRows || d.EqcRows || d.Rows || [];
    if(!rows.length && Array.isArray(d.ScopeRows) && d.ScopeRows.some(rowLooksEqc)) rows = d.ScopeRows;
    if(!rows.length) rows = parseRows();
    if(!rows.length && window.AETERLINK_EQC_DATA_LAYOUT_FINAL && typeof AETERLINK_EQC_DATA_LAYOUT_FINAL.rows==='function') rows = AETERLINK_EQC_DATA_LAYOUT_FINAL.rows();
    return normalizeEqcRows(rows);
  }
  function forceEqcCodes(){
    if(isEqcSelected()){
      setVal('fTemplate','PJ-EQC-001');
      if(byId('prodDocType')) setVal('prodDocType','PJ-EQC-001');
    }
  }
  function applyEqcRowsToData(data){
    if(!isEqcSelected() || !data) return data;
    var rows = normalizeEqcRows(parseRows());
    if(rows.length){
      data.ChecklistRows = rows;
      data.Rows = rows;
    }
    data.TemplateCode = 'PJ-EQC-001';
    data.ReferenceDocuments = data.ReferenceDocuments || 'PJ-EQC-001';
    return data;
  }
  function installCollectPatch(){
    if(typeof window.collectFormData !== 'function' || window.collectFormData.__eqcEditLoadRenderFixV1) return;
    oldCollect = window.collectFormData;
    window.collectFormData = function(){
      var data = oldCollect.apply(this,arguments) || {};
      return applyEqcRowsToData(data);
    };
    window.collectFormData.__eqcEditLoadRenderFixV1 = true;
  }
  function renderEqcPreview(){
    forceEqcCodes();
    var data = {};
    if(typeof oldCollect === 'function') data = oldCollect() || {};
    else if(typeof window.collectFormData === 'function') data = window.collectFormData() || {};
    data = applyEqcRowsToData(data || {});
    if(!data.ChecklistRows || !data.ChecklistRows.length) data.ChecklistRows = chooseEqcRowsFromData(data);
    var target=byId('a4Preview');
    if(target && window.AETERLINK_TEMPLATES && AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST && typeof AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.render === 'function'){
      target.innerHTML = AETERLINK_TEMPLATES.EQUIPMENT_CHECKLIST.render(data);
      if(window.AETERLINK_EQC_DATA_LAYOUT_FINAL && typeof AETERLINK_EQC_DATA_LAYOUT_FINAL.normalize === 'function') setTimeout(AETERLINK_EQC_DATA_LAYOUT_FINAL.normalize,80);
      if(window.AETERLINK_EQC_HEADER_EDIT_FONT_FIX && typeof AETERLINK_EQC_HEADER_EDIT_FONT_FIX.apply === 'function') setTimeout(AETERLINK_EQC_HEADER_EDIT_FONT_FIX.apply,100);
      if(window.AETERLINK_EQC_ROW_DELETE_RESTORE && typeof AETERLINK_EQC_ROW_DELETE_RESTORE.apply === 'function') setTimeout(AETERLINK_EQC_ROW_DELETE_RESTORE.apply,120);
      if(window.AETERLINK_A4_ADD_ROW_PAGINATION_GUARD && typeof AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.schedule === 'function') AETERLINK_A4_ADD_ROW_PAGINATION_GUARD.schedule(180);
      var msg=byId('prodStatusMsg')||byId('saveStatus'); if(msg)msg.textContent='Loaded Equipment Checklist for edit.';
      return true;
    }
    return false;
  }
  function installPreviewPatch(){
    if(typeof window.previewCurrentForm !== 'function' || window.previewCurrentForm.__eqcEditLoadRenderFixV1) return;
    oldPreview = window.previewCurrentForm;
    window.previewCurrentForm = function(){
      if(isEqcSelected()) return renderEqcPreview();
      return oldPreview.apply(this,arguments);
    };
    window.previewCurrentForm.__eqcEditLoadRenderFixV1 = true;
  }
  function installActivePatch(){
    if(typeof window.activeTemplate === 'function' && !window.activeTemplate.__eqcEditLoadRenderFixV1){
      oldActive = window.activeTemplate;
      window.activeTemplate = function(){return isEqcSelected()?'CHECKLIST':oldActive.apply(this,arguments);};
      window.activeTemplate.__eqcEditLoadRenderFixV1 = true;
    }
  }
  function patchLoadForEdit(){
    if(patchedDraftLoad || !window.AETERLINK_DRAFT_ISSUE_EDIT_UI || typeof AETERLINK_DRAFT_ISSUE_EDIT_UI.loadForEdit !== 'function') return;
    var oldLoad = AETERLINK_DRAFT_ISSUE_EDIT_UI.loadForEdit;
    AETERLINK_DRAFT_ISSUE_EDIT_UI.loadForEdit = function(payload){
      var ret = oldLoad.apply(this,arguments);
      [350,800,1400,2300].forEach(function(ms){setTimeout(function(){if(isEqcSelected())renderEqcPreview();},ms);});
      return ret;
    };
    AETERLINK_DRAFT_ISSUE_EDIT_UI.loadForEdit.__eqcEditLoadRenderFixV1 = true;
    patchedDraftLoad = true;
  }
  function patchForceRecordEdit(){
    if(!window.AETERLINK_FORCE_RECORD_EDIT || AETERLINK_FORCE_RECORD_EDIT.__eqcEditLoadRenderFixV1) return;
    if(typeof AETERLINK_FORCE_RECORD_EDIT.load === 'function'){
      var oldLoad = AETERLINK_FORCE_RECORD_EDIT.load;
      AETERLINK_FORCE_RECORD_EDIT.load = function(payload){
        var ret = oldLoad.apply(this,arguments);
        [350,800,1400,2300].forEach(function(ms){setTimeout(function(){if(isEqcSelected())renderEqcPreview();},ms);});
        return ret;
      };
    }
    AETERLINK_FORCE_RECORD_EDIT.__eqcEditLoadRenderFixV1 = true;
  }
  function boot(){
    installCollectPatch();
    installPreviewPatch();
    installActivePatch();
    patchLoadForEdit();
    patchForceRecordEdit();
    if(isEqcSelected()) setTimeout(renderEqcPreview,120);
  }
  document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);setTimeout(boot,900);setTimeout(boot,2200);});
  window.addEventListener('load',function(){setTimeout(boot,300);setTimeout(boot,1300);});
  document.addEventListener('change',function(e){if(e.target && e.target.matches && e.target.matches('#prodDocType,#fTemplate'))setTimeout(boot,80);},true);
  document.addEventListener('click',function(e){if(e.target && e.target.closest && e.target.closest('#registerTable button,#recordsTable button,.doc-reg-table button')){setTimeout(boot,120);setTimeout(function(){if(isEqcSelected())renderEqcPreview();},900);}},true);
  setTimeout(boot,1000);setTimeout(boot,2500);
  window.AETERLINK_EQC_EDIT_LOAD_RENDER_FIX = {apply:boot, render:renderEqcPreview, normalizeRows:normalizeEqcRows};
})();
</script>
