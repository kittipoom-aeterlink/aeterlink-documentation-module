    rr.paginateScopeFrom=function(table){if(rr.__paginating)return;rr.__paginating=true;try{var page=table.closest('.a4-page');if(!page||!table.tBodies.length)return;var body=table.tBodies[0];var pageRect=page.getBoundingClientRect();if(!pageRect||pageRect.bottom===0)return;var limit=pageRect.bottom-65;var guard=0;while(body.rows.length&&guard<200){var lastRow=body.rows[body.rows.length-1];var rowRect=lastRow.getBoundingClientRect();if(!rowRect||rowRect.bottom===0||rowRect.bottom<=limit)break;guard++;body.removeChild(lastRow);rr.appendRowToContinuedPage(page,table,lastRow);}removeEmptyContinuedPages();}finally{rr.__paginating=false;}};

    rr.createContinuedScopePage=function(basePage,sourceTable){var page=document.createElement('div');page.className='a4-page a4-scope-continued-page';var inner=document.createElement('div');inner.className='a4-page-inner';['.a4-header','.a4-project-grid'].forEach(function(sel){var n=basePage.querySelector(sel);if(n)inner.appendChild(n.cloneNode(true));});var content=document.createElement('div');content.className='a4-content';var sec=document.createElement('div');sec.innerHTML=rr.section('SCOPE OF WORK — CONTINUED');content.appendChild(sec.firstChild);var table=sourceTable.cloneNode(false);table.appendChild(sourceTable.tHead.cloneNode(true));table.appendChild(document.createElement('tbody'));content.appendChild(table);var actions=document.createElement('div');actions.className='a4-preview-actions a4-no-print';actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addRow(this)">+ Add Row</button><button type="button" onclick="AETERLINK_A4_RENDERER.deleteLastRow(this)">- Delete Last Row</button>';content.appendChild(actions);inner.appendChild(content);var f=basePage.querySelector('.a4-footer');if(f)inner.appendChild(f.cloneNode(true));page.appendChild(inner);return page;};
    rr.addPhotoReportPage=function(){var area=document.querySelector('#a4Preview .a4-print-area')||document.querySelector('.a4-print-area');if(!area)return;var base=area.querySelector('.a4-page');if(!base)return;var page=document.createElement('div');page.className='a4-page a4-photo-report-page';var inner=document.createElement('div');inner.className='a4-page-inner';['.a4-header','.a4-project-grid'].forEach(function(sel){var n=base.querySelector(sel);if(n)inner.appendChild(n.cloneNode(true));});var content=document.createElement('div');content.className='a4-content';var sec=document.createElement('div');sec.innerHTML=rr.section('PHOTO REPORT');content.appendChild(sec.firstChild);var grid=document.createElement('div');grid.className='a4-photo-grid';var t=document.createElement('div');t.innerHTML=rr.photoBlock({PhotoUrl:'',ItemNo:'',Description:'',Note:''},0);grid.appendChild(t.firstChild);t.innerHTML=rr.photoBlock({PhotoUrl:'',ItemNo:'',Description:'',Note:''},1);grid.appendChild(t.firstChild);content.appendChild(grid);var actions=document.createElement('div');actions.className='a4-preview-actions a4-no-print';actions.innerHTML='<button type="button" onclick="AETERLINK_A4_RENDERER.addPhotoBlock(this)">+ Add Photo</button>';content.appendChild(actions);inner.appendChild(content);var f=base.querySelector('.a4-footer');if(f)inner.appendChild(f.cloneNode(true));page.appendChild(inner);area.appendChild(page);};
  }
  function removeEmptyContinuedPages(){[].forEach.call(document.querySelectorAll('.a4-scope-continued-page'),function(p){var rows=p.querySelectorAll('table.a4-scope-table tbody tr');if(rows.length===0)p.remove();});}
  function fixSectionTitles(){[].forEach.call(document.querySelectorAll('.a4-section-title'),function(el,i){var txt=(el.textContent||'').trim();if(!txt){var page=el.closest('.a4-page');if(page&&page.querySelector('.a4-info-table')&&i===0)el.textContent='DOCUMENT INFORMATION';else if(page&&page.querySelector('.a4-scope-table'))el.textContent=i===0?'SCOPE OF WORK — COMPLETION STATUS':'SCOPE OF WORK — CONTINUED';else if(page&&page.querySelector('.a4-photo-grid'))el.textContent='PHOTO REPORT';}el.style.backgroundColor='#113e63';el.style.background='#113e63';el.style.color='#fff';el.style.borderColor='#113e63';});}
  function patchPreview(){if(window.__aeterlinkPreviewPatched||typeof window.previewCurrentForm!=='function')return;window.__aeterlinkPreviewPatched=true;var original=window.previewCurrentForm;window.previewCurrentForm=function(){original.apply(this,arguments);setTimeout(function(){applyOverrides();fixSectionTitles();var rr=R();if(rr&&rr.paginateAllScopeTables)rr.paginateAllScopeTables();ensureToolbar();},120);};}
  function hideEditorForm(){var panel=document.querySelector('#view-documents > .mod-panel:first-child');if(panel)panel.style.display='none';ensureToolbar();}
  function ensureToolbar(){var preview=document.getElementById('a4Preview');if(!preview)return;var panel=preview.closest('.mod-panel');if(!panel||document.getElementById('a4DirectToolbar'))return;var bar=document.createElement('div');bar.id='a4DirectToolbar';bar.className='a4-direct-toolbar a4-no-print';bar.innerHTML='<b>A4 Direct Edit Mode</b><button class="mod-btn" type="button" onclick="previewCurrentForm()">Update Preview</button><button class="mod-btn" type="button" onclick="loadSampleForTemplate()">Reset Sample</button><button class="mod-btn" type="button" onclick="AETERLINK_A4_RENDERER.addPhotoReportPage()">+ Photo Report Page</button><button class="mod-btn primary" type="button" onclick="AETERLINK_A4_RENDERER.printA4()">Print / Save PDF</button>';panel.insertBefore(bar,preview);}
  document.addEventListener('change',function(e){if(e.target&&e.target.classList.contains('a4-status-select'))syncSelect(e.target);});
  document.addEventListener('DOMContentLoaded',function(){applyOverrides();patchPreview();hideEditorForm();setTimeout(function(){applyOverrides();patchPreview();hideEditorForm();fixSectionTitles();var rr=R();if(rr&&rr.paginateAllScopeTables)rr.paginateAllScopeTables();},250);});
  applyOverrides();
})();
</script>
